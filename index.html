<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07111f;--bg2:#0d1d30;--bg3:#112240;
  --red:#e63946;--red2:#c1121f;
  --blue:#1a7abf;--blue2:#155fa0;
  --gold:#f4a261;--green:#2ecc71;--purple:#9b59b6;
  --text:#e8f0f8;--muted:#6b8cae;
  --border:rgba(100,160,220,0.12);
  --card:rgba(13,29,48,0.7);
}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* ===== ANIMATIONS ===== */
@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideRight{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.85)}to{opacity:1;transform:scale(1)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes glow{0%,100%{box-shadow:0 0 15px rgba(230,57,70,0.2)}50%{box-shadow:0 0 30px rgba(230,57,70,0.5)}}
@keyframes countNum{from{opacity:0;transform:scale(0.5) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes gridMove{0%{transform:translateY(0)}100%{transform:translateY(50px)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
/* ===== قائمة المزيد المنبثقة (جوال) ===== */
.more-menu{position:fixed;bottom:calc(80px + env(safe-area-inset-bottom));left:12px;right:12px;background:rgba(10,18,33,.97);backdrop-filter:blur(24px) saturate(160%);-webkit-backdrop-filter:blur(24px) saturate(160%);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:12px;z-index:300;display:grid;grid-template-columns:repeat(3,1fr);gap:10px;box-shadow:0 16px 48px rgba(0,0,0,.5);animation:fadeUp .25s cubic-bezier(.2,.8,.3,1)}
.more-menu button{display:flex;flex-direction:column;align-items:center;gap:6px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:14px 8px;cursor:pointer;color:#e8eef7;font-size:12px;font-weight:600;font-family:inherit;transition:all .2s}
.more-menu button:active{transform:scale(.95);background:rgba(255,255,255,.1)}
body.light-mode .more-menu{background:rgba(255,255,255,.97);border:1px solid rgba(26,58,107,.12);box-shadow:0 16px 48px rgba(26,58,107,.2)}
body.light-mode .more-menu button{background:rgba(26,58,107,.05);border-color:rgba(26,58,107,.08);color:#1a2942}
/* ===== شاشة العرض (TV Mode) ===== */
.tv-mode{display:none;position:fixed;inset:0;z-index:99999;background:linear-gradient(135deg,#050d1a,#0a2348 60%,#0d1b30);color:#fff;overflow:hidden;padding:2vh 2.5vw;flex-direction:column;font-family:'Tajawal','Segoe UI',sans-serif}
.tv-close{position:fixed;top:16px;left:16px;width:48px;height:48px;border-radius:50%;background:rgba(231,76,60,.85);color:#fff;border:none;font-size:24px;cursor:pointer;z-index:100000;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,0,0,.4);transition:transform .2s}
.tv-close:hover{transform:scale(1.1);background:#e74c3c}
.tv-head{display:flex;flex-direction:column;align-items:center;gap:4px;padding-bottom:1.5vh;border-bottom:3px solid #c9a227;margin-bottom:2vh}
.tv-logo{width:8vh;height:8vh;border-radius:50%;margin-bottom:.5vh}
.tv-title{font-size:3.2vh;font-weight:900;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.4)}
.tv-sub{font-size:2vh;color:#c9a227;font-weight:700}
.tv-stats{display:flex;justify-content:center;gap:1.5vw;margin-bottom:2.5vh}
.tv-stat{flex:1;max-width:16vw;background:rgba(255,255,255,.06);border:1px solid rgba(201,162,39,.3);border-radius:16px;padding:1.5vh 1vw;text-align:center;backdrop-filter:blur(10px)}
.tv-snum{font-size:4vh;font-weight:900;color:#6ab8f7;line-height:1}
.tv-slbl{font-size:1.6vh;color:#b8c5d8;margin-top:.5vh;font-weight:600}
.tv-body{display:flex;gap:2.5vw;flex:1;min-height:0}
.tv-body3{display:flex;gap:2vw;flex:1;min-height:0}
.tv-col{flex:1;display:flex;flex-direction:column;min-height:0}
.tv-podium-wrap{flex:1.1;display:flex;flex-direction:column}
.tv-list-wrap{flex:1;display:flex;flex-direction:column;min-height:0}
.tv-section-title{font-size:2.4vh;font-weight:800;color:#c9a227;margin-bottom:1.5vh;text-align:center}
.tv-podium{display:flex;justify-content:center;align-items:flex-end;gap:1.5vw;flex:1;padding-bottom:2vh}
.tv-pod-col{display:flex;flex-direction:column;align-items:center;flex:1;max-width:12vw}
.tv-pod-medal{font-size:4vh;margin-bottom:.5vh;animation:float 3s ease-in-out infinite}
.tv-pod-name{font-size:2vh;font-weight:800;text-align:center;color:#fff;margin-bottom:.3vh}
.tv-pod-info{font-size:1.6vh;color:#b8c5d8;margin-bottom:1vh}
.tv-pod-bar{width:100%;border-radius:12px 12px 0 0;display:flex;align-items:flex-start;justify-content:center;padding-top:1.5vh;transition:height .8s cubic-bezier(.2,.8,.3,1)}
.tv-pod-rank{font-size:5vh;font-weight:900;color:#fff;text-shadow:0 2px 6px rgba(0,0,0,.4)}
.tv-list{display:flex;flex-direction:column;gap:.8vh;overflow:hidden}
.tv-row{display:flex;align-items:center;gap:1vw;background:rgba(255,255,255,.05);border-radius:12px;padding:1.1vh 1.2vw;border:1px solid rgba(255,255,255,.06)}
.tv-row-top{background:rgba(201,162,39,.14);border-color:rgba(201,162,39,.4)}
.tv-rank{font-size:2.4vh;font-weight:900;min-width:3vw;text-align:center}
.tv-name{flex:1;font-size:2vh;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tv-grp{font-size:1.7vh;color:#b8c5d8;min-width:6vw}
.tv-avg{font-size:2.4vh;font-weight:900;min-width:5vw;text-align:left}
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes progressFill{from{width:0}to{width:var(--w)}}
@keyframes particleRise{0%{transform:translateY(100vh) rotate(0deg);opacity:0}10%{opacity:.6}90%{opacity:.6}100%{transform:translateY(-100px) rotate(720deg);opacity:0}}
@keyframes rippleOut{0%{transform:scale(0);opacity:.6}100%{transform:scale(2.5);opacity:0}}
@keyframes notifSlide{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes notifOut{from{transform:translateX(0);opacity:1}to{transform:translateX(120%);opacity:0}}
@keyframes modalIn{from{opacity:0;transform:scale(0.9) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}

.anim-up{animation:fadeUp 1s cubic-bezier(.16,1,.3,1) both}
.anim-in{animation:fadeIn .8s ease both}
.anim-right{animation:slideRight .9s cubic-bezier(.16,1,.3,1) both}
.anim-scale{animation:scaleIn .8s cubic-bezier(.16,1,.3,1) both}
.d1{animation-delay:.1s}.d2{animation-delay:.2s}.d3{animation-delay:.3s}.d4{animation-delay:.4s}.d5{animation-delay:.5s}.d6{animation-delay:.6s}

/* ===== BG ===== */
.bg-layer{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.bg-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(26,122,191,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(26,122,191,.05) 1px,transparent 1px);background-size:50px 50px;animation:gridMove 20s linear infinite;opacity:.6}
.bg-orb1{position:absolute;width:600px;height:600px;background:radial-gradient(circle,rgba(230,57,70,.07) 0%,transparent 70%);top:-150px;right:-100px;border-radius:50%;animation:float 10s ease-in-out infinite}
.bg-orb2{position:absolute;width:500px;height:500px;background:radial-gradient(circle,rgba(26,122,191,.06) 0%,transparent 70%);bottom:-100px;left:-80px;border-radius:50%;animation:float 12s ease-in-out infinite reverse}

/* ===== LOGIN ===== */
#loginPage{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px}
.login-wrap{width:100%;max-width:460px}
.login-logo{text-align:center;margin-bottom:28px;animation:fadeUp .8s ease both}
.login-logo img{width:100px;height:100px;object-fit:cover;border-radius:50%;border:3px solid rgba(255,255,255,.15);filter:drop-shadow(0 0 25px rgba(230,57,70,.5));animation:float 4s ease-in-out infinite,glow 3s ease-in-out infinite}
.login-logo h1{font-size:22px;font-weight:900;margin-top:12px;background:linear-gradient(135deg,#fff 0%,#aac8e8 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.login-logo h1 span{background:linear-gradient(135deg,var(--red),#ff6b7a);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.login-logo p{font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:4px}
.glass{background:rgba(255,255,255,.03);backdrop-filter:blur(30px);border:1px solid rgba(255,255,255,.08);border-radius:24px;padding:32px 28px;position:relative;overflow:hidden;animation:fadeUp .8s .2s cubic-bezier(.16,1,.3,1) both;box-shadow:0 24px 64px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.1)}
.glass::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.2),transparent)}
.role-tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:20px;background:rgba(0,0,0,.2);border-radius:14px;padding:4px;border:1px solid rgba(255,255,255,.05)}
.rtab{padding:10px 6px;border-radius:10px;border:none;background:transparent;color:var(--muted);font-family:'Tajawal',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all .25s;text-align:center}
.rtab:hover{background:rgba(255,255,255,.07);color:var(--text);transform:translateY(-1px)}
.rtab.rs{background:linear-gradient(135deg,rgba(230,57,70,.25),rgba(193,18,31,.15));color:#ff8a92;border:1px solid rgba(230,57,70,.3);box-shadow:0 4px 15px rgba(230,57,70,.15)}
.rtab.rt{background:linear-gradient(135deg,rgba(26,122,191,.25),rgba(21,95,160,.15));color:#6ab8f7;border:1px solid rgba(26,122,191,.3);box-shadow:0 4px 15px rgba(26,122,191,.15)}
.rtab.ra{background:linear-gradient(135deg,rgba(244,162,97,.25),rgba(230,126,34,.15));color:#f4c78a;border:1px solid rgba(244,162,97,.3);box-shadow:0 4px 15px rgba(244,162,97,.15)}
.fgroup{margin-bottom:16px}
.fgroup label{display:block;font-size:11px;font-weight:500;color:rgba(255,255,255,.4);margin-bottom:7px;text-transform:uppercase;letter-spacing:.8px}
.fgroup input{width:100%;padding:13px 16px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px;font-family:'Tajawal',sans-serif;font-size:15px;color:var(--text);outline:none;transition:all .25s;direction:ltr;text-align:right}
.fgroup input:focus{background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.2);box-shadow:0 0 0 3px rgba(255,255,255,.05);transform:translateY(-1px)}
.fgroup input::placeholder{color:#2a4a6a;direction:rtl}
.lbtn{width:100%;padding:15px;border:none;border-radius:14px;font-family:'Tajawal',sans-serif;font-size:16px;font-weight:700;cursor:pointer;transition:all .3s;margin-top:4px;position:relative;overflow:hidden}
.lbtn::before{content:'';position:absolute;inset:0;background:linear-gradient(rgba(255,255,255,.15),transparent);pointer-events:none}
.lbtn::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);width:100%;height:100%;background:rgba(255,255,255,.1);border-radius:50%;transition:transform .4s ease}
.lbtn:active::after{transform:translate(-50%,-50%) scale(2.5)}
.lbtn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,0,0,.3)}
.lbtn.bs{background:linear-gradient(135deg,var(--red),var(--red2))}
.lbtn.bt{background:linear-gradient(135deg,var(--blue),var(--blue2))}
.lbtn.ba{background:linear-gradient(135deg,#f4a261,#e67e22)}
.err-box{background:rgba(230,57,70,.1);border:1px solid rgba(230,57,70,.3);color:#ff8a92;border-radius:10px;padding:11px 16px;font-size:13px;margin-top:12px;display:none;text-align:center;animation:fadeUp .3s ease}
.loading{text-align:center;padding:16px;display:none}
.sp{display:inline-block;width:28px;height:28px;border:2.5px solid rgba(100,160,220,.2);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}

/* ===== TOPBAR ===== */
.topbar{background:transparent;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.tb-brand{display:flex;align-items:center;gap:10px}
.tb-brand img{width:46px;height:46px;object-fit:cover;border-radius:50%;border:2px solid rgba(255,255,255,.15);filter:drop-shadow(0 2px 10px rgba(0,0,0,.4));transition:transform .3s}
.tb-brand img:hover{transform:rotate(10deg) scale(1.1)}
.tb-right{display:flex;align-items:center;gap:10px}
.role-badge{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.3px}
.rb-s{background:rgba(230,57,70,.15);color:#ff8a92;border:1px solid rgba(230,57,70,.3)}
.rb-t{background:rgba(26,122,191,.15);color:#6ab8f7;border:1px solid rgba(26,122,191,.3)}
.rb-a{background:rgba(244,162,97,.15);color:#f4c78a;border:1px solid rgba(244,162,97,.3)}
.av{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.av-s{background:rgba(230,57,70,.2);color:#ff8a92}
.av-t{background:rgba(26,122,191,.2);color:#6ab8f7}
.av-a{background:rgba(244,162,97,.2);color:#f4c78a}
.uname{font-size:13px;font-weight:500;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.notif-btn{width:36px;height:36px;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;transition:all .2s;position:relative}
.notif-btn:hover{background:rgba(255,255,255,.1)}
.notif-dot{position:absolute;top:6px;right:6px;width:8px;height:8px;background:var(--red);border-radius:50%;animation:pulse 1.5s ease-in-out infinite}
.out-btn{background:transparent;border:1px solid var(--border);color:var(--muted);padding:7px 16px;border-radius:9px;font-family:'Tajawal',sans-serif;font-size:12px;cursor:pointer;transition:all .2s}
.out-btn:hover{border-color:var(--red);color:var(--red)}

/* ===== LAYOUT ===== */
.app{display:flex;min-height:calc(100vh - 62px);position:relative;z-index:1}
.sidebar{width:220px;background:rgba(11,22,38,.6);border-left:1px solid var(--border);padding:16px 0;flex-shrink:0;backdrop-filter:blur(10px);transition:transform .3s}
.sitem{display:flex;align-items:center;gap:10px;padding:11px 18px;font-size:13px;color:var(--muted);cursor:pointer;transition:all .2s;border-right:3px solid transparent;margin-bottom:2px;border-radius:0 8px 8px 0;margin-left:8px}
.sitem:hover{color:var(--text);background:rgba(100,160,220,.05)}
.sitem.active{color:var(--text);background:rgba(100,160,220,.08);border-right-color:var(--red)}
.sitem.at{border-right-color:var(--blue)}
.sitem.aa{border-right-color:var(--gold)}
.sicon{font-size:17px;width:22px;text-align:center}
.ssep{height:1px;background:var(--border);margin:8px 16px}
.mcontent{flex:1;padding:24px;overflow-y:auto;min-height:0}

/* ===== CARDS ===== */
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:24px}
.mcard{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px;position:relative;overflow:hidden;transition:all .25s;backdrop-filter:blur(10px);cursor:default}
.mcard:hover{transform:translateY(-3px) rotateX(3deg);box-shadow:0 12px 40px rgba(0,0,0,.25);border-color:rgba(100,160,220,.25)}
.mcard::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:16px 16px 0 0}
.mc-r::before{background:linear-gradient(90deg,var(--red),transparent)}
.mc-b::before{background:linear-gradient(90deg,var(--blue),transparent)}
.mc-g::before{background:linear-gradient(90deg,var(--green),transparent)}
.mc-y::before{background:linear-gradient(90deg,var(--gold),transparent)}
.mc-p::before{background:linear-gradient(90deg,var(--purple),transparent)}
.micon{font-size:22px;margin-bottom:10px;opacity:.8}
.mnum{font-size:30px;font-weight:900;line-height:1;transition:all .3s}
.mnum.cr{color:var(--red)}
.mnum.cb{color:#6ab8f7}
.mnum.cg{color:var(--green)}
.mnum.cy{color:var(--gold)}
.mlbl{font-size:12px;color:var(--muted);margin-top:5px}

/* ===== SECTIONS ===== */
.stitle{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.stitle::after{content:'';flex:1;height:1px;background:var(--border)}

/* ===== BANNER ===== */
.banner{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:22px 26px;margin-bottom:22px;display:flex;align-items:center;justify-content:space-between;gap:16px;backdrop-filter:blur(10px);position:relative;overflow:hidden}
.banner::before{content:'';position:absolute;left:-40px;top:-40px;width:180px;height:180px;background:radial-gradient(circle,rgba(230,57,70,.06) 0%,transparent 70%);border-radius:50%}
.btitle{font-size:20px;font-weight:900}
.bsub{font-size:13px;color:var(--muted);margin-top:4px}
.bpill{padding:9px 20px;border-radius:20px;font-size:13px;font-weight:700;flex-shrink:0}
.bp-r{background:rgba(230,57,70,.15);color:#ff8a92;border:1px solid rgba(230,57,70,.3)}
.bp-b{background:rgba(26,122,191,.15);color:#6ab8f7;border:1px solid rgba(26,122,191,.3)}
.bp-y{background:rgba(244,162,97,.15);color:#f4c78a;border:1px solid rgba(244,162,97,.3)}

/* ===== PROGRESS ===== */
.prog{background:rgba(255,255,255,.06);border-radius:6px;height:6px;overflow:hidden;margin:10px 0}
.pfill{height:6px;border-radius:6px;transition:width 2s cubic-bezier(.16,1,.3,1)}
.pf-g{background:linear-gradient(90deg,#27ae60,#2ecc71)}
.pf-y{background:linear-gradient(90deg,#e67e22,#f4a261)}
.pf-r{background:linear-gradient(90deg,var(--red2),var(--red))}
.pf-b{background:linear-gradient(90deg,var(--blue2),var(--blue))}

/* ===== COURSE CARD ===== */
.ccard{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px 20px;margin-bottom:12px;transition:all .2s;backdrop-filter:blur(10px);position:relative;overflow:hidden}
.ccard:hover{border-color:rgba(100,160,220,.25);transform:translateX(-3px) translateY(-1px);box-shadow:0 8px 30px rgba(0,0,0,.2)}
.ccard::after{content:'';position:absolute;right:0;top:0;bottom:0;width:3px;border-radius:0 16px 16px 0}
.cc-r::after{background:var(--red)}
.cc-b::after{background:var(--blue)}
.cc-g::after{background:var(--green)}
.cc-y::after{background:var(--gold)}
.cc-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.cc-name{font-size:15px;font-weight:700}
.cc-meta{font-size:12px;color:var(--muted);margin-top:3px}
.pill{font-size:12px;font-weight:700;padding:5px 14px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.pg{background:rgba(46,204,113,.12);color:#2ecc71;border:1px solid rgba(46,204,113,.25)}
.py{background:rgba(244,162,97,.12);color:#f4a261;border:1px solid rgba(244,162,97,.25)}
.pr{background:rgba(230,57,70,.12);color:#ff8a92;border:1px solid rgba(230,57,70,.25)}
.pb{background:rgba(26,122,191,.12);color:#6ab8f7;border:1px solid rgba(26,122,191,.25)}
.po{background:rgba(255,138,76,.14);color:#ff8a4c;border:1px solid rgba(255,138,76,.3)}
/* ===== جدول التوليد ===== */
.sch-controls{display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end;margin-bottom:16px;padding:14px;background:var(--card2);border-radius:12px;border:1px solid var(--border)}
.sch-cfg{display:flex;flex-direction:column;gap:4px}
.sch-cfg label{font-size:11px;color:var(--muted)}
.sch-cfg select,.sch-cfg input{padding:8px 12px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:13px;min-width:90px}
.sch-legend{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.sch-tag{font-size:11px;padding:5px 12px;border-radius:14px;background:rgba(26,122,191,.1);color:#6ab8f7;border:1px solid rgba(26,122,191,.2)}
.sch-tag b{color:var(--text)}
.sch-wrap{overflow-x:auto;border-radius:12px;border:1px solid var(--border)}
.sch-table{width:100%;border-collapse:collapse;min-width:640px}
.sch-table th{background:var(--card2);padding:12px 8px;font-size:13px;font-weight:700;border:1px solid var(--border);color:#6ab8f7}
.sch-pnum{background:var(--card2);font-weight:700;text-align:center;padding:8px;border:1px solid var(--border);font-size:12px;color:var(--muted)}
.sch-time{font-size:10px;color:#6ab8f7;font-weight:600;margin-top:4px;white-space:nowrap}
.sch-cell{border:1px solid var(--border);padding:4px;height:64px;vertical-align:middle;text-align:center;transition:.15s;min-width:110px}
.sch-cell.filled{background:rgba(46,204,113,.06)}
.sch-cell:not(.filled):hover{background:rgba(26,122,191,.06);cursor:default}
.sch-empty{color:var(--muted);opacity:.3;font-size:18px}
.sch-item{cursor:grab;padding:6px 8px;border-radius:8px;background:rgba(26,122,191,.14);border:1px solid rgba(26,122,191,.3)}
.sch-item:active{cursor:grabbing}
.sch-course{font-size:12px;font-weight:700;color:var(--text);line-height:1.3}
.sch-trainer{font-size:10px;color:var(--muted);margin-top:2px}
.sch-room{margin-top:5px;width:100%;font-size:10px;padding:3px 4px;border-radius:6px;border:1px solid rgba(244,162,97,.3);background:rgba(244,162,97,.08);color:#f4a261;cursor:pointer}
.sch-item-v{padding:6px 4px}
.sch-item-v .sch-course{font-size:12px;font-weight:700;color:var(--text);line-height:1.3}
.sch-item-v .sch-trainer{font-size:10px;color:var(--muted);margin-top:3px}
.sch-room-tag{font-size:9px;color:#f4a261;margin-top:3px;background:rgba(244,162,97,.1);border-radius:5px;padding:2px 4px;display:inline-block}
.sch-time-sm{font-size:9px;color:#6ab8f7;font-weight:600;margin-top:3px}
.sch-break td{background:rgba(244,162,97,.08)!important;border-color:rgba(244,162,97,.25)!important}
.att-marks{display:flex;gap:5px;margin-top:10px}
.amk{flex:1;padding:8px 4px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:var(--card2);color:var(--muted);transition:.15s}
.amk:hover{filter:brightness(1.15)}
.amk-p.on{background:rgba(46,204,113,.2);border-color:var(--green);color:var(--green)}
.amk-l.on{background:rgba(244,162,97,.2);border-color:var(--gold);color:var(--gold)}
.amk-a.on{background:rgba(231,76,60,.2);border-color:var(--red);color:#ff8a92}
.cc-footer{display:flex;gap:16px;font-size:12px;color:var(--muted);margin-top:10px}

/* ===== TABLE ===== */
.gtable{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;backdrop-filter:blur(10px)}
.gtable table{width:100%;border-collapse:collapse;font-size:13px}
.gtable th{padding:11px 14px;color:var(--muted);font-weight:500;text-align:right;border-bottom:1px solid var(--border);background:rgba(7,17,31,.4);font-size:11px;text-transform:uppercase;letter-spacing:.3px}
.gtable td{padding:11px 14px;text-align:right;border-bottom:1px solid rgba(100,160,220,.05);transition:background .15s}
.gtable tr:last-child td{border-bottom:none}
.gtable tr:hover td{background:rgba(100,160,220,.04)}

/* ===== INFO GRID ===== */
.igrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:22px}
.iitem{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 18px;backdrop-filter:blur(10px);transition:all .2s}
.iitem:hover{border-color:rgba(100,160,220,.25)}
.ilbl{font-size:11px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.ival{font-size:14px;font-weight:500}

/* ===== ALERT ===== */
.alert{border-radius:12px;padding:13px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px;font-size:13px;animation:fadeUp .4s ease}
.aw{background:rgba(244,162,97,.1);border:1px solid rgba(244,162,97,.25);color:#f4c78a}
.ad{background:rgba(230,57,70,.1);border:1px solid rgba(230,57,70,.25);color:#ff8a92}
.as{background:rgba(46,204,113,.1);border:1px solid rgba(46,204,113,.25);color:#2ecc71}
.ab{background:rgba(26,122,191,.1);border:1px solid rgba(26,122,191,.25);color:#6ab8f7}
.aicon{font-size:18px}

/* ===== BUTTONS ===== */
.btn{padding:9px 20px;border-radius:10px;font-family:'Tajawal',sans-serif;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .2s;position:relative;overflow:hidden}
.btn::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);width:100%;height:100%;background:rgba(255,255,255,.15);border-radius:50%;transition:transform .3s}
.btn:active::after{transform:translate(-50%,-50%) scale(2.5)}
.btn-r{background:var(--red);color:#fff}
.btn-r:hover{background:var(--red2);transform:translateY(-1px)}
.btn-b{background:var(--blue);color:#fff}
.btn-b:hover{background:var(--blue2);transform:translateY(-1px)}
.btn-g{background:var(--green);color:#fff}
.btn-g:hover{opacity:.9;transform:translateY(-1px)}
.btn-out{background:transparent;border:1px solid var(--border);color:var(--muted)}
.btn-out:hover{border-color:var(--red);color:var(--red)}
.btn-sm{padding:6px 14px;font-size:12px}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}

/* ===== SEARCH ===== */
.search-row{display:flex;gap:10px;margin-bottom:14px}
.search-row input,.search-row select{padding:10px 14px;background:rgba(7,17,31,.6);border:1px solid var(--border);border-radius:10px;font-family:'Tajawal',sans-serif;font-size:13px;color:var(--text);outline:none;transition:border-color .2s}
.search-row input{flex:1}
.search-row input:focus,.search-row select:focus{border-color:rgba(100,160,220,.4)}

/* ===== ATTENDANCE ===== */
.att-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px}
.att-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;backdrop-filter:blur(10px);transition:all .2s}
.att-card:hover{border-color:rgba(100,160,220,.25)}
.att-name{font-size:13px;font-weight:600;margin-bottom:4px}
.att-id{font-size:11px;color:var(--muted);margin-bottom:10px}
.att-btns{display:flex;gap:6px}
.abtn{flex:1;padding:8px;border-radius:8px;font-family:'Tajawal',sans-serif;font-size:12px;cursor:pointer;border:1px solid;font-weight:600;transition:all .15s}
.abtn-p{background:rgba(46,204,113,.1);border-color:rgba(46,204,113,.3);color:#2ecc71}
.abtn-p.sel,.abtn-p:hover{background:rgba(46,204,113,.3)}
.abtn-a{background:rgba(230,57,70,.1);border-color:rgba(230,57,70,.3);color:#ff8a92}
.abtn-a.sel,.abtn-a:hover{background:rgba(230,57,70,.3)}
.att-status{font-size:11px;color:var(--muted);margin-top:6px;text-align:center;min-height:16px}

/* ===== MODAL ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .3s ease}
.modal{background:#0d1d30;border:1px solid var(--border);border-radius:20px;padding:28px;width:100%;max-width:480px;animation:modalIn .4s cubic-bezier(.16,1,.3,1)}
.modal-title{font-size:17px;font-weight:700;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between}
.modal-close{background:transparent;border:none;color:var(--muted);font-size:20px;cursor:pointer;transition:color .2s}
.modal-close:hover{color:var(--text)}
.mform-group{margin-bottom:14px}
.mform-group label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.mform-group input,.mform-group select,.mform-group textarea{width:100%;padding:11px 14px;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:10px;font-family:'Tajawal',sans-serif;font-size:14px;color:var(--text);outline:none;transition:border-color .2s}
.mform-group input:focus,.mform-group select:focus,.mform-group textarea:focus{border-color:rgba(100,160,220,.4)}
.mform-group textarea{resize:vertical;min-height:80px}

/* ===== SCHEDULE ===== */
.sch-item{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:13px 16px;margin-bottom:10px;display:flex;align-items:center;gap:14px;backdrop-filter:blur(10px);transition:all .2s}
.sch-item:hover{border-color:rgba(100,160,220,.25);transform:translateX(-2px)}
.sch-time{background:rgba(26,122,191,.12);border:1px solid rgba(26,122,191,.25);color:#6ab8f7;padding:6px 12px;border-radius:8px;font-size:12px;font-weight:700;white-space:nowrap;text-align:center;min-width:75px}
.sch-day{font-size:10px;color:var(--muted);margin-top:2px}

/* ===== STAT BAR ===== */
.sbar{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.sbar:last-child{border-bottom:none}
.sbar-name{flex:1;font-size:13px}
.sbar-track{width:130px;background:rgba(255,255,255,.06);border-radius:4px;height:6px;overflow:hidden}
.sbar-fill{height:6px;border-radius:4px;background:linear-gradient(90deg,var(--blue),#6ab8f7);transition:width 1s ease}
.sbar-val{font-size:12px;color:var(--muted);min-width:38px;text-align:left}

/* ===== NOTIFICATION TOAST ===== */
.toast-container{position:fixed;top:20px;left:20px;z-index:500;display:flex;flex-direction:column;gap:8px}
.toast{background:#0d1d30;border:1px solid var(--border);border-radius:12px;padding:12px 16px;font-size:13px;display:flex;align-items:center;gap:10px;min-width:240px;box-shadow:0 8px 32px rgba(0,0,0,.3);animation:notifSlide .4s ease}
.toast.out{animation:notifOut .3s ease forwards}
.toast-icon{font-size:18px}
.toast-s{border-color:rgba(46,204,113,.3);background:rgba(13,40,25,.9)}
.toast-e{border-color:rgba(230,57,70,.3);background:rgba(40,13,13,.9)}
.toast-i{border-color:rgba(26,122,191,.3);background:rgba(13,25,40,.9)}

/* ===== GRADE INPUT ===== */
.grade-input{width:70px;padding:6px 10px;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:8px;font-family:'Tajawal',sans-serif;font-size:13px;color:var(--text);outline:none;text-align:center;transition:border-color .2s}
.grade-input:focus{border-color:rgba(100,160,220,.4)}

/* ===== REPORT CARD ===== */
.rep-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:12px;backdrop-filter:blur(10px)}
.rep-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.rep-title{font-size:15px;font-weight:700}

/* ===== FILE UPLOAD ===== */
.upload-zone{border:2px dashed rgba(100,160,220,.2);border-radius:14px;padding:30px;text-align:center;cursor:pointer;transition:all .3s;color:var(--muted);font-size:13px}
.upload-zone:hover{border-color:rgba(100,160,220,.5);background:rgba(100,160,220,.04);color:var(--text)}
.upload-zone.drag{border-color:var(--blue);background:rgba(26,122,191,.08)}
.file-list{margin-top:12px;display:flex;flex-direction:column;gap:8px}
.file-item{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:10px;font-size:13px}
.file-item .fi-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-item .fi-del{background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:16px;transition:color .2s}
.file-item .fi-del:hover{color:var(--red)}

/* ===== MOBILE NAV ===== */
.mob-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(7,17,31,.95);backdrop-filter:blur(20px);border-top:1px solid var(--border);z-index:200;padding:8px 0 env(safe-area-inset-bottom)}
.mob-nav-items{display:flex;justify-content:space-around}
.mni{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 10px;border:none;background:transparent;color:var(--muted);font-family:'Tajawal',sans-serif;font-size:10px;cursor:pointer;border-radius:12px;transition:all .2s;min-width:54px;position:relative}
.mni::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:0;height:2px;border-radius:2px;transition:width .2s}
.mni.as::before,.mni.act{width:24px;background:var(--red)}
.mni.at::before{width:24px;background:var(--blue)}
.mni.aa::before{width:24px;background:var(--gold)}
.mni.as{color:#ff8a92}
.mni.at{color:#6ab8f7}
.mni.aa{color:#f4c78a}
.mni-icon{font-size:20px}

/* ===== TERM FILTER ===== */
.term-tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.tterm{padding:7px 16px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Tajawal',sans-serif;font-size:12px;cursor:pointer;transition:all .2s}
.tterm:hover{border-color:rgba(100,160,220,.3);color:var(--text)}
.tterm.active{background:rgba(26,122,191,.15);border-color:rgba(26,122,191,.4);color:#6ab8f7}

/* ===== KPI CHART ===== */
.kpi-wrap{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;backdrop-filter:blur(10px);margin-bottom:16px}
.kpi-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:20px}
.kpi-card{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center;position:relative;overflow:hidden}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.kpi-val{font-size:26px;font-weight:900;line-height:1;margin-bottom:4px}
.kpi-lbl{font-size:11px;color:var(--muted)}
.kpi-bar-row{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.kpi-bar-label{width:90px;font-size:13px;flex-shrink:0;text-align:right}
.kpi-bar-track{flex:1;background:rgba(255,255,255,.05);border-radius:8px;height:28px;position:relative;overflow:hidden}
.kpi-bar-fill{height:100%;border-radius:8px;transition:width 1.2s cubic-bezier(.16,1,.3,1);display:flex;align-items:center;justify-content:flex-start;padding:0 10px}
.kpi-bar-val{font-size:12px;font-weight:700;color:#fff;white-space:nowrap}
.kpi-gauge{display:inline-block;position:relative}

/* EMPTY STATE */
.empty{text-align:center;padding:48px 20px;color:var(--muted);font-size:14px}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:.4}

/* RESPONSIVE */
@media(max-width:768px){
  .mob-nav{display:block}
  .sidebar{display:none!important}
  .dash-charts{grid-template-columns:1fr!important}
  .enr-grid{grid-template-columns:1fr!important}
  .mcontent{padding:14px 12px 110px!important}
  .topbar{padding:10px 12px;gap:6px}
  .metrics{grid-template-columns:1fr 1fr;gap:10px}
  .igrid{grid-template-columns:1fr}
  .banner{flex-direction:column;text-align:center;padding:16px}
  .att-grid{grid-template-columns:1fr 1fr}
  .mnum{font-size:24px}
  /* شريط تنقل عائم احترافي */
  .mob-nav{bottom:calc(10px + env(safe-area-inset-bottom));left:12px;right:12px;
    background:rgba(10,18,33,.82);backdrop-filter:blur(24px) saturate(160%);-webkit-backdrop-filter:blur(24px) saturate(160%);
    border:1px solid rgba(255,255,255,.08);border-radius:22px;padding:8px 6px;
    box-shadow:0 12px 40px rgba(0,0,0,.45),0 2px 8px rgba(0,0,0,.3)}
  .mob-nav-items{justify-content:space-around}
  .mni{min-width:52px;padding:7px 8px;border-radius:14px;font-size:9.5px;gap:4px}
  .mni-icon{font-size:21px}
  .mni.as,.mni.at,.mni.aa{background:rgba(255,255,255,.06)}
  .mni::before{top:auto;bottom:2px}
  /* هيدر أنظف على الجوال */
  .topbar{border-radius:0 0 18px 18px}
  .role-badge{font-size:11px;padding:5px 9px}
  .uname{font-size:12px;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .notif-btn,.out-btn{font-size:12px}
  .av{width:34px;height:34px}
  .stitle{font-size:15px}
  .mcard{padding:16px 14px}
  .micon{font-size:22px}
  .mlbl{font-size:11px}
  .banner .btitle{font-size:18px}
  /* جداول قابلة للتمرير أفقياً */
  .gtable{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .modal{max-width:94vw!important;margin:10px}
  .sch-controls{gap:8px}
  .sch-cfg select,.sch-cfg input{min-width:70px;font-size:12px}
}
@media(max-width:768px){
  body.light-mode .mob-nav{background:rgba(255,255,255,.85)!important;border:1px solid rgba(26,58,107,.1)!important;box-shadow:0 12px 40px rgba(26,58,107,.18)!important}
}

/* ===== EXTRA ANIMATIONS ===== */
@keyframes slideInRight{from{opacity:0;transform:translateX(60px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideInLeft{from{opacity:0;transform:translateX(-60px)}to{opacity:1;transform:translateX(0)}}
@keyframes bounceIn{0%{transform:scale(0.3);opacity:0}50%{transform:scale(1.05)}70%{transform:scale(0.9)}100%{transform:scale(1);opacity:1}}
@keyframes rubberBand{0%{transform:scaleX(1)}30%{transform:scaleX(1.25) scaleY(0.75)}40%{transform:scaleX(0.75) scaleY(1.25)}50%{transform:scaleX(1.15) scaleY(0.85)}65%{transform:scaleX(0.95) scaleY(1.05)}75%{transform:scaleX(1.05) scaleY(0.95)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}10%,30%,50%,70%,90%{transform:translateX(-8px)}20%,40%,60%,80%{transform:translateX(8px)}}
@keyframes flipIn{from{transform:perspective(400px) rotateY(90deg);opacity:0}to{transform:perspective(400px) rotateY(0);opacity:1}}
@keyframes zoomIn{from{transform:scale(0.5);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes tada{0%{transform:scale(1)}10%,20%{transform:scale(0.9) rotate(-3deg)}30%,50%,70%,90%{transform:scale(1.1) rotate(3deg)}40%,60%,80%{transform:scale(1.1) rotate(-3deg)}100%{transform:scale(1) rotate(0)}}
@keyframes wave{0%{transform:rotate(0deg)}15%{transform:rotate(14deg)}30%{transform:rotate(-8deg)}40%{transform:rotate(14deg)}50%{transform:rotate(-4deg)}60%{transform:rotate(10deg)}70%{transform:rotate(0deg)}100%{transform:rotate(0deg)}}
@keyframes typewriter{from{width:0}to{width:100%}}
@keyframes blink{0%,100%{border-color:transparent}50%{border-color:var(--red)}}
@keyframes morphBg{0%,100%{border-radius:60% 40% 30% 70%/60% 30% 70% 40%}50%{border-radius:30% 60% 70% 40%/50% 60% 30% 60%}}
@keyframes glitch{0%,100%{clip-path:polygon(0 0,100% 0,100% 100%,0 100%);transform:translate(0)}20%{clip-path:polygon(0 20%,100% 20%,100% 40%,0 40%);transform:translate(-3px,3px)}40%{clip-path:polygon(0 60%,100% 60%,100% 80%,0 80%);transform:translate(3px,-3px)}60%{clip-path:polygon(0 40%,100% 40%,100% 60%,0 60%);transform:translate(-3px)}80%{clip-path:polygon(0 80%,100% 80%,100% 100%,0 100%);transform:translate(3px,3px)}}
@keyframes neonPulse{0%,100%{text-shadow:0 0 4px rgba(255,255,255,.3)}50%{text-shadow:0 0 10px rgba(255,255,255,.8),0 0 20px rgba(230,57,70,.5)}}
@keyframes rippleEffect{0%{transform:scale(0);opacity:.6}100%{transform:scale(4);opacity:0}}
@keyframes borderRun{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}

/* HOVER EFFECTS */
.mcard{transition:all .5s cubic-bezier(.34,1.56,.64,1)!important}
.mcard:hover{transform:translateY(-6px) scale(1.02)!important;box-shadow:0 20px 50px rgba(0,0,0,.3)!important}
.mcard:active{transform:scale(0.97)!important;transition:all .1s!important}

.ccard{transition:all .5s cubic-bezier(.34,1.56,.64,1)!important}
.ccard:hover{transform:translateX(-6px) translateY(-2px) scale(1.01)!important;box-shadow:0 15px 40px rgba(0,0,0,.25)!important}

.sitem{transition:all .4s cubic-bezier(.34,1.56,.64,1)!important}
.sitem:hover{transform:translateX(-5px)!important;padding-right:22px!important}
.sitem.active{animation:slideInLeft .4s cubic-bezier(.34,1.56,.64,1)!important}

.btn{transition:all .4s cubic-bezier(.34,1.56,.64,1)!important;position:relative;overflow:hidden}
.btn:hover{transform:translateY(-2px) scale(1.03)!important}
.btn:active{transform:scale(0.95)!important}
.btn::after{content:'';position:absolute;inset:50% 50%;background:rgba(255,255,255,.2);border-radius:50%;transition:all .4s ease;width:0;height:0}
.btn:active::after{inset:-50%;width:200%;height:200%}

.mni{transition:all .45s cubic-bezier(.34,1.56,.64,1)!important}
.mni.as,.mni.at,.mni.aa{animation:bounceIn .5s cubic-bezier(.34,1.56,.64,1)!important}
.mni-icon{display:block;transition:transform .3s cubic-bezier(.34,1.56,.64,1)}
.mni:hover .mni-icon{transform:scale(1.3) rotate(-5deg)}
.mni:active .mni-icon{transform:scale(0.8)}

.alert{animation:slideInRight .7s cubic-bezier(.16,1,.3,1)!important}
.iitem{transition:all .5s cubic-bezier(.34,1.56,.64,1)!important}
.iitem:hover{transform:translateY(-3px) scale(1.02)!important;border-color:rgba(100,160,220,.4)!important}

/* PAGE TRANSITIONS */
.mcontent{animation:fadeIn .35s ease!important}

/* BANNER ANIMATION */
.banner{animation:slideInLeft .8s cubic-bezier(.16,1,.3,1)!important}
.wb-title{animation:fadeUp .9s .1s cubic-bezier(.16,1,.3,1) both!important}
.wb-badge{animation:bounceIn .9s .2s cubic-bezier(.34,1.56,.64,1) both!important}

/* NUMBER COUNTER */
.mnum{animation:zoomIn .8s cubic-bezier(.34,1.56,.64,1)!important}

/* LOGO */
.tb-brand img{transition:all .4s cubic-bezier(.34,1.56,.64,1)!important}
.tb-brand img:hover{transform:rotate(15deg) scale(1.15)!important}

/* PROGRESS BAR */
.pfill{animation:progressFill 1.5s cubic-bezier(.16,1,.3,1)!important}

/* NOTIFICATION BELL */
#topBell{animation:wave 2s ease-in-out infinite!important}

/* LOGIN CARD */
.rtab{transition:all .5s cubic-bezier(.34,1.56,.64,1)!important}
.rtab:hover{transform:translateY(-3px) scale(1.05)!important}
.rtab.rs,.rtab.rt,.rtab.ra{animation:rubberBand .6s!important}

.lbtn{transition:all .5s cubic-bezier(.34,1.56,.64,1)!important}
.lbtn:hover{transform:translateY(-3px) scale(1.02)!important;box-shadow:0 10px 30px rgba(0,0,0,.3)!important}
.lbtn:active{transform:scale(0.96)!important}

/* TABLE ROWS */
.gtable tr{transition:all .4s ease!important}
.gtable tr:hover td{background:rgba(100,160,220,.08)!important;transform:translateX(-3px)!important}

/* ATT CARDS */
.att-card{transition:all .5s cubic-bezier(.34,1.56,.64,1)!important}
.att-card:hover{transform:translateY(-4px) scale(1.03)!important;border-color:rgba(100,160,220,.4)!important}

.abtn{transition:all .4s cubic-bezier(.34,1.56,.64,1)!important}
.abtn:active{transform:scale(0.9)!important}

/* SCHEDULE */
.sch-item{transition:all .5s cubic-bezier(.34,1.56,.64,1)!important}
.sch-item:hover{transform:translateX(-8px) scale(1.01)!important;border-color:rgba(100,160,220,.4)!important}

/* RIPPLE ON CLICK */
.ripple-effect{position:absolute;border-radius:50%;background:rgba(255,255,255,.3);animation:rippleEffect 1s linear;pointer-events:none}

/* TOAST */
.toast{animation:slideInRight .6s cubic-bezier(.16,1,.3,1)!important}

/* TX BUTTON */
#txBtn{transition:all .5s cubic-bezier(.34,1.56,.64,1)!important}
#txBtn:hover{transform:scale(1.15) rotate(15deg)!important}
#txBtn:active{transform:scale(0.9)!important}


/* ===== LIGHT MODE ===== */
body.light-mode{
  --bg:#f0f4fa;
  --bg2:#ffffff;
  --bg3:#e8edf5;
  --card:rgba(255,255,255,0.9);
  --text:#1a2a4a;
  --muted:#6b7a99;
  --border:rgba(26,58,107,0.12);
}
body.light-mode .topbar{background:rgba(255,255,255,0.9)!important;border-bottom:1px solid rgba(26,58,107,0.1)}
body.light-mode .sidebar{background:rgba(255,255,255,0.8)!important;border-left:1px solid rgba(26,58,107,0.1)}

// قراءة رقم مرنة: تحوّل الأرقام العربية، تشيل المسافات والفواصل، وتستخرج الرقم
function num(v){
  if(v==null||v==='')return 0;
  let s=String(v).trim();
  // تحويل الأرقام العربية-الهندية إلى لاتينية
  const ar='٠١٢٣٤٥٦٧٨٩',fa='۰۱۲۳۴۵۶۷۸۹';
  s=s.replace(/[٠-٩]/g,d=>ar.indexOf(d)).replace(/[۰-۹]/g,d=>fa.indexOf(d));
  // فاصلة عربية أو عادية → نقطة عشرية · إزالة أي شيء غير رقمي
  s=s.replace(/٫/g,'.').replace(/,/g,'.').replace(/[^\d.\-]/g,'');
  const n=parseFloat(s);
  return isNaN(n)?0:n;
}

async function fetchSheet(range){
  const ctrl=new AbortController();
  const t=setTimeout(()=>ctrl.abort(),8000);
  try{
    const r=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SID}/values/${encodeURIComponent(range)}?key=${AKEY}`,{signal:ctrl.signal});
    clearTimeout(t);
    if(!r.ok)throw new Error(r.status);
    const d=await r.json();
    return d.values||[];
  }catch(e){clearTimeout(t);throw e;}
}

// ===== JSONP عام (للطلبات التي تحتاج رد من Apps Script) =====
function jsonpCall(params){
  return new Promise((resolve,reject)=>{
    const cb='cb_'+Date.now()+'_'+Math.floor(Math.random()*1000);
    const timer=setTimeout(()=>{delete window[cb];document.getElementById('jsonp_'+cb)?.remove();reject(new Error('timeout'));},15000);
    window[cb]=(d)=>{
      clearTimeout(timer);
      delete window[cb];
      document.getElementById('jsonp_'+cb)?.remove();
      resolve(d);
    };
    const qs=Object.entries(params).map(([k,v])=>k+'='+encodeURIComponent(v)).join('&');
    const s=document.createElement('script');
    s.id='jsonp_'+cb;
    s.src=SCRIPT_URL+'?'+qs+'&callback='+cb;
    s.onerror=()=>{clearTimeout(timer);delete window[cb];reject(new Error('network'))};
    document.head.appendChild(s);
  });
}

// مُعرّف فريد للجهاز (يُحفظ في المتصفح)
function getDeviceId(){
  let id=localStorage.getItem('bla_device_id');
  if(!id){id='dev_'+Date.now()+'_'+Math.random().toString(36).slice(2,10);localStorage.setItem('bla_device_id',id);}
  return id;
}
// هل هذا الجهاز موثوق لهذا المستخدم؟
function isDeviceTrusted(userId){
  try{
    const trusted=JSON.parse(localStorage.getItem('bla_trusted_devices')||'{}');
    return trusted[String(userId)]===getDeviceId();
  }catch(e){return false;}
}
// حفظ الجهاز كموثوق لهذا المستخدم
function trustDevice(userId){
  try{
    const trusted=JSON.parse(localStorage.getItem('bla_trusted_devices')||'{}');
    trusted[String(userId)]=getDeviceId();
    localStorage.setItem('bla_trusted_devices',JSON.stringify(trusted));
  }catch(e){}
}

// ===== LOGIN =====
async function doLogin(){
  const sid=document.getElementById('inpId').value.trim();
  const sph=norm(document.getElementById('inpPh').value.trim());
  if(!sid||!sph){showErr('يرجى إدخال البيانات');return}
  document.getElementById('errBox').style.display='none';
  document.getElementById('lbtn').disabled=true;
  document.getElementById('ldg').style.display='block';
  try{
    if(role==='a'){
      let f=null;
      // أولاً: ابحث في تبويب قاعدة بيانات الاداريين
      // A=الرقم الوظيفي B=الاسم C=المسمى D=الجوال E=البريد F=الرقم السري G=الصلاحية
      try{
        const rows=await fetchSheet('قاعدة بيانات الاداريين!A:G');
        for(let i=1;i<rows.length;i++){
          const r=rows[i];
          if(!r[0])continue;
          const pw=norm(r[5])||norm(r[3]); // الرقم السري (F)، وإن فضي فالجوال (D)
          if(n0(r[0])===sid&&(pw===sph||norm(r[3])===sph)){
            const lvl=n0(r[6]).includes('مدير')?'director':'supervisor';
            f={id:n0(r[0]),name:n0(r[1]),title:n0(r[2])||'إداري',ph:n0(r[3]),email:n0(r[4]),level:lvl,role:'a'};
            break;
          }
        }
      }catch(e){/* لو التبويب غير موجود نكمل للاحتياط */}
      // احتياط: حسابات الكود الثابتة
      if(!f){
        const a=ADMIN.find(a=>norm(a.id)===norm(sid)&&norm(a.ph)===sph);
        if(a)f={...a,role:'a'};
      }
      if(!f)throw new Error('not found');
      user=f;
    } else if(role==='t'){
      const rows=await fetchSheet('قاعدة بيانات المدربين!A:F');
      let f=null;
      for(let i=1;i<rows.length;i++){
        const r=rows[i];
        if(!r[0])continue;
        const secret=norm(r[5]); // العمود F = الرمز السري
        const phone=norm(r[3]);  // العمود D = الجوال
        const pwOK=secret?(secret===sph||secret===norm('0'+sph)):(phone===sph||phone===norm('0'+sph));
        if(n0(r[0])===sid&&pwOK){
          f={id:n0(r[0]),name:n0(r[1]),spec:n0(r[2]),ph:n0(r[3]),email:n0(r[4]),role:'t'};break;
        }
      }
      if(!f)throw new Error('not found');
      user=f;
    } else {
      const rows=await fetchSheet('قاعدة بيانات مركزي!A:H');
      let f=null;
      for(let i=1;i<rows.length;i++){
        const r=rows[i];
        if(!r[0])continue;
        const secret=norm(r[7]); // العمود H = الرمز السري
        const phone=norm(r[4]);  // العمود E = الجوال
        const pwOK=secret?(secret===sph||secret===norm('0'+sph)):(phone===sph||phone===norm('0'+sph));
        if(n0(r[0])===sid&&pwOK){
          f={id:n0(r[0]),name:n0(r[1]),grp:n0(r[2]),spec:n0(r[3]),ph:n0(r[4]),email:n0(r[5]),cert:n0(r[6]),role:'s'};break;
        }
      }
      if(!f)throw new Error('not found');
      user=f;
    }
    // ✅ نجح التحقق من كلمة السر — الآن نتحقق من الجهاز (2FA)
    if(!OTP_ENABLED||isDeviceTrusted(user.id)){
      // OTP معطّل أو جهاز موثوق → دخول مباشر
      await loadUserData();
      finishLogin();
    }else{
      // جهاز جديد → أرسل رمز للإيميل
      if(!user.email||!user.email.includes('@')){
        // ما عنده إيميل صالح → دخول بدون 2FA (مع تنبيه)
        await loadUserData();
        finishLogin();
        setTimeout(()=>showToast('⚠️ ما عندك إيميل مسجّل — يُنصح بإضافته للأمان','w'),800);
      }else{
        pendingUser={user:JSON.parse(JSON.stringify(user)),role};
        document.getElementById('lbtn').disabled=false;
        document.getElementById('ldg').style.display='none';
        await startOTPFlow();
      }
    }
    return;
  }catch(e){showErr('بيانات الدخول غير صحيحة');}
  document.getElementById('lbtn').disabled=false;
  document.getElementById('ldg').style.display='none';
}

async function confirmOTP(){
  const code=document.getElementById('otp-input').value.trim();
  if(code.length!==6){document.getElementById('otp-status').innerHTML='<span style="color:var(--red)">أدخل 6 أرقام</span>';return;}
  document.getElementById('otp-status').innerHTML='<span style="color:var(--muted)">جاري التحقق...</span>';
  try{
    const res=await verifyOTP(pendingUser.user.id,code);
    if(res&&res.status==='ok'){
      // ✅ رمز صحيح
      user=pendingUser.user;
      role=pendingUser.role;
      trustDevice(user.id); // احفظ الجهاز كموثوق
      closeOTPModal();
      document.getElementById('ldg').style.display='block';
      await loadUserData();
      finishLogin();
      pendingUser=null;
    }else{
      document.getElementById('otp-status').innerHTML='<span style="color:var(--red)">❌ '+((res&&res.msg)||'رمز غير صحيح')+'</span>';
    }
  }catch(e){
    document.getElementById('otp-status').innerHTML='<span style="color:var(--red)">تعذر التحقق — جرب مرة أخرى</span>';
  }
}

// ===== UTILS =====
function pillClass(p){return p>=80?'pg':p>=60?'py':'pr'}
function fillClass(p){return p>=80?'pf-g':p>=60?'pf-y':'pf-r'}
function ccClass(p){return p>=80?'cc-g':p>=60?'cc-y':'cc-r'}
// ===== منطق المشاكل الفعلية =====
// أداء منخفض: فقط للمواد التي اترصدت درجتها (>0) وليست حالية (لسه ما خلصت)
function isLowPerf(c){return !isActive(c.status) && c.pct>0 && c.pct<60}
// ===== رصد الرسوب (متطلبات) =====
// راسب = درجة أقل من 60 (ومرصودة) أو الحرفي راسب (F/هـ/راسب/محروم)
function isFailed(c){
  const g=parseFloat(c.pct)||0;
  const L=String(c.letter||'').replace(/\s+/g,'').trim();
  const failLetters=['F','f','هـ','ه','راسب','محروم','ر'];
  const letterFail=failLetters.some(x=>L===x||L.includes('راسب')||L.includes('محروم'));
  // نعتبره راسباً لو الدرجة مرصودة (>0) وأقل من 60، أو الحرفي راسب
  return (g>0&&g<60)||letterFail;
}
// ===== مستويات الإنذار للغياب =====
// 10% إنذار أول | 20% إنذار ثاني | 25% محروم
function absLevel(abs){
  abs=parseFloat(abs)||0;
  if(abs>=25)return {key:'deprived',label:'محروم',color:'var(--red)',pill:'pr'};
  if(abs>=20)return {key:'warn2',label:'إنذار ثاني',color:'#ff8a3c',pill:'pr'};
  if(abs>=10)return {key:'warn1',label:'إنذار أول',color:'#f4c78a',pill:'py'};
  return {key:'ok',label:'منتظم',color:'var(--green)',pill:'pg'};
}
function isDeprived(abs){return (parseFloat(abs)||0)>=25}
// غياب عالي للاشعارات: من الإنذار الأول (10%) فأكثر
function isHighAbs(c){return (parseFloat(c.abs)||0)>=10}
// مشكلة عامة (للعدّ والتلوين)
function hasIssue(c){return isHighAbs(c)||isLowPerf(c)}
// ===== حساب ساعات المادة في النصف المجزأ =====
// ساعات الاتصال أسبوعية × 8 أسابيع = إجمالي ساعات النصف المجزأ
const WEEKS_PER_HALF=8;
// كشف التدريب التعاوني (حالة خاصة: ساعات إجمالية مباشرة + خارج الجدول الأسبوعي)
function isCoopTraining(code){
  const cat=catalog.find(c=>normCode(c.code)===normCode(code));
  const name=cat?cat.name:'';
  return /تدريب\s*تعاوني|التعاوني/.test(name);
}
function courseTotalHours(code){
  const cat=catalog.find(c=>normCode(c.code)===normCode(code));
  const hours=cat?parseFloat(cat.hours)||0:0;
  // التدريب التعاوني: الرقم إجمالي مباشر (تدريب ميداني فصل كامل)
  if(isCoopTraining(code))return hours;
  // باقي المواد: ساعات أسبوعية × عدد الأسابيع
  return hours*WEEKS_PER_HALF;
}
// نسبة الغياب = (ساعات الغياب ÷ إجمالي ساعات المادة) × 100
function absHoursToPct(absHours,code){
  const total=courseTotalHours(code);
  if(!total)return 0;
  return Math.min(Math.round((absHours/total)*1000)/10,100); // خانة عشرية واحدة
}
// تحويل تاريخ (YYYY-MM-DD) إلى اسم اليوم بالعربي
function dateToArDay(dateStr){
  try{
    const d=new Date(dateStr+'T00:00:00');
    const map=['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
    return map[d.getDay()];
  }catch(e){return '';}
}
// عدد حصص مادة معيّنة في يوم أسبوع معيّن (من الجدول المحفوظ، عبر كل الشعب التي يدرسها الطالب)
function courseSessionsOnDay(course,grp,day){
  let count=0;
  const nrm=s=>String(s||'').replace(/\s+/g,' ').trim();
  const g=schedule[grp];
  if(g){
    for(const slot in g){
      const [d]=slot.split('|');
      if(d===day&&nrm(g[slot].course)===nrm(course))count++;
    }
  }
  return count;
}

// ===== نظام الغياب الجديد (بالأيام · مربوط بالجدول) =====
// كم يوم بالأسبوع فيه حصص لهذه المادة (يبحث في الشعبة المحددة، وإن لم يجد ففي كل الشعب)
function courseDaysPerWeek(course,grp){
  const nrm=s=>String(s||'').replace(/\s+/g,' ').trim();
  const target=nrm(course);
  // دالة مساعدة: تجمع أيام المادة في شعبة معيّنة
  const daysInGrp=(g)=>{
    const set=new Set();
    if(g)for(const slot in g){const [d]=slot.split('|');if(nrm(g[slot].course)===target)set.add(d);}
    return set;
  };
  // أولاً: ابحث في الشعبة المحددة
  let daysSet=daysInGrp(schedule[grp]);
  // إن لم نجد في الشعبة المحددة، ابحث في كل الشعب (قد يكون grp مختلفاً)
  if(daysSet.size===0){
    for(const g in schedule){
      const s=daysInGrp(schedule[g]);
      if(s.size>0){daysSet=s;break;}
    }
  }
  return daysSet.size;
}
// إجمالي أيام المادة في الترم = أيام الأسبوع × عدد الأسابيع (افتراضي 8)
function courseTotalDays(course,grp){
  const dpw=courseDaysPerWeek(course,grp);
  return dpw*(typeof WEEKS_PER_HALF!=='undefined'?WEEKS_PER_HALF:8);
}
// تحويل أيام الغياب إلى نسبة مئوية (غياب يوم=1 · متأخر=0.5)
function absDaysToPct(absDays,course,grp){
  const total=courseTotalDays(course,grp);
  if(!total)return 0;
  return Math.min(Math.round(absDays/total*1000)/10,100);
}
// تحويل النسبة المئوية إلى أيام غياب (للعرض/التعديل)
function pctToAbsDays(pct,course,grp){
  const total=courseTotalDays(course,grp);
  return Math.round(pct/100*total*2)/2; // تقريب لأقرب نص يوم
}
// ما هي مواد اليوم (حسب الجدول) لمدرب معيّن — تُرجع المواد التي لها حصة اليوم
function todayCoursesForTrainer(trainerName,dayName){
  const nrm=s=>String(s||'').replace(/\s+/g,' ').trim();
  const found=new Map(); // course → {course, grps:Set}
  for(const grp in schedule){
    const g=schedule[grp];
    for(const slot in g){
      const [d]=slot.split('|');
      if(d===dayName && nrm(g[slot].trainer)===nrm(trainerName)){
        const c=g[slot].course;
        if(!found.has(c))found.set(c,{course:c,code:g[slot].code,grps:new Set()});
        found.get(c).grps.add(grp);
      }
    }
  }
  return [...found.values()];
}

// ===== المصدر الوحيد للحقيقة: حساب نسب الغياب من تبويب "قاعدة الغياب" =====
// خريطة عامة: مفتاح "sidDigits|codeDigits" → مجموع أيام الغياب
let absenceDaysMap={};
// تحميل "قاعدة الغياب" وبناء خريطة أيام الغياب لكل طالب/مادة
async function loadAbsenceBase(){
  absenceDaysMap={};
  try{
    const rows=await fetchSheet('قاعدة الغياب!A:G').catch(()=>[]);
    const onlyDigits=s=>String(s||'').replace(/[^0-9]/g,'');
    // الأعمدة: A=الرقم · B=الاسم · C=المادة · D=رمز · E=شعبة · F=التاريخ · G=الحالة
    for(let i=1;i<rows.length;i++){
      const r=rows[i];
      const sid=onlyDigits(r[0]);
      const code=onlyDigits(r[3]);
      if(!sid)continue;
      const status=String(r[6]||'').trim();
      const days=(status==='متأخر')?0.5:1; // غائب=1 · متأخر=0.5
      const key=sid+'|'+code;
      absenceDaysMap[key]=(absenceDaysMap[key]||0)+days;
    }
  }catch(e){}
}
// حساب نسبة الغياب لطالب في مادة من الخريطة (تعتمد على الجدول لإجمالي الأيام)
function absPctFromBase(sid,code,course,grp){
  const onlyDigits=s=>String(s||'').replace(/[^0-9]/g,'');
  const key=onlyDigits(sid)+'|'+onlyDigits(code);
  const absDays=absenceDaysMap[key]||0;
  const total=courseTotalDays(course,grp);
  if(!total)return 0;
  return Math.min(Math.round(absDays/total*1000)/10,100);
}
function excuseHoursFromDates(course,grp,dates){
  const perHour=schedConfig.periodHours||2;
  let totalHrs=0;
  const breakdown=[];
  (dates||[]).forEach(dt=>{
    const day=dateToArDay(dt);
    const sessions=courseSessionsOnDay(course,grp,day);
    const hrs=sessions*perHour;
    totalHrs+=hrs;
    breakdown.push({date:dt,day,sessions,hrs});
  });
  return {totalHrs,breakdown};
}
function normCode(c){return String(c||'').replace(/\s+/g,'').trim()}
// مفتاح موحّد للطالب: يحوّل الأرقام العربية ويزيل الرموز/المسافات لمنع التكرار
function sidKey(s){
  const raw=String((s&&s.sid)||'');
  const en=raw.replace(/[٠-٩]/g,d=>'٠١٢٣٤٥٦٧٨٩'.indexOf(d));
  const digits=en.replace(/\D/g,'').trim();
  return digits||raw.replace(/\s+/g,'').trim();
}
// فحص موحّد لحالة "حالي" (يتسامح مع المسافات والتشكيل والصيغ المختلفة)
function isActive(status){
  const s=String(status||'').replace(/\s+/g,'').replace(/[ًٌٍَُِّْ]/g,'').trim();
  return s==='حالي'||s==='حالى'||s.startsWith('حالي');
}
// إزالة تكرار الطلاب في مادة: طالب واحد لكل رقم أكاديمي (يحتفظ بأول شعبة)
function uniqStudents(arr){
  const map=new Map();
  arr.forEach(s=>{
    const k=sidKey(s);
    if(!map.has(k)||(s.grp&&map.get(k).grp&&String(s.grp)<String(map.get(k).grp)))map.set(k,s);
  });
  return [...map.values()];
}

// ===== مولّد الجدول الأوتوماتيكي =====
// ساعات الاتصال الأسبوعية لمادة (من قاعدة المقررات حسب الرمز)
function weeklyHours(code){
  const cat=catalog.find(c=>normCode(c.code)===normCode(code));
  return cat?(parseFloat(cat.hours)||0):0;
}
// تنسيق الوقت (رقم عشري لساعة بصيغة 12)
function fmtTime(h){
  h=((h%24)+24)%24;
  let hr=Math.floor(h), mn=Math.round((h-hr)*60);
  if(mn===60){hr++;mn=0;}
  const ampm=hr<12?'ص':'م';
  let h12=hr%12; if(h12===0)h12=12;
  return `${h12}:${String(mn).padStart(2,'0')} ${ampm}`;
}
// وقت الحصة رقم p (تبدأ من 0) — مع تخطّي وقت الاستراحة الثابت (12-1 ظهراً)
function periodTime(p){
  let s=schedConfig.startHour+p*schedConfig.periodHours;
  // الاستراحة ثابتة: إذا تجاوزت الحصة وقت بداية الاستراحة، تنزاح بمقدار مدتها
  const bStart=schedConfig.breakStart||12;  // بداية الاستراحة (12 ظهراً)
  const bHrs=schedConfig.breakHours||1;     // مدة الاستراحة (ساعة)
  if(schedConfig.breakStart&&s>=bStart)s+=bHrs;
  const e=s+schedConfig.periodHours;
  return fmtTime(s)+' - '+fmtTime(e);
}
// وقت الاستراحة الثابت (12-1 ظهراً افتراضياً)
function breakTime(){
  const s=schedConfig.breakStart||12;
  return fmtTime(s)+' - '+fmtTime(s+(schedConfig.breakHours||1));
}
// تحديد الحصة التي تأتي الاستراحة بعدها (للعرض في الجدول)
function breakAfterPeriod(){
  if(!schedConfig.breakStart)return -1;
  const bStart=schedConfig.breakStart;
  for(let p=0;p<schedConfig.periodsPerDay;p++){
    const pEnd=schedConfig.startHour+(p+1)*schedConfig.periodHours;
    if(pEnd>=bStart)return p; // الاستراحة بعد هذه الحصة
  }
  return schedConfig.periodsPerDay-1;
}
// يجلب المواد الحالية لشعبة + مدربيها + يحسب عدد الحصص الأسبوعية
function coursesForSchedule(grp){
  const seen={};
  const list=[];
  allCourses.forEach(c=>{
    if(c.grp!==grp)return;
    if(!isActive(c.status))return;
    if(isCoopTraining(c.code))return; // التدريب التعاوني ميداني — خارج الجدول الأسبوعي
    const key=normCode(c.code)||c.course;
    if(seen[key])return;
    seen[key]=1;
    const weekly=weeklyHours(c.code); // ساعات الاتصال الأسبوعية من القاعدة
    const sess=Math.max(1,Math.round(weekly/schedConfig.periodHours)||1);
    list.push({code:c.code,course:c.course,trainer:c.trainer||'—',weekly,sessions:Math.min(sess,DAYS.length)});
  });
  return list;
}
// التحقق من تعارض المدرب في نفس اليوم+الحصة عبر كل الشعب
function trainerBusy(grp,day,period,trainer,course){
  if(!trainer||trainer==='—')return false;
  const nrm=s=>String(s||'').replace(/\s+/g,' ').trim();
  const tn=nrm(trainer);
  const cn=nrm(course);
  const slot=day+'|'+period;
  for(const g in schedule){
    if(g===grp)continue;
    const cell=schedule[g]&&schedule[g][slot];
    // السماح فقط إذا كان نفس المدرب ينادي نفس المادة (sections من نفس المادة)
    if(cell&&nrm(cell.trainer)===tn){
      if(nrm(cell.course)!==cn)return true; // تعارض: مادة مختلفة
    }
  }
  return false;
}
// التحقق من تعارض المعمل في نفس اليوم+الحصة عبر كل الشعب
// السماح بنفس القاعة فقط إذا كانت شعب مدمجة (نفس مادة + نفس مدرب)
function labBusy(grp,day,period,room,course,trainer){
  if(!room)return false;
  const nrm=s=>String(s||'').replace(/\s+/g,' ').trim();
  const slot=day+'|'+period;
  for(const g in schedule){
    if(g===grp)continue;
    const cell=schedule[g]&&schedule[g][slot];
    if(cell&&cell.room===room){
      // إذا كانت شعب مدمجة (نفس مادة + نفس مدرب) → مسموح مشاركة القاعة
      if(course&&trainer&&nrm(cell.course)===nrm(course)&&nrm(cell.trainer)===nrm(trainer))continue;
      return true; // قاعة محجوزة بمادة/مدرب مختلف
    }
  }
  return false;
}
// اختيار أول معمل متاح لخانة
function freeLab(grp,day,period){
  for(const lab of LABS){if(!labBusy(grp,day,period,lab))return lab;}
  return LABS[0];
}
// الأيام الفعّالة حسب الإعداد
function activeDays(){return DAYS.slice(0,Math.min(schedConfig.daysCount||DAYS.length,DAYS.length));}
// توليد جدول لشعبة واحدة — تعبئة مضغوطة من الأحد + أوقات مبكرة + أيام أقل
function generateScheduleFor(grp){
  const courses=coursesForSchedule(grp);
  const grid={};
  const P=schedConfig.periodsPerDay;
  const days=activeDays();
  const nrm=s=>String(s||'').replace(/\s+/g,' ').trim();
  // بناء قائمة حصص بترتيب round-robin (حصة من كل مادة بالتناوب)
  const queue=[];
  const maxSess=Math.max(0,...courses.map(c=>c.sessions));
  for(let r=0;r<maxSess;r++){
    courses.forEach(c=>{if(r<c.sessions)queue.push(c);});
  }
  // الخانات بالترتيب: الأحد أولاً ثم الأبكر فالأبكر
  const slots=[];
  for(const d of days){for(let p=0;p<P;p++){slots.push({day:d,p});}}
  // تتبّع آخر يوم استُخدم لكل مادة (تجنّب حصتين بنفس اليوم إن أمكن)
  const courseDayCount={};
  queue.forEach(c=>{
    let bestSlot=null;
    let fallback=null;
    // مرّ على الخانات بالترتيب، اختر أول خانة متاحة تحقق الشروط
    for(const s of slots){
      const slot=s.day+'|'+s.p;
      if(grid[slot])continue;
      // فحص تعارض المدرب عالمياً: مسموح فقط إذا كان يعلّم نفس المادة (شعب مدمجة)
      let trainerConflict=false;
      if(c.trainer&&c.trainer!=='—'){
        for(const og in schedule){
          if(og===grp)continue;
          const oc=schedule[og]&&schedule[og][slot];
          if(oc&&nrm(oc.trainer)===nrm(c.trainer)&&nrm(oc.course)!==nrm(c.course)){
            trainerConflict=true;break;
          }
        }
      }
      if(trainerConflict)continue; // تخطّ هذه الخانة — المدرب مشغول بمادة مختلفة
      const dk=c.code+'|'+s.day;
      if(courseDayCount[dk]){if(!fallback)fallback=s;continue;}
      bestSlot=s;break;
    }
    const chosen=bestSlot||fallback;
    if(chosen){
      const slot=chosen.day+'|'+chosen.p;
      if(!grid[slot]){
        // محاولة استخدام نفس القاعة إذا كانت الشعبة المدمجة بنفس المادة/الوقت
        let room=null;
        for(const og in schedule){
          if(og===grp)continue;
          const oc=schedule[og]&&schedule[og][slot];
          if(oc&&nrm(oc.trainer)===nrm(c.trainer)&&nrm(oc.course)===nrm(c.course)&&oc.room){
            room=oc.room;break; // نفس القاعة للشعب المدمجة
          }
        }
        if(!room)room=freeLab(grp,chosen.day,chosen.p);
        grid[slot]={code:c.code,course:c.course,trainer:c.trainer,room};
        courseDayCount[c.code+'|'+chosen.day]=(courseDayCount[c.code+'|'+chosen.day]||0)+1;
      }
    }
  });
  schedule[grp]=grid;
  return grid;
}
// توليد كل الشعب (يحترم تعارض المدرب والمعمل عالمياً)
function generateAllSchedules(){
  const grps=[...new Set(students.map(s=>s.grp))].filter(Boolean).sort();
  schedule={};
  grps.forEach(g=>generateScheduleFor(g));
}
// توليد بضغطة زر
function genSchedule(grp){
  generateScheduleFor(grp);
  showToast('تم توليد جدول الشعبة '+grp,'s');
  showAPage('schedule',null);
}
// توليد كل الشعب بضغطة زر
function genAllSchedule(){
  generateAllSchedules();
  showToast('تم توليد جدول كل الشعب','s');
  showAPage('schedule',null);
}
// ===== حفظ وقراءة الجدول من الشيت =====
// حفظ الجدول كله في تبويب "جدول الحصص"
async function saveSchedule(){
  const records=[];
  for(const grp in schedule){
    for(const slot in schedule[grp]){
      const c=schedule[grp][slot];
      const [day,p]=slot.split('|');
      records.push({grp,day,period:(parseInt(p)+1),time:periodTime(parseInt(p)),course:c.course,trainer:c.trainer||'',room:c.room||''});
    }
  }
  const filledGrps=Object.keys(schedule).filter(g=>schedule[g]&&Object.keys(schedule[g]).length);
  // حفظ مباشر بدون تأكيد — الشعب الفاضية تظهر "ما عندك جدول" للطالب/المدرب
  showToast('جاري حفظ الجدول...','i');
  try{
    await fetch(SCRIPT_URL,{method:'POST',mode:'no-cors',body:JSON.stringify({action:'saveSchedule',records,config:schedConfig}),headers:{'Content-Type':'text/plain'}});
    showToast(`✅ تم حفظ الجدول (${filledGrps.length} شعبة) — يقدر الطلاب والمدربين يشوفونه`,'s');
  }catch(e){showToast('تعذر الحفظ — جرب مرة أخرى','e');}
}
// قراءة الجدول المحفوظ من الشيت
// الأعمدة: A=الشعبة B=اليوم C=الحصة D=الوقت E=المادة F=المدرب G=القاعة
async function loadSchedule(){
  const rows=await fetchSheet('الجدول!A:G').catch(()=>[]);
  schedule={};
  for(let i=1;i<rows.length;i++){
    const r=rows[i];
    if(!n0(r[0])||!n0(r[1]))continue;
    const grp=n0(r[0]), day=n0(r[1]), p=(parseInt(n0(r[2]))||1)-1;
    const slot=day+'|'+p;
    if(!schedule[grp])schedule[grp]={};
    schedule[grp][slot]={course:n0(r[4]),trainer:n0(r[5]),room:n0(r[6])};
  }
  // تحميل إعدادات الجدول المحفوظة (الاستراحة، الأوقات...) إن وُجدت
  const cfg=await fetchSheet('إعدادات_الجدول!A:B').catch(()=>[]);
  if(cfg&&cfg.length>1){
    const map={};
    for(let i=1;i<cfg.length;i++){if(n0(cfg[i][0]))map[n0(cfg[i][0])]=cfg[i][1];}
    const num=(k,d)=>map[k]!==undefined&&map[k]!==''?parseFloat(map[k]):d;
    schedConfig={
      periodsPerDay:num('periodsPerDay',5),
      periodHours:num('periodHours',2),
      startHour:num('startHour',8),
      daysCount:num('daysCount',5),
      breakStart:num('breakStart',12),
      breakHours:num('breakHours',1)
    };
  }
}
// ===== تقرير الجدول القابل للطباعة =====
// جداول المدربين: {مدرب: {يوم|حصة: {course,grp,room}}}
function buildTrainerSchedules(){
  const res={};
  const nrm=s=>String(s||'').replace(/\s+/g,' ').trim();
  for(const grp in schedule){
    for(const slot in schedule[grp]){
      const c=schedule[grp][slot];
      if(!c.trainer||c.trainer==='—')continue;
      if(!res[c.trainer])res[c.trainer]={};
      // دمج الشعب: نفس وقت + نفس مادة → نجمع الشعب
      const ex=res[c.trainer][slot];
      if(ex&&nrm(ex.course)===nrm(c.course)){
        if(!ex.grps.includes(grp))ex.grps.push(grp);
        if(c.room&&!ex.rooms.includes(c.room))ex.rooms.push(c.room);
      }else{
        res[c.trainer][slot]={course:c.course,grps:[grp],rooms:c.room?[c.room]:[]};
      }
    }
  }
  return res;
}
// جداول القاعات: {قاعة: {يوم|حصة: {course,grps,trainer}}}
function buildRoomSchedules(){
  const res={};
  const nrm=s=>String(s||'').replace(/\s+/g,' ').trim();
  for(const grp in schedule){
    for(const slot in schedule[grp]){
      const c=schedule[grp][slot];
      const room=c.room||'غير محدد';
      if(!res[room])res[room]={};
      // دمج الشعب: نفس وقت + نفس مادة + نفس مدرب → نجمع الشعب
      const ex=res[room][slot];
      if(ex&&nrm(ex.course)===nrm(c.course)&&nrm(ex.trainer)===nrm(c.trainer)){
        if(!ex.grps.includes(grp))ex.grps.push(grp);
      }else{
        res[room][slot]={course:c.course,grps:[grp],trainer:c.trainer};
      }
    }
  }
  return res;

// بناء جدول HTML من شبكة + دالة عرض الخلية (مع عمود الاستراحة)
function schReportTable(grid,cellRender){
  const days=activeDays();
  const P=schedConfig.periodsPerDay;
  const bAfter=breakAfterPeriod();
  const showBreak=bAfter>=0&&bAfter<P-1;
  // رؤوس الأعمدة مع إدراج عمود الاستراحة
  const head='<tr><th class="hc">اليوم</th>'+[...Array(P).keys()].map(p=>{
    const th=`<th>الحصة ${p+1}<br><small>${periodTime(p)}</small></th>`;
    return (p===bAfter&&showBreak)?th+`<th class="brk">☕<br><small>${breakTime()}</small></th>`:th;
  }).join('')+'</tr>';
  const body=days.map(d=>{
    const cells=[...Array(P).keys()].map(p=>{
      const c=grid[d+'|'+p];
      const cell=c?`<td class="f">${cellRender(c)}</td>`:'<td class="e">—</td>';
      return (p===bAfter&&showBreak)?cell+`<td class="brk-cell">☕</td>`:cell;
    }).join('');
    return `<tr><td class="tc">${d}</td>${cells}</tr>`;
  }).join('');
  return `<table class="rt">${head}${body}</table>`;
}

// سحب وإفلات لتعديل الجدول يدوياً
function schDrag(e,grp,slot){e.dataTransfer.setData('text',grp+'::'+slot)}
function schDrop(e,grp,toSlot){
  e.preventDefault();
  const data=e.dataTransfer.getData('text');
  const [fromGrp,fromSlot]=data.split('::');
  if(fromGrp!==grp)return; // نفس الشعبة فقط
  const g=schedule[grp];
  if(!g||!g[fromSlot])return;
  const moving=g[fromSlot];
  const target=g[toSlot];
  const [toDay,toP]=toSlot.split('|');
  
  // فحص التعارضات قبل النقل
  if(moving.trainer&&moving.trainer!=='—'){
    if(trainerBusy(grp,toDay,toP,moving.trainer,moving.course)){
      showToast(`⛔ تعارض: المدرب ${moving.trainer} مشغول بمادة أخرى في نفس الوقت`,'e');
      return;
    }
  }
  
  if(moving.room&&labBusy(grp,toDay,toP,moving.room,moving.course,moving.trainer)){
    showToast(`⛔ تعارض: المعمل ${moving.room} محجوز في نفس الوقت`,'e');
    return;
  }
  
  // تبديل أو نقل
  if(target){g[fromSlot]=target;}else{delete g[fromSlot];}
  g[toSlot]=moving;
  showToast('✅ تم نقل الحصة بنجاح','s');
  showAPage('schedule',null);
}
function schClear(grp,slot){
  if(!schedule[grp]||!schedule[grp][slot])return;
  const c=schedule[grp][slot];
  if(!confirm(`⚠️ هل تريد حذف: ${c.course}\\nالمدرب: ${c.trainer}\\n\\nسيتم حذفها من الجدول بشكل نهائي`))return;
  delete schedule[grp][slot];
  showToast('✅ تم حذف الحصة من الجدول','s');
  showAPage('schedule',null);
}
// تغيير معمل خانة مع تنبيه التعارض
function schSetRoom(grp,slot,room){
  if(!schedule[grp]||!schedule[grp][slot])return;
  const [day,p]=slot.split('|');
  const c=schedule[grp][slot];
  if(labBusy(grp,day,p,room,c.course,c.trainer)){
    showToast('⛔ المعمل محجوز بمادة أخرى بنفس الوقت','e');
    showAPage('schedule',null);return;
  }
  schedule[grp][slot].room=room;
}
function gradeToGPA(g){
  g=parseFloat(g)||0;
  if(g>=95)return 5.00;
  if(g>=90)return 4.75;
  if(g>=85)return 4.50;
  if(g>=80)return 4.00;
  if(g>=75)return 3.50;
  if(g>=70)return 3.00;
  if(g>=65)return 2.50;
  if(g>=60)return 2.00;
  return 1.00;
}
function gpaFrom(list){
  if(!list||!list.length)return 0;
  const sum=list.reduce((a,c)=>a+gradeToGPA(c.pct),0);
  return (sum/list.length).toFixed(2);
}
function gpaColor(gpa){gpa=parseFloat(gpa);return gpa>=4.5?'var(--green)':gpa>=3.5?'#6ab8f7':gpa>=2.5?'var(--gold)':'var(--red)'}
// تحويل الدرجة لنقاط المعدل (من 5) حسب نظام التدريب التقني
function gpaPoint(g){
  if(g>=95)return 5.0;
  if(g>=90)return 4.75;
  if(g>=85)return 4.5;
  if(g>=80)return 4.0;
  if(g>=75)return 3.5;
  if(g>=70)return 3.0;
  if(g>=65)return 2.5;
  if(g>=60)return 2.0;
  return 1.0;
}
// حساب المعدل التراكمي من 5 لقائمة مقررات
function calcGPA(list){
  if(!list||!list.length)return 0;
  const sum=list.reduce((a,c)=>a+gpaPoint(c.pct),0);
  return (sum/list.length).toFixed(2);
}
// لون المعدل من 5
function gpaColor(g){g=parseFloat(g);return g>=4?'var(--green)':g>=2.5?'var(--gold)':'var(--red)'}
function animCards(){
  setTimeout(()=>{
    document.querySelectorAll('.mcard').forEach((el,i)=>{el.classList.add('anim-scale','d'+(Math.min(i+1,6)));});
    document.querySelectorAll('.ccard').forEach((el,i)=>{el.classList.add('anim-up','d'+(Math.min(i+1,6)));});
    document.querySelectorAll('.iitem').forEach((el,i)=>{el.classList.add('anim-up','d'+(Math.min(i+1,6)));});
    document.querySelectorAll('.alert').forEach((el,i)=>{el.classList.add('anim-right','d'+(Math.min(i+1,6)));});
    document.querySelectorAll('.banner').forEach(el=>el.classList.add('anim-up'));
    initScrollObs();
    animNums();
  },50);
}

function initScrollObs(){
  const obs=new IntersectionObserver(entries=>{
    entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add('visible')});
  },{threshold:.1,rootMargin:'0px 0px -30px 0px'});
  document.querySelectorAll('.anim-up,.anim-scale,.anim-right').forEach(el=>obs.observe(el));
}

function animNums(){
  document.querySelectorAll('.mnum[data-target]').forEach(el=>{
    const tgt=parseInt(el.dataset.target)||0;
    const suf=el.dataset.suffix||'';
    let cur=0,step=Math.max(1,Math.ceil(tgt/30));
    const t=setInterval(()=>{
      cur=Math.min(cur+step,tgt);
      el.textContent=cur+suf;
      if(cur>=tgt)clearInterval(t);
    },40);
  });
}

function showToast(msg,type='i'){
  const tc=document.getElementById('toastContainer');

  const icons={i:'ℹ️',s:'✅',e:'❌',w:'⚠️'};
  t.className=`toast toast-${type}`;
  t.innerHTML=`<span class="toast-icon">${icons[type]||'ℹ️'}</span><span>${msg}</span>`;
  tc.appendChild(t);
  setTimeout(()=>{t.classList.add('out');setTimeout(()=>t.remove(),300)},3500);
}

function initParticles(){
  const bg=document.querySelector('.bg-layer');

  for(let i=0;i<8;i++){
    const p=document.createElement('div');

function getAlerts(){
  const list=[];
  const src=user.role==='s'?courses:allCourses;
  src.forEach(c=>{
    const nm=user.role==='s'?c.course:c.sname;
    if(isHighAbs(c))list.push({type:'aw',icon:'⚠️',msg:`${nm} — غياب ${Math.round(c.abs)}% في ${c.course}`});
    if(isLowPerf(c))list.push({type:'ad',icon:'📉',msg:`${nm} — درجة ${Math.round(c.pct)}% في ${c.course}`});
  });
  return list;
}

  const map={home:'🏠',courses:'📚',performance:'📊',schedule:'📅',profile:'👤',students:'👥',attendance:'✅',grades:'📝',alerts:'🔔',attachments:'📎',overview:'🏠',all_students:'🎓',all_courses:'📚',reports:'📊',services:'📝',requests:'📋',dashboard:'📈',accounts:'👥',settings:'⚙️'};
  const lbls={home:'الرئيسية',courses:'مقرراتي',performance:'أدائي',schedule:'جدولي',profile:'ملفي',students:'الفصول',attendance:'الحضور',grades:'الدرجات',alerts:'اشعارات',attachments:'مرفقات',overview:'الرئيسية',all_students:'المتدربون',all_courses:'المقررات',reports:'تقارير',services:'الخدمات',requests:'الطلبات',dashboard:'الأوائل',accounts:'الحسابات',settings:'الإعدادات'};
  const ac=r==='s'?'as':r==='t'?'at':'aa';
  const mn=document.getElementById('mobNav');
  mn.style.display='';
  // لو العناصر 5 أو أقل: نعرضها كلها. لو أكثر: نعرض 4 + زر "المزيد"
  let visible=pages, overflow=[];
  if(pages.length>5){visible=pages.slice(0,4);overflow=pages.slice(4);}
  const btns=visible.map((p,i)=>`<button class="mni ${i===0?ac:''}" onclick="mobNav('${p}',this,'${r}')"><span class="mni-icon">${map[p]||'📌'}</span><span>${lbls[p]||p}</span></button>`).join('');
  const moreBtn=overflow.length?`<button class="mni" onclick="toggleMoreMenu(event,'${r}')"><span class="mni-icon">⋯</span><span>المزيد</span></button>`:'';
  // القائمة المنبثقة للخدمات الإضافية
  window._mobOverflow={items:overflow,role:r,map,lbls};
  mn.innerHTML=`<div class="mob-nav-items">${btns}${moreBtn}</div>`;
}
// قائمة "المزيد" المنبثقة
function toggleMoreMenu(e,r){
  e.stopPropagation();
  let m=document.getElementById('moreMenu');
  if(m){m.remove();return;}
  const o=window._mobOverflow||{items:[]};
  m=document.createElement('div');
  m.id='moreMenu';
  m.className='more-menu';
  m.innerHTML=o.items.map(p=>`<button onclick="mobNav('${p}',null,'${r}');document.getElementById('moreMenu')?.remove()"><span style="font-size:20px">${o.map[p]||'📌'}</span><span>${o.lbls[p]||p}</span></button>`).join('');
  document.body.appendChild(m);
  // إغلاق عند الضغط خارجها
  setTimeout(()=>{document.addEventListener('click',function closeMore(ev){if(!m.contains(ev.target)){m.remove();document.removeEventListener('click',closeMore);}});},50);
}
window.toggleMoreMenu=toggleMoreMenu;

function mobNav(page,btn,r){
  document.querySelectorAll('.mni').forEach(b=>b.className='mni');
  const ac=r==='s'?'as':r==='t'?'at':'aa';
  if(btn)btn.classList.add(ac);
  if(r==='s')showSPage(page,null);
  else if(r==='t')showTPage(page,null);
  else showAPage(page,null);
}

function showSPage(pg,el){
  if(el){document.querySelectorAll('.sitem').forEach(i=>i.className='sitem');el.className='sitem active'}
  const mc=document.getElementById('mcontent');
  mc.innerHTML='';
  mc.style.animation='none';
  setTimeout(()=>{mc.style.animation='fadeIn .3s ease';mc.innerHTML=sPgs[pg]?sPgs[pg]():'';animCards();},10);
}

// بانر تنبيهات الغياب للطالب (من الإنذار الأول 10%) مع زر عذر مباشر
function absWarnBanner(){
  const cur=courses.filter(c=>isActive(c.status)&&(parseFloat(c.abs)||0)>=10);
  if(!cur.length)return '';
  return '<div style="margin-bottom:16px">'+cur.sort((a,b)=>b.abs-a.abs).map(c=>{
    const lv=absLevel(c.abs);
    const urgent=lv.key==='deprived';
    return `<div class="alert ${urgent?'ad':'aw'}" style="${urgent?'border:2px solid var(--red)':''};display:flex;align-items:center;gap:10px">
      <span class="aicon">${urgent?'⛔':lv.key==='warn2'?'🔶':'⚠️'}</span>
      <div style="flex:1">
        <div style="font-weight:700;color:${urgent?'var(--red)':av_color(lv)}">${urgent?'محروم رسمياً':lv.label} — ${c.course}</div>
        <div style="font-size:12px;color:var(--muted);margin-top:2px">غيابك <strong>${Math.round(c.abs)}%</strong>${urgent?' — وصلت حد الحرمان (25%)':' — قدّم عذرك قبل الوصول للحرمان (25%)'}</div>
      </div>
      <button class="btn ${urgent?'btn-r':'btn-out'} btn-sm" onclick="goExcuse('${c.course.replace(/'/g,"\\'")}')">📨 ارفع عذر</button>
    </div>`;
  }).join('')+'</div>';
}
function av_color(lv){return lv.color}
// الانتقال لصفحة الخدمات مع تعبئة العذر تلقائياً
function goExcuse(course){
  showSPage('services',null);
  setTimeout(()=>{
    const t=document.getElementById('rq-type');
    if(t){t.value='عذر غياب';toggleExcuseFields();}
    const sel=document.getElementById('rq-course');
    if(sel){for(const o of sel.options){if(o.value===course){sel.value=course;break;}}}
    const fld=document.getElementById('excuse-fields');
    if(fld)fld.scrollIntoView({behavior:'smooth',block:'center'});
  },120);
}

function courseCardHTML(c){
  const p=Math.round(c.pct);
  const av=absLevel(c.abs);
  const showWarn=av.key!=='ok'&&isActive(c.status);
  return `<div class="ccard ${ccClass(p)}">
    <div class="cc-top"><div><div class="cc-name">${c.course}</div><div class="cc-meta">${c.code}${c.trainer?' · '+c.trainer:''}${c.half&&c.half!=='غير محدد'?' · '+c.half:''}</div></div><span class="pill ${pillClass(p)}">${p}%</span></div>
    <div class="prog"><div class="pfill ${fillClass(p)}" style="width:${Math.min(p,100)}%"></div></div>
    <div class="cc-footer"><span>الإنجاز: ${p}%</span><span style="color:${av.color}">الغياب: ${Math.round(c.abs)}%${showWarn?' · '+av.label:''}</span>${c.letter?'<span>التقدير: '+c.letter+'</span>':''}</div>
  </div>`;
}

function filterTerm(grp,val,btn){
  // تحديث الزر النشط في مجموعته فقط
  document.querySelectorAll(`.tterm[data-grp="${grp}"]`).forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  activeFilters[grp]=val;
  // تطبيق كل الفلاتر معاً
  const filtered=courses.filter(c=>
    (activeFilters.half==='all'||c.half===activeFilters.half)&&
    (activeFilters.letter==='all'||c.letter===activeFilters.letter)&&
    (activeFilters.status==='all'||c.status===activeFilters.status)
  );
  document.getElementById('coursesList').innerHTML=filtered.map(c=>courseCardHTML(c)).join('')||'<div class="empty"><div class="empty-icon">🔍</div>لا توجد مقررات مطابقة</div>';
  setTimeout(()=>document.querySelectorAll('#coursesList .ccard').forEach((el,i)=>{el.classList.add('anim-up','d'+(Math.min(i+1,6)));initScrollObs();}),10);
}
