// قائمة تواريخ الغياب المختارة
let excuseDates=[];
function addExcuseDate(){
  const inp=document.getElementById('rq-date');
  const dt=inp.value;
  if(!dt){showToast('اختر تاريخ أولاً','w');return;}
  if(excuseDates.includes(dt)){showToast('هذا اليوم مضاف مسبقاً','w');return;}
  const day=dateToArDay(dt);
  if(day==='الجمعة'||day==='السبت'){showToast('عطلة نهاية الأسبوع — اختر يوم دراسي','w');return;}
  excuseDates.push(dt);
  excuseDates.sort();
  inp.value='';
  renderExcuseDates();
}
function removeExcuseDate(dt){
  excuseDates=excuseDates.filter(d=>d!==dt);
  renderExcuseDates();
}
function renderExcuseDates(){
  const list=document.getElementById('rq-dates-list');
  const totalDiv=document.getElementById('rq-dates-total');
  if(!list)return;
  if(!excuseDates.length){
    list.innerHTML='<div style="font-size:12px;color:var(--muted)">لم تضف أيام غياب بعد</div>';
    if(totalDiv)totalDiv.innerHTML='';
    return;
  }
  // المادة المختارة لحساب الحصص
  const sel=document.getElementById('rq-course');
  const course=sel?sel.value:'';
  const grp=user.grp;
  list.innerHTML=excuseDates.map(dt=>{
    const day=dateToArDay(dt);
    const sessions=course?courseSessionsOnDay(course,grp,day):0;
    const perHour=schedConfig.periodHours||2;
    const hrs=sessions*perHour;
    const info=course?(sessions>0?`${sessions} حصة · ${hrs} ساعة`:'لا حصص لهذه المادة بهذا اليوم'):'اختر المادة أولاً';
    return `<div style="display:flex;justify-content:space-between;align-items:center;background:var(--card2);padding:8px 12px;border-radius:6px;border:1px solid var(--border)">
      <div><span style="font-weight:700">${day}</span> <span style="color:var(--muted);font-size:12px">${dt}</span> <span style="font-size:11px;color:#6ab8f7;margin-right:8px">${info}</span></div>
      <button type="button" onclick="removeExcuseDate('${dt}')" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:16px">✕</button>
    </div>`;
  }).join('');
  if(totalDiv&&course){
    const {totalHrs}=excuseHoursFromDates(course,grp,excuseDates);
    totalDiv.innerHTML=`📊 الإجمالي: <strong style="color:#6ab8f7">${excuseDates.length} يوم · ${totalHrs} ساعة غياب</strong> (تُخصم تلقائياً عند الاعتماد)`;
  }
}

async function submitRequest(){
  const type=document.getElementById('rq-type').value;
  let details=document.getElementById('rq-details').value.trim();
  let exCourse='',exCode='',exHours='',fileData='',fileName='',exDates='';
  if(type==='عذر غياب'){
    const sel=document.getElementById('rq-course');
    exCourse=sel.value;
    exCode=sel.options[sel.selectedIndex]?.dataset.code||'';
    if(!exCourse){showToast('اختر المادة','w');return}
    if(!excuseDates.length){showToast('أضف يوم غياب واحد على الأقل','w');return}
    // حساب الساعات تلقائياً من التواريخ (حصص المادة في كل يوم)
    const {totalHrs,breakdown}=excuseHoursFromDates(exCourse,user.grp,excuseDates);
    if(totalHrs<=0){showToast('المادة ما عندها حصص في الأيام المختارة — تأكد من الجدول','w');return}
    exHours=totalHrs;
    exDates=excuseDates.join(', ');
    // وصف الأيام بالتفصيل
    const daysDesc=breakdown.map(b=>`${b.day} (${b.date})`).join(' · ');
    // قراءة ملف PDF إن وُجد
    const fileInput=document.getElementById('rq-file');
    if(fileInput&&fileInput.files&&fileInput.files[0]){
      const f=fileInput.files[0];
      if(f.type!=='application/pdf'&&!f.name.toLowerCase().endsWith('.pdf')){showToast('الملف لازم يكون PDF','w');return}
      if(f.size>5*1024*1024){showToast('حجم الملف كبير (الحد 5 ميجا)','w');return}
      fileName=f.name;
      showToast('جاري قراءة الملف...','i');
      fileData=await new Promise((res,rej)=>{
        const r=new FileReader();
        r.onload=()=>res(String(r.result).split(',')[1]||'');
        r.onerror=()=>rej();
        r.readAsDataURL(f);
      }).catch(()=>'');
    }
    // ندمج تفاصيل العذر (رابط الملف يضيفه Apps Script بعد الحفظ في درايف)
    details=`[عذر غياب] المادة: ${exCourse} | الأيام: ${daysDesc} | ساعات: ${exHours} | السبب: ${details||'—'}`;
  }
  if(!details){showToast('يرجى كتابة تفاصيل الطلب','w');return}
  const rid='REQ'+Date.now();
  const now=new Date().toLocaleDateString('en-CA');
  const rec={rid,sid:user.id,sname:user.name,grp:user.grp,type,details,date:now,supStatus:'معلق',dirStatus:'معلق',finalStatus:'قيد المراجعة',notes:'',
    exCode,exHours,exDates,trnStatus:type==='عذر غياب'?'معلق':'—',fileData,fileName};
  showToast('جاري إرسال الطلب...','i');
  try{
    await fetch(SCRIPT_URL,{method:'POST',mode:'no-cors',body:JSON.stringify({action:'addRequest',records:[rec]}),headers:{'Content-Type':'text/plain'}});
    showToast('✅ تم إرسال طلبك بنجاح','s');
    delete rec.fileData; // ما نحتفظ بالـ base64 بالذاكرة
    requests.unshift(rec);
    document.getElementById('rq-details').value='';
    excuseDates=[]; // مسح التواريخ بعد الإرسال
    showSPage('services',null);
  }catch(e){showToast('تعذر الإرسال — جرب مرة أخرى','e');}
}

// المدرب/المشرف/المدير يعتمد أو يرفض طلب
async function actOnRequest(rid,decision){
  const r=requests.find(x=>x.rid===rid);
  if(!r)return;
  const isTrainer=user.role==='t';
  const isDir=user.role==='a'&&user.level==='director';
  if(isTrainer){
    r.trnStatus=decision;
    if(decision==='مرفوض')r.finalStatus='مرفوض';
  }else if(isDir){
    r.dirStatus=decision;
    r.finalStatus=decision==='معتمد'?'معتمد':'مرفوض';
  }else{
    r.supStatus=decision;
    if(decision==='مرفوض')r.finalStatus='مرفوض';
  }
  const payload={rid,trnStatus:r.trnStatus,supStatus:r.supStatus,dirStatus:r.dirStatus,finalStatus:r.finalStatus,by:user.name,level:isTrainer?'trainer':(user.level||'supervisor')};
  // ===== خصم ساعات العذر عند الاعتماد النهائي =====
  let excuseInfo=null;
  if(isDir&&decision==='معتمد'&&r.type==='عذر غياب'){
    // استخرج المادة والساعات (من الحقول أو من نص التفاصيل)
    let code=r.exCode||'', hrs=parseFloat(r.exHours)||0;
    if(!hrs){const m=(r.details||'').match(/ساعات:\s*([\d.]+)/);if(m)hrs=parseFloat(m[1])||0;}
    if(!code){
      const m=(r.details||'').match(/المادة:\s*([^|]+)/);
      if(m){const cn=m[1].trim();const cc=allCourses.find(x=>x.sid===r.sid&&x.course===cn);if(cc)code=normCode(cc.code);}
    }
    // ابحث عن سجل المادة للطالب
    const rowC=allCourses.find(x=>x.sid===r.sid&&normCode(x.code)===normCode(code));
    if(rowC&&hrs>0){
      const excusedPct=absHoursToPct(hrs,code);
      const newAbs=Math.max(0,Math.round((rowC.abs-excusedPct)*10)/10);
      rowC.abs=newAbs; // تحديث محلي
      excuseInfo={key:rowC.key,sid:r.sid,absence:newAbs};
    }
  }
  showToast('جاري الحفظ...','i');
  try{
    await fetch(SCRIPT_URL,{method:'POST',mode:'no-cors',body:JSON.stringify({action:'updateRequest',records:[payload]}),headers:{'Content-Type':'text/plain'}});
    // لو فيه خصم ساعات، احفظ النسبة الجديدة في سجل المقررات
    if(excuseInfo){
      await fetch(SCRIPT_URL,{method:'POST',mode:'no-cors',body:JSON.stringify({action:'saveAttendance',records:[excuseInfo]}),headers:{'Content-Type':'text/plain'}});
      showToast('✅ تم الاعتماد وخصم ساعات الغياب','s');
    }else{
      showToast(decision==='معتمد'?'✅ تم الاعتماد':'تم الرفض','s');
    }
    if(isTrainer)showTPage('requests',null);
    else showAPage('requests',null);
  }catch(e){showToast('تعذر الحفظ — جرب مرة أخرى','e');}
}

document.addEventListener('click', function(e){
  const card = e.target.closest('[data-nav]');
  if(card){
    const target = card.dataset.nav;
    if(target === 'trainers'){
      // عرض المدربين كنافذة
      const trainerNames = [...new Set(allCourses.map(c=>c.trainer).filter(Boolean))];
      const overlay=document.createElement('div');
      overlay.className='modal-overlay';
      overlay.id='trainersModal';
      overlay.innerHTML=`<div class="modal" style="max-width:500px">
        <div class="modal-title"><div>👨‍🏫 المدربون (${trainerNames.length})</div>
        <button class="modal-close" onclick="document.getElementById('trainersModal').remove()">✕</button></div>
        ${trainerNames.map(t=>{
          const tc=allCourses.filter(c=>c.trainer===t);
          const ta=tc.length?Math.round(tc.reduce((a,c)=>a+c.pct,0)/tc.length):0;
          return `<div class="iitem" style="margin-bottom:8px"><div class="ilbl">${t}</div><div class="ival">${tc.length} مقرر · متوسط ${ta}%</div></div>`;
        }).join('')}
      </div>`;
      document.body.appendChild(overlay);
      overlay.addEventListener('click',ev=>{ if(ev.target===overlay) overlay.remove(); });
    } else {
      showAPage(target, document.querySelector(`.sitem[onclick*="${target}"]`));
    }
  }
});

document.addEventListener('keydown',e=>{

let currentLang = 'ar';

function translateTo(lang){
  currentLang = lang;
  const t = TRANSLATIONS[lang];
  // ترجمة شاملة لكل النصوص
  document.querySelectorAll('*').forEach(el=>{
    if(el.children.length === 0 && el.textContent.trim()){
      const txt = el.textContent.trim();
      if(t[txt] !== undefined) el.textContent = t[txt];
    }
  });
  // ترجمة placeholders
  document.querySelectorAll('input[placeholder]').forEach(el=>{
    const ph = el.getAttribute('placeholder');
    if(t[ph]) el.setAttribute('placeholder', t[ph]);
  });
  // غير اتجاه الصفحة
  document.documentElement.dir = lang==='en' ? 'ltr' : 'rtl';
  document.documentElement.lang = lang;
  // حفظ اللغة
  localStorage.setItem('bla_lang', lang);
  // أغلق القائمة
  document.getElementById('txMenu').style.display='none';
  const btn=document.getElementById('txBtn');
  btn.innerHTML = lang==='en' ? '🇸🇦' : '🌐';
  btn.style.background='rgba(13,29,48,0.95)';
  btn.style.borderColor='rgba(100,160,220,0.25)';
  // إعادة بناء الصفحة بالترجمة
  try{if(typeof user !== 'undefined' && user && typeof showApp === 'function') showApp();}catch(e){}
}

// استرجاع اللغة
document.addEventListener('DOMContentLoaded',()=>{
  const savedLang = localStorage.getItem('bla_lang');
  if(savedLang && savedLang !== 'ar') setTimeout(()=>translateTo(savedLang), 500);
});

function toggleTx(){
  const m=document.getElementById('txMenu');
  const b=document.getElementById('txBtn');
  if(m.style.display==='none'||!m.style.display){
    m.style.display='block';
    b.style.background='rgba(26,122,191,0.3)';
    b.innerHTML='✕';
  }else{
    m.style.display='none';
    b.style.background='rgba(13,29,48,0.95)';
    b.innerHTML= currentLang==='en'?'🇸🇦':'🌐';
  }
}
document.addEventListener('click',function(e){
  const w=document.getElementById('txWidget');
  if(w&&!w.contains(e.target)){
    document.getElementById('txMenu').style.display='none';
    const b=document.getElementById('txBtn');
    if(b) b.innerHTML=currentLang==='en'?'🇸🇦':'🌐';
  }
});
</script>
