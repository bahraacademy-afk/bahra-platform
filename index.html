function buildTrainerApp(){
  document.getElementById('sidebar').innerHTML=navHTML('t',['home','students','schedule','attendance','grades','requests','alerts','attachments']);
  buildMobNav('t',['home','students','attendance','grades','alerts']);

}

function showTPage(pg,el){
  if(el){document.querySelectorAll('.sitem').forEach(i=>i.className='sitem');el.className='sitem active at'}
  const mc=document.getElementById('mcontent');
  mc.innerHTML='';setTimeout(()=>{mc.innerHTML=tPgs[pg]?tPgs[pg]():'';animCards();},10);
}

const tPgs={
  requests:()=>{
    // أعذار الغياب لمواد هذا المدرب
    const myCourses=[...new Set(students.map(s=>s.course))];
    const mine=requests.filter(r=>{
      if(r.type!=='عذر غياب')return false;
      const m=(r.details||'').match(/المادة:\s*([^|]+)/);
      const cn=m?m[1].trim():'';
      return myCourses.includes(cn);
    });
    const pending=mine.filter(r=>r.trnStatus==='معلق');
    const done=mine.filter(r=>r.trnStatus!=='معلق').sort((a,b)=>(b.date||'').localeCompare(a.date||''));
    const parseEx=(r)=>{
      const d=r.details||'';
      return {
        course:((d.match(/المادة:\s*([^|]+)/)||[])[1]||'').trim(),
        days:((d.match(/الأيام:\s*([^|]+)/)||[])[1]||'').trim(),
        hours:((d.match(/ساعات:\s*([\d.]+)/)||[])[1]||'0'),
        reason:((d.match(/السبب:\s*([^|]+)/)||[])[1]||'').trim(),
        file:((d.match(/الملف:\s*(\S+)/)||[])[1]||'').trim()
      };
    };
    const card=(r,actionable)=>{
      const ex=parseEx(r);
      const badge=r.trnStatus==='معتمد'?'<span class="pill pg">اعتمدته ✓</span>':r.trnStatus==='مرفوض'?'<span class="pill pr">رفضته</span>':'<span class="pill py">بانتظار اعتمادك</span>';
      return `<div class="ccard ${actionable?'cc-y':r.trnStatus==='معتمد'?'cc-g':'cc-r'}" style="margin-bottom:12px">
        <div class="cc-top"><div><div class="cc-name">عذر غياب — ${r.sname}</div><div class="cc-meta">الشعبة ${r.grp} · ${r.sid} · ${r.date||''}</div></div>${badge}</div>
        <div style="margin:8px 0;padding:12px;background:rgba(255,255,255,.03);border-radius:8px;border:1px solid var(--border)">
          <div style="display:flex;justify-content:space-between;font-size:12px;padding:4px 0"><span style="color:var(--muted)">المادة</span><span style="font-weight:700">${ex.course}</span></div>
          ${ex.days?`<div style="display:flex;justify-content:space-between;font-size:12px;padding:4px 0"><span style="color:var(--muted)">أيام الغياب</span><span style="font-weight:700;text-align:left;max-width:60%">${ex.days}</span></div>`:''}
          <div style="display:flex;justify-content:space-between;font-size:12px;padding:4px 0"><span style="color:var(--muted)">ساعات الغياب المطلوب عذرها</span><span style="font-weight:700">${ex.hours} ساعة</span></div>
          ${ex.reason&&ex.reason!=='—'?`<div style="display:flex;justify-content:space-between;font-size:12px;padding:4px 0"><span style="color:var(--muted)">السبب</span><span style="font-weight:600;text-align:left;max-width:60%">${ex.reason}</span></div>`:''}
          ${ex.file?`<div style="display:flex;justify-content:space-between;font-size:12px;padding:4px 0"><span style="color:var(--muted)">الملف</span><a href="${ex.file}" target="_blank" style="color:#6ab8f7;font-weight:700">📎 فتح الملف</a></div>`:'<div style="font-size:11px;color:var(--gold);padding:4px 0">⚠️ لا يوجد ملف مرفق</div>'}
        </div>
        ${actionable?`<div class="btn-row"><button class="btn btn-g btn-sm" onclick="actOnRequest('${r.rid}','معتمد')">✓ اعتماد</button><button class="btn btn-out btn-sm" onclick="actOnRequest('${r.rid}','مرفوض')">✕ رفض</button></div>`:'<div style="font-size:11px;color:var(--muted);margin-top:6px">'+(r.trnStatus==='معتمد'?'انتقل للمشرف ثم المدير':'تم الرفض')+'</div>'}
      </div>`;
    };
    return `
    <div class="banner"><div><div class="btitle">📋 أعذار الغياب</div><div class="bsub">راجع أعذار طلابك واعتمدها — أول مرحلة قبل المشرف والمدير</div></div></div>
    <div class="alert ab"><span class="aicon">ℹ️</span>أنت أول من يعتمد عذر الغياب (أنت أدرى بحضور طلابك)، ثم المشرف، ثم المدير</div>
    <div class="stitle">🔔 بانتظار اعتمادك ${pending.length?`(${pending.length})`:''}</div>
    ${pending.length?pending.map(r=>card(r,true)).join(''):'<div class="alert as"><span class="aicon">✅</span>لا توجد أعذار بانتظار اعتمادك</div>'}
    ${done.length?`<div class="stitle" style="margin-top:24px">السجل (${done.length})</div>${done.map(r=>card(r,false)).join('')}`:''}`;
  },
  schedule:()=>{
    // جدول المدرب: نجمع كل حصصه من كل الشعب — مع دمج الشعب المشتركة
    const tSched={};
    for(const grp in schedule){
      for(const slot in schedule[grp]){
        const c=schedule[grp][slot];
        const nrm=s=>n0(s).replace(/\s+/g,' ').trim();
        if(nrm(c.trainer)===nrm(user.name)){
          // إذا فيه حصة بنفس الوقت ونفس المادة، نجمع الشعب
          if(tSched[slot]&&nrm(tSched[slot].course)===nrm(c.course)){
            tSched[slot].grps.push(grp);
            if(c.room&&!tSched[slot].rooms.includes(c.room))tSched[slot].rooms.push(c.room);
          }else{
            tSched[slot]={course:c.course,grps:[grp],rooms:c.room?[c.room]:[]};
          }
        }
      }
    }
    const has=Object.keys(tSched).length>0;
    const usedDays=DAYS.filter(d=>Object.keys(tSched).some(s=>s.startsWith(d+'|')));
    const days=usedDays.length?usedDays:DAYS;
    const maxP=Math.max(1,...Object.keys(tSched).map(s=>parseInt(s.split('|')[1])+1));
    const P=has?maxP:5;
    const cell=(day,p)=>{
      const c=tSched[day+'|'+p];
      if(!c)return '<td class="sch-cell"><span class="sch-empty">—</span></td>';
      const grpLabel=c.grps.length>1?`الشعب ${c.grps.sort().join(' و ')}`:`الشعبة ${c.grps[0]}`;
      const roomLabel=c.rooms.join(' / ');
      return `<td class="sch-cell filled"><div class="sch-item-v"><div class="sch-course">${c.course}</div><div class="sch-trainer">${grpLabel}</div>${roomLabel?`<div class="sch-room-tag">${roomLabel}</div>`:''}</div></td>`;
    };
    const bAfter=breakAfterPeriod();
    const headCells=[...Array(P).keys()].map(p=>{
      const th=`<th>الحصة ${p+1}<div class="sch-time-sm">${periodTime(p)}</div></th>`;
      return (p===bAfter&&bAfter>=0&&bAfter<P-1)?th+`<th style="background:var(--gold);color:#000;width:46px">☕<div style="font-size:8px">${breakTime()}</div></th>`:th;
    }).join('');
    const rowCells=(d)=>[...Array(P).keys()].map(p=>{
      const c=cell(d,p);
      return (p===bAfter&&bAfter>=0&&bAfter<P-1)?c+`<td style="background:rgba(201,162,39,.15);text-align:center;color:var(--gold)">☕</td>`:c;
    }).join('');
    // هل المدرب عنده حصص في الجدول العام؟ (لو لا، يعني ما عنده مواد مسندة)
    const teachesAny=Object.values(schedule).some(g=>Object.values(g).some(c=>{
      const nrm=s=>n0(s).replace(/\s+/g,' ').trim();
      return nrm(c.trainer)===nrm(user.name);
    }));
    const emptyMsg=teachesAny
      ? '<div class="empty"><div class="empty-icon">📅</div><div>لم يُعتمد الجدول بعد</div><div style="font-size:12px;color:var(--muted);margin-top:8px">سيظهر جدولك هنا عند اعتماده من الإدارة</div></div>'
      : '<div class="empty"><div class="empty-icon">📭</div><div>ما عندك جدول حالياً</div><div style="font-size:12px;color:var(--muted);margin-top:8px">لأنه ما عندك مواد مسندة في الجدول · راجع الإدارة لو تتوقع غير ذلك</div></div>';
    return `
    <div class="stitle">📅 جدولي الأسبوعي</div>
    ${has?`
    <div class="alert ab"><span class="aicon">🗓️</span>جدول حصصك الأسبوعي عبر كل الشعب</div>
    <div class="sch-wrap"><table class="sch-table">
      <thead><tr><th>اليوم</th>${headCells}</tr></thead>
      <tbody>${days.map(d=>`<tr><td class="sch-pnum">${d}</td>${rowCells(d)}</tr>`).join('')}</tbody>
    </table></div>`:emptyMsg}`;
  },
  home:()=>{
    const crs=[...new Set(students.map(s=>s.course))];
    const avg=students.length?Math.round(students.reduce((a,s)=>a+s.pct,0)/students.length):0;
    const warns=students.filter(hasIssue).length;
    // تحديد حالة المقرر: حالي إذا فيه ولو متدرب واحد حالته "حالي"
    const courseStatus=course=>{
      const ss=students.filter(s=>s.course===course);
      return ss.some(s=>isActive(s.status))?'حالي':(ss.some(s=>(String(s.status||'').replace(/\s+/g,'')==='مستقبلي'))?'مستقبلي':'سابق');
    };
    const currentCrs=crs.filter(c=>courseStatus(c)==='حالي');
    const pastCrs=crs.filter(c=>courseStatus(c)!=='حالي');
    const courseCard=(course,faded)=>{
      const ss=uniqStudents(students.filter(s=>s.course===course));
      const a=Math.round(ss.reduce((x,s)=>x+s.pct,0)/ss.length);
      return `<div class="ccard ${faded?'cc-b':'cc-g'}" ${faded?'style="opacity:.6"':''}>
        <div class="cc-top"><div><div class="cc-name">${course}</div><div class="cc-meta">${ss.length} متدرب · ${ss[0]?.code||''}</div></div><span class="pill ${pillClass(a)}">${a}%</span></div>
        <div class="prog"><div class="pfill ${faded?'pf-b':'pf-g'}" style="width:${a}%"></div></div>
      </div>`;
    };
    return `
    <div class="banner"><div><div class="btitle">مرحباً، ${user.name.split(' ')[0]} 👨‍🏫</div><div class="bsub">${user.spec}</div></div><div class="bpill bp-b">مدرب</div></div>
    <div class="metrics">
      <div class="mcard mc-b" onclick="showTrainerStat('students')" style="cursor:pointer"><div class="micon">👥</div><div class="mnum cb" data-target="${[...new Set(students.map(s=>s.sid))].length}">${[...new Set(students.map(s=>s.sid))].length}</div><div class="mlbl">إجمالي المتدربين</div></div>
      <div class="mcard mc-g" onclick="showTrainerStat('current')" style="cursor:pointer"><div class="micon">🟢</div><div class="mnum cg" data-target="${currentCrs.length}">${currentCrs.length}</div><div class="mlbl">مقررات حالية</div></div>
      <div class="mcard mc-r" onclick="showTrainerStat('avg')" style="cursor:pointer"><div class="micon">📊</div><div class="mnum ${avg>=70?'cg':avg>=60?'cy':'cr'}" data-target="${avg}" data-suffix="%">${avg}%</div><div class="mlbl">متوسط الدرجات</div></div>
      <div class="mcard mc-y" onclick="showTrainerStat('alerts')" style="cursor:pointer"><div class="micon">⚠️</div><div class="mnum cy" data-target="${warns}">${warns}</div><div class="mlbl">اشعارات</div></div>
    </div>
    <div class="stitle">🟢 مقرراتك الحالية ${currentCrs.length?`(${currentCrs.length})`:''}</div>
    ${currentCrs.length?currentCrs.map(c=>courseCard(c,false)).join(''):'<div class="alert ab"><span class="aicon">📭</span>لا توجد مقررات حالية الآن</div>'}
    ${pastCrs.length?`

// عند إدخال ساعات الغياب: احسب النسبة وحدّثها فورياً
function onAbsHours(sid,code,val){
  if(!attendanceData[sid])attendanceData[sid]={};
  attendanceData[sid].hours=val;
  attendanceData[sid].code=code;
  const hours=parseFloat(val)||0;
  const pct=absHoursToPct(hours,code);
  const lv=absLevel(pct);
  const el=document.getElementById('ap-'+sid);
  if(el){
    el.style.color=lv.color;
    el.textContent=val!==''?`${pct}% · ${lv.label}`:'';
  }
}

// ===== تسجيل الحضور (حاضر/متأخر/غائب) =====
let attMarks={};
let attCurrentCourse=null; // تتبّع المادة الحالية لتجنب التضارب
function setMark(sid,mark){
  attMarks[sid]=mark;
  ['present','late','absent'].forEach(k=>{const b=document.getElementById('mk-'+sid+'-'+k);if(b)b.classList.remove('on');});
  const b=document.getElementById('mk-'+sid+'-'+mark);if(b)b.classList.add('on');
}
function markAll(course,mark){
  uniqStudents(students.filter(s=>s.course===course&&isActive(s.status))).forEach(s=>setMark(s.sid,mark));
}
// حفظ حضور اليوم: غائب=حصة كاملة، متأخر=نصف حصة (تأخيرين=غياب)
async function saveSession(course,code,sessionHrs){
  let total=courseTotalHours(code);
  // لو المادة مالها ساعات في قاعدة المقررات: نستخدم تقدير افتراضي
  // (افتراض 4 ساعات أسبوعية × عدد الأسابيع) عشان الغياب يُحسب ولا يتوقف
  if(!total){
    total=(4)*(typeof WEEKS_PER_HALF!=='undefined'?WEEKS_PER_HALF:8);
    showToast('⚠️ المادة مالها ساعات بالقاعدة — استُخدم تقدير افتراضي','w');
  }
  // كل سجلات الطلاب الحاليين بهذه المادة (تشمل الشعب المتعددة)
  const allRecs=students.filter(s=>s.course===course&&isActive(s.status));
  // العلامة لكل طالب موحّد (بمفتاح الرقم الأكاديمي)
  const markByKey={};
  allRecs.forEach(s=>{const mk=attMarks[s.sid];if(mk)markByKey[sidKey(s)]=mk;});
  const records=[];
  let marked=0, absC=0, lateC=0;
  const counted=new Set(); // إحصاء كل طالب مرة واحدة بالعدّاد
  allRecs.forEach(s=>{
    const k=sidKey(s);
    const mk=markByKey[k];
    if(!mk)return;
    if(!counted.has(k)){counted.add(k);marked++;if(mk==='absent')absC++;else if(mk==='late')lateC++;}
    let add=0;
    if(mk==='absent')add=sessionHrs;
    else if(mk==='late')add=sessionHrs/2;
    if(add>0){
      const curHrs=(parseFloat(s.abs)||0)/100*total;
      const newPct=Math.min(Math.round((curHrs+add)/total*1000)/10,100);
      s.abs=newPct;
      // حفظ في كل سجل للطالب بهذه المادة (شعب متعددة → كلها تتحدّث)
      records.push({key:s.key,sid:s.sid,code:s.code,grp:s.grp,absence:newPct});
    }
  });
  if(!marked){showToast('سجّل حضور المتدربين أولاً','w');return;}
  showToast('جاري حفظ الحضور...','i');
  try{
    if(records.length){
      // إرسال عبر JSONP عشان نقرأ الرد ونعرف كم سجل تحدّث فعلياً
      const res=await jsonpCall({action:'saveAttendance',data:JSON.stringify(records)});
      const upd=(res&&typeof res.updated!=='undefined')?res.updated:null;
      if(upd!==null && upd===0){
        // ما تحدّث ولا سجل → المفتاح/الرقم ما تطابق بالشيت
        showToast('⚠️ ما تحدّث أي سجل بالشيت — تأكد من بيانات الطلاب','e');
        return;
      }
      showToast(`✅ تم حفظ الحضور — ${absC} غياب · ${lateC} تأخير`+(upd!==null?` (${upd} سجل)`:''),'s');
    }else{
      showToast(`✅ تم حفظ الحضور — ${absC} غياب · ${lateC} تأخير`,'s');
    }
    attMarks={}; // مسح الحضور بعد الحفظ الناجح
    attCurrentCourse=null;
    showTPage('attendance',null);
  }catch(e){showToast('تعذر الحفظ — جرب مرة أخرى','e');}
}

// ===== حفظ الغياب الجديد (بالأيام · مربوط بالجدول) =====
async function saveSessionV2(course,code,grp,dateStr){
  let totalDays=courseTotalDays(course,grp);
  // احتياطي: لو المادة مو موجودة بالجدول، نفترض يوم واحد بالأسبوع (8 أيام) بدل منع الحفظ
  if(!totalDays){
    totalDays=(typeof WEEKS_PER_HALF!=='undefined'?WEEKS_PER_HALF:8);
    showToast('ℹ️ المادة غير مجدولة — حُسبت بيوم/أسبوع افتراضياً','i');
  }
  // طلاب هذه المادة (الحاليون)
  const allRecs=students.filter(s=>s.course===course&&isActive(s.status));
  const markByKey={};
  allRecs.forEach(s=>{const mk=attMarks[s.sid];if(mk)markByKey[sidKey(s)]=mk;});
  const records=[];   // لتحديث نسبة الغياب في سجل المقررات
  const dailyLog=[];  // لتسجيل الغياب اليومي في التبويب الجديد
  let marked=0, absC=0, lateC=0;
  const counted=new Set();
  allRecs.forEach(s=>{
    const k=sidKey(s);
    const mk=markByKey[k];
    if(!mk)return;
    if(!counted.has(k)){counted.add(k);marked++;if(mk==='absent')absC++;else if(mk==='late')lateC++;}
    // أيام الغياب المضافة اليوم: غائب=1 · متأخر=0.5 · حاضر=0
    let addDays=0;
    if(mk==='absent')addDays=1;
    else if(mk==='late')addDays=0.5;
    // سجل يومي لكل من غاب/تأخر (حتى نمنع التكرار في التبويب)
    if(mk==='absent'||mk==='late'){
      dailyLog.push({sid:s.sid,name:s.name,course,code:normCode(code),grp,date:dateStr,status:mk==='absent'?'غائب':'متأخر',days:addDays});
    }
    if(addDays>0){
      // الأيام المحفوظة سابقاً = النسبة الحالية × إجمالي الأيام ÷ 100
      const curDays=(parseFloat(s.abs)||0)/100*totalDays;
      const newDays=curDays+addDays;
      const newPct=Math.min(Math.round(newDays/totalDays*1000)/10,100);
      s.abs=newPct;
      records.push({key:s.key,sid:s.sid,code:normCode(code),grp,absence:newPct});
    }
  });
  if(!marked){showToast('سجّل حضور المتدربين أولاً','w');return;}
  showToast('جاري حفظ غياب اليوم...','i');
  try{
    // 1) تحديث نسبة الغياب في سجل المقررات
    let upd=null;
    if(records.length){
      const res=await jsonpCall({action:'saveAttendance',data:JSON.stringify(records)});
      upd=(res&&typeof res.updated!=='undefined')?res.updated:null;
      if(upd!==null && upd===0){
        showToast('⚠️ ما تحدّث أي سجل — تأكد إن الطلاب في سجل المقررات','e');
        return;
      }
    }
    // 2) تسجيل الغياب اليومي في التبويب الجديد (منع التكرار: نفس اليوم/المادة يُحدّث)
    if(dailyLog.length){
      await jsonpCall({action:'saveDailyAbsence',data:JSON.stringify(dailyLog)}).catch(()=>{});
    }
    showToast(`✅ تم حفظ غياب ${dateStr} — ${absC} غياب · ${lateC} تأخير`+(upd!==null?` (${upd} سجل)`:''),'s');
    attMarks={};
    attCurrentCourse=null;
    // s.abs تحدّثت في الذاكرة قبل الإرسال → نعرض الصفحة فوراً بالقيم الجديدة
    // (لا نعيد التحميل من الشيت لأن الكتابة قد تتأخر ثانية فتعود القيم القديمة)
    showTPage('attendance',null);
    // إعادة تحميل صامتة بعد 3 ثوانٍ لمزامنة أي تغييرات أخرى (دون مسح ما يظهر)
    setTimeout(()=>{if(typeof loadTrainer==='function')loadTrainer().catch(()=>{});},3000);
  }catch(e){showToast('تعذر الحفظ — جرب مرة أخرى','e');}
}

async function saveAttendance(course){
  const ss=students.filter(s=>s.course===course);
  const records=[];
  ss.forEach(s=>{
    const d=attendanceData[s.sid];
    if(d&&d.hours!==''&&d.hours!=null){
      const hours=parseFloat(d.hours)||0;
      const absence=absHoursToPct(hours,s.code); // النسبة المحسوبة
      records.push({key:s.key,sid:s.sid,absence});
    }
  });
  if(!records.length){showToast('لم تُدخل أي ساعات غياب','w');return}
  showToast('جاري الحفظ...','i');
  try{
    const url=SCRIPT_URL+'?action=saveAttendance&data='+encodeURIComponent(JSON.stringify(records));
    await new Promise((resolve,reject)=>{
      const cb='cb_'+Date.now();
      window[cb]=(d)=>{
        delete window[cb];
        document.getElementById('jsonp_'+cb)?.remove();
        if(d.status==='ok') resolve(d);
        else reject(new Error(d.msg));
      };
      const s=document.createElement('script');
      s.id='jsonp_'+cb;
      s.src=url+'&callback='+cb;
      s.onerror=()=>{delete window[cb];reject(new Error('network'))};
      document.head.appendChild(s);
    });
    showToast('✅ تم حفظ الحضور في الشيت','s');
  }catch(e){
    try{
      await fetch(SCRIPT_URL,{method:'POST',mode:'no-cors',body:JSON.stringify({action:'saveAttendance',records}),headers:{'Content-Type':'text/plain'}});
      showToast('✅ تم إرسال الحضور','s');
    }catch(e2){showToast('تعذر الحفظ — جرب مرة أخرى','e');}
  }
}

async function saveGrades(course){
  const ss=students.filter(s=>s.course===course);
  const records=[];
  ss.forEach(s=>{
    const grade=gradesData[s.sid];
    if(grade!==undefined&&grade!==''){
      // تحقق من الحرمان - غياب أكثر من 25%
      if(isDeprived(s.abs)){
        showToast('⚠️ '+s.name.split(' ')[0]+' محروم (غياب '+Math.round(s.abs)+'%)','w');
        return;
      }
      records.push({key:s.key,sid:s.sid,grade:parseFloat(grade)||0});
    }
  });
  if(!records.length){showToast('لم يتم إدخال أي درجات','w');return}
  showToast('جاري الحفظ...','i');
  try{
    const url=SCRIPT_URL+'?action=saveGrades&data='+encodeURIComponent(JSON.stringify(records));
    await new Promise((resolve,reject)=>{
      const cb='cb_'+Date.now();
      window[cb]=(d)=>{
        delete window[cb];
        document.getElementById('jsonp_'+cb)?.remove();
        if(d.status==='ok') resolve(d);
        else reject(new Error(d.msg));
      };
      const s=document.createElement('script');
      s.id='jsonp_'+cb;
      s.src=url+'&callback='+cb;
      s.onerror=()=>{delete window[cb];reject(new Error('network'))};
      document.head.appendChild(s);
    });
    showToast('✅ تم حفظ الدرجات في الشيت','s');
  }catch(e){
    // fallback - no-cors
    try{
      await fetch(SCRIPT_URL,{method:'POST',mode:'no-cors',body:JSON.stringify({action:'saveGrades',records}),headers:{'Content-Type':'text/plain'}});
      showToast('✅ تم إرسال الدرجات','s');
    }catch(e2){showToast('تعذر الحفظ — جرب مرة أخرى','e');}
  }
}

function handleFiles(event,course){
  const fls=Array.from(event.target.files);
  if(!files[course])files[course]=[];
  fls.forEach(f=>{
    if(!files[course].find(x=>x.name===f.name)){
      files[course].push({name:f.name,url:URL.createObjectURL(f),size:f.size});
    }
  });
  refreshFileList(course);

  courses.forEach(c=>{if(c.course===course&&!files[c.key])files[c.key]=files[course]});
  showToast(`تم رفع ${fls.length} ملف بنجاح`,'s');
}

function handleDrop(event,course){
  event.preventDefault();
  event.currentTarget.classList.remove('drag');
  const fls=Array.from(event.dataTransfer.files);
  if(!files[course])files[course]=[];
  fls.forEach(f=>files[course].push({name:f.name,url:URL.createObjectURL(f)}));
  refreshFileList(course);
  showToast(`تم رفع ${fls.length} ملف`,'s');
}

function delFile(course,name){

function refreshFileList(course){

  fl.innerHTML=(files[course]||[]).map(f=>`<div class="file-item"><span>📄</span><span class="fi-name">${f.name}</span><button class="fi-del" onclick="delFile('${course}','${f.name}')">✕</button></div>`).join('');
}

// ===== KPI لكل شعبة =====
function computeKPI(grp){
  // grp = 'all' أو رقم الشعبة
  const gs = grp==='all' ? students : students.filter(s=>s.grp===grp);
  const ids = new Set(gs.map(s=>s.id));
  const gc = allCourses.filter(c=>ids.has(c.sid));
  const traineeCount = gs.length;
  const avg = gc.length?Math.round(gc.reduce((a,c)=>a+c.pct,0)/gc.length):0;
  // نسبة إكمال الخطة = المواد المأخوذة ÷ إجمالي مواد الخطة الدراسية
  let planTotal = catalog.length;
  if(!planTotal){
    // احتياطي: أكبر عدد مواد أخذها متدرب = الخطة الكاملة
    const cnt={}; allCourses.forEach(c=>cnt[c.sid]=(cnt[c.sid]||0)+1);
    planTotal = Math.max(1, ...Object.values(cnt).concat([1]));
  }
  const cnt={}; gc.forEach(c=>cnt[c.sid]=(cnt[c.sid]||0)+1);
  const compVals = gs.map(s=>Math.min((cnt[s.id]||0)/planTotal,1));
  const completionRate = compVals.length?Math.round(compVals.reduce((a,b)=>a+b,0)/compVals.length*100):0;
  // نسبة التفوق = المواد بدرجة 80%+
  const excellenceRate = gc.length?Math.round(gc.filter(c=>c.pct>=80).length/gc.length*100):0;
  const passRate = gc.length?Math.round(gc.filter(c=>c.pct>=60).length/gc.length*100):0;
  const avgAbs = gc.length?Math.round(gc.reduce((a,c)=>a+c.abs,0)/gc.length):0;
  const alerts = gc.filter(hasIssue).length;
  const gpa = gpaFrom(gc);
  return {traineeCount,avg,completionRate,excellenceRate,passRate,avgAbs,alerts,courseCount:gc.length,gpa,planTotal};
}

function renderKPI(grp,btn){
  if(btn){document.querySelectorAll('#kpiTabs .tterm').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}
  const el=document.getElementById('kpiContent');
  if(!el)return;
  const color=v=>v>=80?'var(--green)':v>=60?'var(--gold)':'var(--red)';
  const fillCol=v=>v>=80?'linear-gradient(90deg,#27ae60,#2ecc71)':v>=60?'linear-gradient(90deg,#e67e22,#f4a261)':'linear-gradient(90deg,#c1121f,#e63946)';

  if(grp==='all'){
    // مقارنة الشعب الثلاث جنباً إلى جنب
    const grps=[...new Set(students.map(s=>s.grp))].sort();
    const data=grps.map(g=>({g,...computeKPI(g)}));
    const metrics=[
      {key:'avg',lbl:'متوسط الدرجات',suf:'%'},
      {key:'completionRate',lbl:'نسبة إكمال الخطة',suf:'%'},
      {key:'passRate',lbl:'نسبة النجاح',suf:'%'}
    ];
    let html='<div class="kpi-wrap">';
    // بطاقات إجمالية سريعة لكل شعبة
    html+='<div class="kpi-cards">';
    data.forEach(d=>{
      html+=`<div class="kpi-card"><div style="position:absolute;top:0;left:0;right:0;height:2px;background:${fillCol(d.avg)}"></div>
        <div class="kpi-val" style="color:${gpaColor(d.gpa)}">${d.gpa}<span style="font-size:12px;color:var(--muted)">/5</span></div>
        <div class="kpi-lbl">الشعبة ${d.g} · ${d.traineeCount} متدرب · ${d.avg}%</div></div>`;
    });
    html+='</div>';
    // أشرطة مقارنة لكل مؤشر
    metrics.forEach(m=>{
      html+=`<div style="font-size:12px;color:var(--muted);margin:14px 0 8px;font-weight:700">${m.lbl}</div>`;
      data.forEach(d=>{
        const v=d[m.key];
        html+=`<div class="kpi-bar-row">
          <div class="kpi-bar-label">الشعبة ${d.g}</div>
          <div class="kpi-bar-track"><div class="kpi-bar-fill" style="width:${Math.min(v,100)}%;background:${fillCol(v)}"><span class="kpi-bar-val">${v}${m.suf}</span></div></div>
        </div>`;
      });
    });
    // اشعارات لكل شعبة
    html+='<div style="font-size:12px;color:var(--muted);margin:14px 0 8px;font-weight:700">الحالات الحرجة (اشعارات)</div>';
    data.forEach(d=>{
      const mx=Math.max(...data.map(x=>x.alerts),1);
      const w=Math.round(d.alerts/mx*100);
      html+=`<div class="kpi-bar-row">
        <div class="kpi-bar-label">الشعبة ${d.g}</div>
        <div class="kpi-bar-track"><div class="kpi-bar-fill" style="width:${Math.max(w,d.alerts?12:0)}%;background:linear-gradient(90deg,#c1121f,#e63946)"><span class="kpi-bar-val">${d.alerts}</span></div></div>
      </div>`;
    });
    html+='</div>';
    el.innerHTML=html;
  } else {
    // شعبة واحدة — مؤشرات تفصيلية + قياس دائري
    const k=computeKPI(grp);
    const gaugeR=52,circ=2*Math.PI*gaugeR;
    const dash=circ*(1-k.avg/100);
    const gcol=color(k.avg);
    el.innerHTML=`<div class="kpi-wrap">
      <div style="display:flex;align-items:center;gap:24px;flex-wrap:wrap;justify-content:center;margin-bottom:8px">
        <div class="kpi-gauge">
          <svg width="140" height="140" viewBox="0 0 140 140">
            <circle cx="70" cy="70" r="${gaugeR}" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="12"/>
            <circle cx="70" cy="70" r="${gaugeR}" fill="none" stroke="${gcol}" stroke-width="12" stroke-linecap="round"
              stroke-dasharray="${circ}" stroke-dashoffset="${circ}" transform="rotate(-90 70 70)"
              style="transition:stroke-dashoffset 1.4s cubic-bezier(.16,1,.3,1)" id="gaugeArc"/>
            <text x="70" y="64" text-anchor="middle" font-size="30" font-weight="900" fill="${gcol}" font-family="Tajawal">${k.avg}%</text>
            <text x="70" y="86" text-anchor="middle" font-size="11" fill="var(--muted)" font-family="Tajawal">متوسط الدرجات</text>
          </svg>
        </div>
        <div class="kpi-cards" style="flex:1;min-width:240px;margin-bottom:0">
          <div class="kpi-card"><div style="position:absolute;top:0;left:0;right:0;height:2px;background:var(--purple)"></div><div class="kpi-val" style="color:${gpaColor(k.gpa)}">${k.gpa}<span style="font-size:11px;color:var(--muted)">/5</span></div><div class="kpi-lbl">المعدّل التراكمي</div></div>
          <div class="kpi-card"><div style="position:absolute;top:0;left:0;right:0;height:2px;background:var(--blue)"></div><div class="kpi-val cb" style="color:#6ab8f7">${k.traineeCount}</div><div class="kpi-lbl">متدرب</div></div>
          <div class="kpi-card"><div style="position:absolute;top:0;left:0;right:0;height:2px;background:${fillCol(k.passRate)}"></div><div class="kpi-val" style="color:${color(k.passRate)}">${k.passRate}%</div><div class="kpi-lbl">نسبة النجاح</div></div>
          <div class="kpi-card"><div style="position:absolute;top:0;left:0;right:0;height:2px;background:${k.alerts?'var(--red)':'var(--green)'}"></div><div class="kpi-val" style="color:${k.alerts?'var(--red)':'var(--green)'}">${k.alerts}</div><div class="kpi-lbl">حالات حرجة</div></div>
        </div>
      </div>
      <div style="font-size:12px;color:var(--muted);margin:16px 0 10px;font-weight:700">مؤشرات تفصيلية — الشعبة ${grp}</div>
      ${[{l:'متوسط الدرجات',v:k.avg,s:'%'},{l:'نسبة إكمال الخطة',v:k.completionRate,s:'%'},{l:'نسبة النجاح',v:k.passRate,s:'%'},{l:'متوسط الغياب',v:k.avgAbs,s:'%',inv:true}].map(m=>`
        <div class="kpi-bar-row">
          <div class="kpi-bar-label">${m.l}</div>
          <div class="kpi-bar-track"><div class="kpi-bar-fill" style="width:${Math.min(m.v,100)}%;background:${m.inv?(m.v>20?'linear-gradient(90deg,#c1121f,#e63946)':'linear-gradient(90deg,#27ae60,#2ecc71)'):fillCol(m.v)}"><span class="kpi-bar-val">${m.v}${m.s}</span></div></div>
        </div>`).join('')}
    </div>`;
    // تحريك القياس الدائري
    setTimeout(()=>{const arc=document.getElementById('gaugeArc');if(arc)arc.style.strokeDashoffset=dash;},100);
  }
}

async function enrollBatch(){
  const sids=[...document.querySelectorAll('.enr-student-cb:checked')].map(c=>c.value);
  const crs=[...document.querySelectorAll('.enr-course-cb:checked')].map(c=>c.value);
  const trainer=document.getElementById('enr_trainer')?.value||'';
  if(!sids.length){showToast('اختر متدرباً واحداً على الأقل','w');return;}
  if(!crs.length){showToast('اختر مقرراً واحداً على الأقل','w');return;}
  const total=sids.length*crs.length;
  if(!confirm(`سيتم تسجيل ${sids.length} متدرب في ${crs.length} مقرر (${total} تسجيل).\nهل تريد المتابعة؟`))return;
  // بناء السجلات (مع تخطي المسجّلين مسبقاً)
  const records=[];let skipped=0;
  sids.forEach(sid=>{
    const st=students.find(s=>s.id===sid);if(!st)return;
    crs.forEach(cv=>{
      const [code,course]=cv.split('|');
      const already=allCourses.some(c=>c.sid===sid&&normCode(c.code)===normCode(code));
      if(already){skipped++;return;}
      records.push({sid,name:st.name,grp:st.grp,code,course,trainer,term:st.half||'',status:'حالي'});
    });
  });
  if(!records.length){showToast('⚠️ كل التسجيلات موجودة مسبقاً','w');return;}
  showToast(`جاري تسجيل ${records.length} تسجيل...`,'i');
  try{
    // نرسل على دفعات (كل دفعة 40 سجل) لتجنّب حدود الرابط
    for(let i=0;i<records.length;i+=40){
      const batch=records.slice(i,i+40);
      await jsonpCall({action:'enrollStudent',data:JSON.stringify(batch)});
    }
    showToast(`✅ تم تسجيل ${records.length} تسجيل`+(skipped?` · تخطّى ${skipped} مسجّل مسبقاً`:''),'s');
    await loadAdmin();
    showAPage('manage_courses',document.getElementById('sn-manage_courses'));
  }catch(e){showToast('تعذّر التسجيل — جرب مرة أخرى','e');}
}

function addAccount(type){accountModal(type,'add',{});}
function editAccount(type,data){accountModal(type,'edit',data);}
async function saveAccount(type,mode){
  const g=id=>{const el=document.getElementById('acc_'+id);return el?el.value.trim():'';};
  const rec={type,id:g('id'),name:g('name'),ph:g('ph'),email:g('email')};
  if(type==='student'){rec.grp=g('grp');rec.spec=g('spec');rec.pw=g('pw');}
  else if(type==='trainer'){rec.spec=g('spec');rec.pw=g('pw');}
  else{rec.title=g('title');rec.pw=g('pw');rec.level=g('level');}
  if(!rec.id||!rec.name){showToast('الرقم والاسم مطلوبان','w');return;}
  if(type==='admin'&&!rec.pw){showToast('الرقم السري مطلوب للإداري','w');return;}
  showToast(mode==='edit'?'جاري حفظ التعديل...':'جاري الإضافة...','i');
  try{
    const action=mode==='edit'?'updateUser':'addUser';
    const res=await jsonpCall({action,data:JSON.stringify([rec])});
    document.getElementById('accModal')?.remove();
    showToast(mode==='edit'?'✅ تم حفظ التعديل':'✅ تمت الإضافة','s');
    await loadAdmin();
    showAPage('accounts',document.getElementById('sn-accounts'));
  }catch(e){showToast('تعذّر الحفظ — جرب مرة أخرى','e');}
}
async function deleteAccount(type,id,name){
  const tLbl=type==='student'?'المتدرب':type==='trainer'?'المدرب':'الإداري';
  if(!confirm(`⚠️ هل تريد حذف ${tLbl}: ${name}؟\nلا يمكن التراجع عن هذا الإجراء.`))return;
  showToast('جاري الحذف...','i');
  try{
    await jsonpCall({action:'deleteUser',data:JSON.stringify([{type,id}])});
    showToast('✅ تم الحذف','s');
    await loadAdmin();
    showAPage('accounts',document.getElementById('sn-accounts'));
  }catch(e){showToast('تعذّر الحذف — جرب مرة أخرى','e');}
}

// ===== شاشة العرض (TV Mode) — ملء الشاشة للعرض على شاشة كبيرة =====
window._tvTimer=null;
function buildTVContent(){
  // حساب الترتيب (نفس منطق الداشبورد)
  const byStudent={};
  students.forEach(st=>{
    const stCourses=allCourses.filter(c=>c.sid===st.id);
    if(!stCourses.length)return;
    const sumPct=stCourses.reduce((a,c)=>a+c.pct,0);
    const sumAbs=stCourses.reduce((a,c)=>a+(c.abs||0),0);
    byStudent[st.id]={sid:st.id,name:st.name,grp:st.grp,courses:stCourses,sumPct,sumAbs,n:stCourses.length};
  });
  let ranked=Object.values(byStudent).map(s=>({
    name:s.name,grp:s.grp,avg:s.n?Math.round(s.sumPct/s.n*10)/10:0,gpa:parseFloat(gpaFrom(s.courses)),
    avgAbs:s.n?Math.round(s.sumAbs/s.n):0
  })).sort((a,b)=>b.avg-a.avg||b.gpa-a.gpa);
  ranked.forEach((s,i)=>s.rank=i+1);
  const top3=ranked.slice(0,3);
  // معطيات
  const totStudents=students.length;
  const totCourses=[...new Set(allCourses.map(c=>c.course))].length;
  const totTrainers=[...new Set(allCourses.map(c=>c.trainer).filter(Boolean))].length;
  const grps=[...new Set(students.map(s=>s.grp))].length;
  const avgAll=allCourses.length?Math.round(allCourses.reduce((a,c)=>a+c.pct,0)/allCourses.length):0;
  const excellentCount=ranked.filter(s=>s.avg>=90).length;
  const passRate=ranked.length?Math.round(ranked.filter(s=>s.avg>=60).length/ranked.length*100):0;
  const podiumOrder=[top3[1],top3[0],top3[2]].filter(Boolean);
  const podiumH=[130,175,105];
  const podiumC=['#c0c0c0','#ffd700','#cd7f32'];
  const nm=n=>n.split(' ').slice(0,3).join(' ');
  // رسم توزيع المعدلات
  const bands=[
    {lbl:'ممتاز 90+',min:90,max:101,c:'#2ecc71'},
    {lbl:'جيد جداً 80-89',min:80,max:90,c:'#6ab8f7'},
    {lbl:'جيد 70-79',min:70,max:80,c:'#c9a227'},
    {lbl:'مقبول 60-69',min:60,max:70,c:'#e67e22'},
    {lbl:'ضعيف <60',min:0,max:60,c:'#e74c3c'}
  ];
  const counts=bands.map(b=>ranked.filter(s=>s.avg>=b.min&&s.avg<b.max).length);
  const maxC=Math.max(1,...counts);
  const chartBars=bands.map((b,i)=>{
    const h=Math.round(counts[i]/maxC*100);
    return `<div style="display:flex;flex-direction:column;align-items:center;flex:1;gap:.5vh">
      <div style="font-size:1.8vh;font-weight:800;color:${b.c}">${counts[i]}</div>
      <div style="width:70%;height:${h}px;min-height:4px;background:linear-gradient(180deg,${b.c},${b.c}aa);border-radius:4px 4px 0 0"></div>
      <div style="font-size:1.1vh;color:#b8c5d8;text-align:center;line-height:1.2">${b.lbl}</div>
    </div>`;
  }).join('');
  return `
  <div class="tv-head">
    <img src="${(document.querySelector('link[rel="icon"]')||{}).href||''}" class="tv-logo">
    <div class="tv-title">معهد المعرفة والإبداع العالي للتدريب</div>
    <div class="tv-sub">🏆 لوحة الشرف والإحصائيات · <span id="tvClock">${new Date().toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'})}</span> · <span style="color:#2ecc71;font-weight:700"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#2ecc71;animation:pulse 1.5s infinite;margin-left:4px"></span>مباشر</span></div>
  </div>
  <div class="tv-stats">
    <div class="tv-stat"><div class="tv-snum">${totStudents}</div><div class="tv-slbl">🎓 المتدربون</div></div>
    <div class="tv-stat"><div class="tv-snum">${totCourses}</div><div class="tv-slbl">📚 المقررات</div></div>
    <div class="tv-stat"><div class="tv-snum">${totTrainers}</div><div class="tv-slbl">👨‍🏫 المدربون</div></div>
    <div class="tv-stat"><div class="tv-snum">${grps}</div><div class="tv-slbl">🏫 الشعب</div></div>
    <div class="tv-stat"><div class="tv-snum" style="color:${avgAll>=70?'#2ecc71':avgAll>=50?'#ffd700':'#e74c3c'}">${avgAll}%</div><div class="tv-slbl">📊 متوسط الإنجاز</div></div>
    <div class="tv-stat"><div class="tv-snum" style="color:#2ecc71">${passRate}%</div><div class="tv-slbl">✅ نسبة النجاح</div></div>
    <div class="tv-stat"><div class="tv-snum" style="color:#c9a227">${excellentCount}</div><div class="tv-slbl">⭐ المتفوقون</div></div>
  </div>
  <div class="tv-body3">
    <div class="tv-col">
      <div class="tv-section-title">🏆 منصة التتويج</div>
      <div class="tv-podium">
        ${podiumOrder.map((s,i)=>{
          const h=podiumH[i],clr=podiumC[i],r=s.rank;
          return `<div class="tv-pod-col">
            <div class="tv-pod-medal">${r===1?'🥇':r===2?'🥈':'🥉'}</div>
            <div class="tv-pod-name">${nm(s.name)}</div>
            <div class="tv-pod-info">شعبة ${s.grp} · ${s.avg}%</div>
            <div class="tv-pod-bar" style="height:${h}px;background:linear-gradient(180deg,${clr},${clr}bb);box-shadow:0 -4px 24px ${clr}66">
              <span class="tv-pod-rank">${r}</span>
            </div>
          </div>`;
        }).join('')}
      </div>
      <div class="tv-section-title" style="margin-top:1vh">📈 توزيع المعدلات</div>
      <div style="display:flex;align-items:flex-end;gap:.6vw;height:14vh;background:rgba(255,255,255,.04);border-radius:12px;padding:1vh .8vw">${chartBars}</div>
    </div>
    <div class="tv-col">
      <div class="tv-section-title">📋 الترتيب العام</div>
      <div class="tv-list">
        ${ranked.slice(0,12).map(s=>`<div class="tv-row${s.rank<=3?' tv-row-top':''}">
          <div class="tv-rank">${s.rank<=3?['🥇','🥈','🥉'][s.rank-1]:s.rank}</div>
          <div class="tv-name">${nm(s.name)}</div>
          <div class="tv-grp">شعبة ${s.grp}</div>
          <div class="tv-avg" style="color:${s.avg>=80?'#2ecc71':s.avg>=60?'#ffd700':'#e74c3c'}">${s.avg}%</div>
        </div>`).join('')}
      </div>
    </div>
  </div>`;
}
function openTVMode(){
  try{
    let tv=document.getElementById('tvMode');
    if(!tv){
      tv=document.createElement('div');
      tv.id='tvMode';
      tv.className='tv-mode';
      document.body.appendChild(tv);
    }
    let content='';
    try{content=buildTVContent();}
    catch(err){content='<div style="color:#fff;text-align:center;padding:40px">تعذّر تحميل شاشة العرض<br><small style="color:#b8c5d8">'+err.message+'</small></div>';}
    tv.innerHTML='<button class="tv-close" onclick="closeTVMode()" title="خروج (ESC)">✕</button>'+content;
    tv.style.display='flex';
    // ملء الشاشة الحقيقي (اختياري — لو فشل نكمل عادي)
    try{
      if(tv.requestFullscreen)tv.requestFullscreen().catch(()=>{});
      else if(tv.webkitRequestFullscreen)tv.webkitRequestFullscreen();
    }catch(e){}
    // تحديث تلقائي كل 30 ثانية
    if(window._tvTimer)clearInterval(window._tvTimer);
    window._tvTimer=setInterval(async()=>{
      if(!document.getElementById('tvMode')||tv.style.display==='none'){clearInterval(window._tvTimer);return;}
      try{await loadAdmin();tv.innerHTML='<button class="tv-close" onclick="closeTVMode()" title="خروج (ESC)">✕</button>'+buildTVContent();}catch(e){}
    },30000);
    document.addEventListener('keydown',tvEscHandler);
  }catch(e){
    if(typeof showToast==='function')showToast('تعذّر فتح شاشة العرض: '+e.message,'e');
  }
}
function tvEscHandler(e){if(e.key==='Escape')closeTVMode();}
function closeTVMode(){
  const tv=document.getElementById('tvMode');
  if(tv)tv.style.display='none';
  if(window._tvTimer){clearInterval(window._tvTimer);window._tvTimer=null;}
  document.removeEventListener('keydown',tvEscHandler);
  try{if(document.fullscreenElement&&document.exitFullscreen)document.exitFullscreen().catch(()=>{});}catch(e){}
}

        <td><button onclick='editAccount("student",${JSON.stringify(s).replace(/'/g,"&#39;")})' class="btn btn-out btn-sm">✏️</button> <button onclick='deleteAccount("student","${s.id}","${(s.name||'').replace(/"/g,'')}")' class="btn btn-sm" style="background:#e74c3c;color:#fff">🗑️</button></td>

  dashboard:()=>{
    // ===== حساب معدّل كل طالب =====
    // نعتمد على الطلاب المسجّلين في students (الحاليون)، ونجيب مقرراتهم من allCourses بالمطابقة بالرقم الأكاديمي
    // (نفس طريقة صفحة المتدربين showStudentDetail التي تعمل بشكل صحيح)
    const byStudent={};
    students.forEach(st=>{
      const stCourses=allCourses.filter(c=>c.sid===st.id);
      if(!stCourses.length)return;
      const sumPct=stCourses.reduce((a,c)=>a+c.pct,0);
      const sumAbs=stCourses.reduce((a,c)=>a+(c.abs||0),0);
      byStudent[st.id]={sid:st.id,name:st.name,grp:st.grp,courses:stCourses,sumPct,sumAbs,n:stCourses.length};
    });
    let ranked=Object.values(byStudent).map(s=>({
      sid:s.sid,name:s.name,grp:s.grp,coursesCount:s.n,
      avg:s.n?Math.round(s.sumPct/s.n*10)/10:0,
      gpa:parseFloat(gpaFrom(s.courses)),
      avgAbs:s.n?Math.round(s.sumAbs/s.n):0
    })).sort((a,b)=>b.avg-a.avg||b.gpa-a.gpa);
    // إعطاء رتبة (مع التعادل)
    ranked.forEach((s,i)=>{s.rank=i+1;});
    const top3=ranked.slice(0,3);
    // للإحصائيات: كل المقررات
    const actives=allCourses;
    // ===== معطيات عامة =====
    const totStudents=students.length;
    const totCourses=[...new Set(allCourses.map(c=>c.course))].length;
    const totTrainers=[...new Set(allCourses.map(c=>c.trainer).filter(Boolean))].length;
    const grps=[...new Set(students.map(s=>s.grp))].sort();
    const avgAll=actives.length?Math.round(actives.reduce((a,c)=>a+c.pct,0)/actives.length):0;
    const bannedCount=actives.filter(c=>(c.abs||0)>=25).length;
    const excellentCount=ranked.filter(s=>s.avg>=90).length;
    const passCount=actives.filter(c=>c.pct>=60).length;
    const passRate=actives.length?Math.round(passCount/actives.length*100):0;
    // ميداليات
    const medal=r=>r===1?'🥇':r===2?'🥈':r===3?'🥉':`<span style="font-weight:800;color:var(--muted)">${r}</span>`;
    const podiumOrder=[top3[1],top3[0],top3[2]].filter(Boolean); // فضي-ذهبي-برونزي
    const podiumH=[130,170,105];
    const podiumC=['#c0c0c0','#ffd700','#cd7f32'];

    <div class="banner"><div><div class="btitle">📈 الداشبورد الشامل والأوائل</div><div class="bsub">${user.title} — ${user.name}</div></div>
      <button id="tvModeBtn" onclick="try{openTVMode()}catch(e){alert('خطأ: '+e.message)}" style="background:linear-gradient(135deg,#c9a227,#e0b83a);color:#0a2348;border:none;padding:10px 24px;border-radius:24px;cursor:pointer;font-size:14px;font-weight:800;box-shadow:0 4px 16px rgba(201,162,39,.35);display:flex;align-items:center;gap:8px;transition:transform .2s" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">🖥️ شاشة العرض</button>
    </div>

    <div class="stitle">📊 معطيات الأكاديمية</div>
    <div class="metrics">
      <div class="mcard mc-b"><div class="micon">🎓</div><div class="mnum cb" data-target="${totStudents}">${totStudents}</div><div class="mlbl">المتدربون</div></div>
      <div class="mcard mc-g"><div class="micon">📚</div><div class="mnum cg" data-target="${totCourses}">${totCourses}</div><div class="mlbl">المقررات</div></div>
      <div class="mcard mc-y"><div class="micon">👨‍🏫</div><div class="mnum cy" data-target="${totTrainers}">${totTrainers}</div><div class="mlbl">المدربون</div></div>
      <div class="mcard mc-b"><div class="micon">🏫</div><div class="mnum cb" data-target="${grps.length}">${grps.length}</div><div class="mlbl">الشعب</div></div>
      <div class="mcard ${avgAll>=70?'mc-g':avgAll>=50?'mc-y':'mc-r'}"><div class="micon">📊</div><div class="mnum ${avgAll>=70?'cg':avgAll>=50?'cy':'cr'}" data-target="${avgAll}" data-suffix="%">${avgAll}%</div><div class="mlbl">متوسط الإنجاز</div></div>
      <div class="mcard mc-g"><div class="micon">⭐</div><div class="mnum cg" data-target="${excellentCount}">${excellentCount}</div><div class="mlbl">متفوقون (90%+)</div></div>
      <div class="mcard ${passRate>=70?'mc-g':'mc-y'}"><div class="micon">✅</div><div class="mnum ${passRate>=70?'cg':'cy'}" data-target="${passRate}" data-suffix="%">${passRate}%</div><div class="mlbl">نسبة النجاح</div></div>
      <div class="mcard ${bannedCount?'mc-r':'mc-g'}"><div class="micon">🚫</div><div class="mnum ${bannedCount?'cr':'cg'}" data-target="${bannedCount}">${bannedCount}</div><div class="mlbl">محرومون بالغياب</div></div>
    </div>

    <div class="stitle">📊 التحليل البياني</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:8px" class="dash-charts">
      ${(()=>{
        // توزيع الدرجات على فئات
        const bands=[
          {lbl:'ممتاز 90+',min:90,max:101,c:'#2ecc71'},
          {lbl:'جيد جداً 80-89',min:80,max:90,c:'#6ab8f7'},
          {lbl:'جيد 70-79',min:70,max:80,c:'#c9a227'},
          {lbl:'مقبول 60-69',min:60,max:70,c:'#e67e22'},
          {lbl:'ضعيف <60',min:0,max:60,c:'#e74c3c'}
        ];
        const counts=bands.map(b=>ranked.filter(s=>s.avg>=b.min&&s.avg<b.max).length);
        const maxC=Math.max(1,...counts);
        const bars=bands.map((b,i)=>{
          const h=Math.round(counts[i]/maxC*130);
          return `<div style="display:flex;flex-direction:column;align-items:center;flex:1;gap:4px">
            <div style="font-size:12px;font-weight:700;color:${b.c}">${counts[i]}</div>
            <div style="width:70%;height:${h}px;min-height:4px;background:linear-gradient(180deg,${b.c},${b.c}aa);border-radius:5px 5px 0 0;transition:height .6s"></div>
            <div style="font-size:9px;color:var(--muted);text-align:center;line-height:1.2">${b.lbl}</div>
          </div>`;
        }).join('');
        return `<div style="background:var(--card,rgba(255,255,255,.03));border:1px solid var(--border);border-radius:12px;padding:14px">
          <div style="font-size:13px;font-weight:700;margin-bottom:12px;color:var(--text)">📈 توزيع المعدلات</div>
          <div style="display:flex;align-items:flex-end;gap:6px;height:170px">${bars}</div>
        </div>`;
      })()}
      ${(()=>{
        // مؤشرات تحليلية سريعة
        const totRanked=ranked.length||1;
        const topAvg=ranked.length?Math.round(ranked.slice(0,Math.ceil(totRanked*0.1)).reduce((a,s)=>a+s.avg,0)/Math.ceil(totRanked*0.1)):0;
        const median=ranked.length?ranked[Math.floor(ranked.length/2)].avg:0;
        const highAbsCount=ranked.filter(s=>s.avgAbs>=15).length;
        const perfectAtt=ranked.filter(s=>s.avgAbs===0).length;
        const rows=[
          ['🏅','معدّل أعلى 10%',topAvg+'%','#2ecc71'],
          ['📊','الوسيط (median)',median+'%','#6ab8f7'],
          ['📉','غياب مرتفع (15%+)',highAbsCount+' متدرب',highAbsCount?'#e74c3c':'#2ecc71'],
          ['✅','حضور كامل',perfectAtt+' متدرب','#2ecc71'],
          ['🎯','إجمالي المصنّفين',totRanked+' متدرب','#c9a227']
        ];
        return `<div style="background:var(--card,rgba(255,255,255,.03));border:1px solid var(--border);border-radius:12px;padding:14px">
          <div style="font-size:13px;font-weight:700;margin-bottom:10px;color:var(--text)">🎯 مؤشرات تحليلية</div>
          ${rows.map(r=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 4px;border-bottom:1px solid var(--border)">
            <div style="display:flex;align-items:center;gap:8px"><span style="font-size:16px">${r[0]}</span><span style="font-size:12px;color:var(--muted)">${r[1]}</span></div>
            <span style="font-size:14px;font-weight:800;color:${r[3]}">${r[2]}</span>
          </div>`).join('')}
        </div>`;
      })()}
    </div>

    ${top3.length?`
    <div class="stitle">🏆 منصة تتويج الأوائل (عام)</div>
    <div style="display:flex;justify-content:center;align-items:flex-end;gap:12px;margin:24px 0 8px;padding:20px 10px;background:linear-gradient(135deg,rgba(201,162,39,.08),rgba(106,184,247,.06));border-radius:16px">
      ${podiumOrder.map((s,i)=>{
        const realRank=s.rank;const h=podiumH[i];const clr=podiumC[i];
        return `<div style="display:flex;flex-direction:column;align-items:center;flex:1;max-width:180px">
          <div style="font-size:32px;margin-bottom:4px">${realRank===1?'🥇':realRank===2?'🥈':'🥉'}</div>
          <div style="font-weight:700;font-size:13px;text-align:center;margin-bottom:2px;color:var(--text)">${s.name.split(' ').slice(0,2).join(' ')}</div>
          <div style="font-size:11px;color:var(--muted);margin-bottom:6px">شعبة ${s.grp} · ${s.avg}%</div>
          <div style="width:100%;height:${h}px;background:linear-gradient(180deg,${clr},${clr}bb);border-radius:8px 8px 0 0;display:flex;align-items:flex-start;justify-content:center;padding-top:8px;box-shadow:0 -2px 12px ${clr}55">
            <span style="font-size:26px;font-weight:900;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.3)">${realRank}</span>
          </div>
        </div>`;
      }).join('')}
    </div>`:''}

    <div class="stitle">📋 الترتيب الكامل (كل الأكاديمية)</div>
    <div class="gtable"><table>
      <thead><tr><th>الترتيب</th><th>الاسم</th><th>الشعبة</th><th>المعدّل %</th><th>GPA /5</th><th>المقررات</th><th>متوسط الغياب</th></tr></thead>
      <tbody>${ranked.map(s=>`<tr${s.rank<=3?' style="background:rgba(201,162,39,.06)"':''}>

        <td style="font-weight:${s.rank<=3?'700':'500'}">${s.name}</td>
        <td>شعبة ${s.grp}</td>
        <td><span class="pill ${pillClass(s.avg)}">${s.avg}%</span></td>
        <td><span style="font-weight:700;color:${gpaColor(s.gpa)}">${s.gpa.toFixed(2)}</span></td>
        <td>${s.coursesCount}</td>
        <td><span style="color:${s.avgAbs>=25?'var(--red)':s.avgAbs>=15?'var(--gold)':'var(--muted)'}">${s.avgAbs}%</span></td>
      </tr>`).join('')||'<tr><td colspan="7" style="text-align:center;color:var(--muted)">لا يوجد متدربون نشطون</td></tr>'}</tbody>
    </table></div>

    <div class="stitle">🥇 أوائل كل شعبة</div>
    ${grps.map(g=>{
      const gRanked=ranked.filter(s=>s.grp===g).slice(0,3);
      if(!gRanked.length)return '';
      return `<div style="margin-bottom:16px">
        <div style="font-size:14px;font-weight:700;color:#6ab8f7;margin-bottom:8px;padding:6px 12px;background:rgba(106,184,247,.1);border-radius:6px">🏫 الشعبة ${g}</div>
        <div class="gtable"><table>
          <thead><tr><th>الترتيب</th><th>الاسم</th><th>المعدّل %</th><th>GPA /5</th></tr></thead>
          <tbody>${gRanked.map((s,i)=>`<tr>
            <td>${i===0?'🥇':i===1?'🥈':'🥉'}</td>
            <td style="font-weight:${i===0?'700':'500'}">${s.name}</td>
            <td><span class="pill ${pillClass(s.avg)}">${s.avg}%</span></td>
            <td><span style="font-weight:700;color:${gpaColor(s.gpa)}">${s.gpa.toFixed(2)}</span></td>
          </tr>`).join('')}</tbody>
        </table></div>
      </div>`;
    }).join('')}`;
  },

        <td style="color:var(--muted)">${s.id}</td><td>${s.name}</td><td>${s.grp}</td>

  all_courses:()=>{
    // المواد الحالية فقط (المسجّل فيها طلاب نشطون هذا الترم)
    const active=allCourses.filter(c=>isActive(c.status));
    // تجميع حسب المادة
    const byCourse={};
    active.forEach(c=>{
      const k=c.course;
      if(!byCourse[k])byCourse[k]={course:k,code:c.code,trainer:c.trainer,students:[],grps:new Set()};
      byCourse[k].students.push(c);
      if(c.grp)byCourse[k].grps.add(c.grp);
    });
    const courses=Object.values(byCourse);
    if(!courses.length)return `<div class="stitle">📚 المقررات الحالية</div><div class="empty"><div class="empty-icon">📭</div>لا توجد مقررات حالية (لا يوجد طلاب مسجّلون هذا الترم)</div>`;
    // ملخّص علوي
    const totStudents=new Set(active.map(c=>c.sid)).size;
    const avgAll=active.length?Math.round(active.reduce((a,c)=>a+c.pct,0)/active.length):0;
    return `
    <div class="banner"><div><div class="btitle">📚 المقررات الحالية</div><div class="bsub">المواد التي يدرسها المتدربون هذا الترم — ${courses.length} مقرر · ${totStudents} متدرب</div></div><div class="bpill bp-b">${avgAll}% متوسط</div></div>
    <div class="gtable"><table>
      <thead><tr><th>المقرر</th><th>الرمز</th><th>المدرب</th><th>الشعب</th><th>عدد المتدربين</th><th>متوسط الدرجات</th><th>متوسط الغياب</th><th>محرومون</th></tr></thead>
      <tbody>${courses.map(c=>{
        const n=c.students.length;
        const avg=Math.round(c.students.reduce((a,s)=>a+s.pct,0)/n);
        const avgAbs=Math.round(c.students.reduce((a,s)=>a+(s.abs||0),0)/n);
        const banned=c.students.filter(s=>(s.abs||0)>=25).length;
        const grpsLbl=[...c.grps].sort().join('، ');
        return `<tr style="cursor:pointer" onclick="showCourseDetail('${c.course.replace(/'/g,"")}')">
          <td style="font-weight:700;color:#6ab8f7">${c.course}</td>
          <td>${c.code||'-'}</td>
          <td>${c.trainer||'—'}</td>
          <td>${grpsLbl||'-'}</td>
          <td style="text-align:center;font-weight:700">${n}</td>
          <td><span class="pill ${pillClass(avg)}">${avg}%</span></td>
          <td><span style="color:${avgAbs>=25?'var(--red)':avgAbs>=15?'var(--gold)':'var(--muted)'}">${avgAbs}%</span></td>
          <td style="text-align:center">${banned?`<span style="color:var(--red);font-weight:700">${banned}</span>`:'0'}</td>
        </tr>`;
      }).join('')}</tbody>
    </table></div>
    <div style="font-size:12px;color:var(--muted);margin-top:10px">💡 اضغط على أي مقرر لعرض تفاصيل المتدربين المسجّلين فيه</div>`;
  },
  schedule:()=>{
    const grps=[...new Set(students.map(s=>s.grp))].filter(Boolean).sort();
    const cur=window._schedGrp||'all';
    window._schedGrp=cur;
    const isAll=cur==='all';
    const P=schedConfig.periodsPerDay;
    const days=activeDays();
    // خلية الجدول لشعبة معينة
    const cell=(g,day,p)=>{
      const grid=schedule[g]||{};
      const slot=day+'|'+p;
      const c=grid[slot];
      return `<td class="sch-cell ${c?'filled':''}" 
        ondragover="event.preventDefault()" ondrop="schDrop(event,'${g}','${slot}')"
        onclick="${c?`schClear('${g}','${slot}')`:''}">
        ${c?`<div class="sch-item" draggable="true" ondragstart="schDrag(event,'${g}','${slot}')">
          <div class="sch-course">${c.course}</div>
          <div class="sch-trainer">${c.trainer||''}</div>
          <select class="sch-room" onclick="event.stopPropagation()" onchange="schSetRoom('${g}','${slot}',this.value)">
            ${LABS.map(l=>`<option value="${l}" ${c.room===l?'selected':''}>${l}</option>`).join('')}
          </select>
        </div>`:'<span class="sch-empty">+</span>'}
      </td>`;
    };
    // جدول شعبة واحدة (HTML)
    const tableFor=(g)=>{
      const cListInfo=coursesForSchedule(g);
      const placedCount=Object.keys(schedule[g]||{}).length;
      const neededCount=cListInfo.reduce((a,c)=>a+c.sessions,0);
      const bAfter=breakAfterPeriod(); // الحصة التي تأتي بعدها الاستراحة
      // بناء رؤوس الأعمدة مع إدراج عمود الاستراحة
      const headCells=[...Array(P).keys()].map(p=>{
        const th=`<th>الحصة ${p+1}<div class="sch-time" style="font-size:9px;margin-top:2px">${periodTime(p)}</div></th>`;
        return (p===bAfter&&bAfter>=0&&bAfter<P-1)?th+`<th class="sch-break-col" style="background:var(--gold);color:#000;width:50px">☕<div style="font-size:8px;margin-top:2px">${breakTime()}</div></th>`:th;
      }).join('');
      // بناء خلايا كل يوم مع إدراج خلية الاستراحة
      const rowCells=(g,d)=>[...Array(P).keys()].map(p=>{
        const c=cell(g,d,p);
        return (p===bAfter&&bAfter>=0&&bAfter<P-1)?c+`<td class="sch-break-col" style="background:rgba(201,162,39,.15);text-align:center;color:var(--gold);font-weight:700;font-size:10px">☕</td>`:c;
      }).join('');
      return `
      ${isAll?`<div class="stitle" style="margin-top:20px">📋 الشعبة ${g}</div>`:''}
      ${cListInfo.length?`<div class="alert ab"><span class="aicon">📚</span>الشعبة ${g}: ${cListInfo.length} مواد حالية · تحتاج ${neededCount} حصة · ${placedCount} موزّعة</div>`:'<div class="alert aw"><span class="aicon">⚠️</span>لا توجد مواد حالية للشعبة '+g+' (تأكد من حالة المواد = حالي)</div>'}
      ${cListInfo.length?`<div class="sch-legend">${cListInfo.map(c=>`<span class="sch-tag">${c.course} <b>(${c.sessions} حصص)</b> · ${c.trainer}</span>`).join('')}</div>`:''}
      <div class="sch-wrap"><table class="sch-table">
        <thead><tr><th>اليوم</th>${headCells}</tr></thead>
        <tbody>${days.map(d=>`<tr><td class="sch-pnum">${d}</td>${rowCells(g,d)}</tr>`).join('')}</tbody>
      </table></div>`;
    };
    const genBtn=isAll?`<button class="btn btn-b" onclick="genAllSchedule()">⚡ ولّد كل الشعب</button>`:`<button class="btn btn-b" onclick="genSchedule('${cur}')">⚡ ولّد الجدول</button>`;
    return `
    <div class="banner"><div><div class="btitle">📅 مولّد الجدول الأوتوماتيكي</div><div class="bsub">تعبئة ذكية من الأحد · أوقات مبكرة · قابل للتعديل بالسحب</div></div></div>
    <div class="sch-controls">
      <div class="sch-cfg">
        <label>الشعبة</label>
        <select onchange="window._schedGrp=this.value;showAPage('schedule',null)">
          ${grps.map(g=>`<option value="${g}" ${g===cur?'selected':''}>الشعبة ${g}</option>`).join('')}
          <option value="all" ${isAll?'selected':''}>🏫 كل الشعب</option>
        </select>
      </div>
      <div class="sch-cfg"><label>عدد الأيام</label>
        <input type="number" min="1" max="5" value="${schedConfig.daysCount}" onchange="schedConfig.daysCount=parseInt(this.value)||5;showAPage('schedule',null)"></div>
      <div class="sch-cfg"><label>حصص باليوم</label>
        <input type="number" min="1" max="8" value="${P}" onchange="schedConfig.periodsPerDay=parseInt(this.value)||5;showAPage('schedule',null)"></div>
      <div class="sch-cfg"><label>ساعة الحصة</label>
        <input type="number" min="1" max="6" step="0.5" value="${schedConfig.periodHours}" onchange="schedConfig.periodHours=parseFloat(this.value)||2;showAPage('schedule',null)"></div>
      <div class="sch-cfg"><label>بداية الدوام</label>
        <input type="number" min="6" max="14" step="0.5" value="${schedConfig.startHour}" onchange="schedConfig.startHour=parseFloat(this.value)||8;showAPage('schedule',null)"></div>
      <div class="sch-cfg"><label>بداية الاستراحة</label>
        <input type="number" min="9" max="15" step="0.5" value="${schedConfig.breakStart}" title="وقت بداية الاستراحة (12 = الظهر)" onchange="schedConfig.breakStart=parseFloat(this.value)||12;showAPage('schedule',null)"></div>
      <div class="sch-cfg"><label>مدة الاستراحة (ساعة)</label>
        <input type="number" min="0.5" max="3" step="0.5" value="${schedConfig.breakHours}" onchange="schedConfig.breakHours=parseFloat(this.value)||1;showAPage('schedule',null)"></div>
      ${genBtn}
      <button class="btn btn-g" onclick="saveSchedule()">💾 حفظ الجدول</button>
      <button class="btn btn-out" onclick="printScheduleReport()">🖨️ طباعة تقرير</button>
    </div>
    ${isAll?grps.map(g=>tableFor(g)).join(''):tableFor(cur)}
    <div style="font-size:12px;color:var(--muted);margin-top:10px">💡 اسحب أي مادة لخانة ثانية لتعديل الجدول · اضغط على خانة لحذفها</div>`;
  },
  requests:()=>{
    const isDir=user.level==='director';
    // المشرف: للأعذار لازم المدرب يعتمد أولاً | المدير: بعد المشرف
    const pending=requests.filter(r=>{
      if(isDir)return r.supStatus==='معتمد'&&r.dirStatus==='معلق';
      // مشرف: عذر غياب يحتاج اعتماد المدرب أولاً
      if(r.type==='عذر غياب')return r.trnStatus==='معتمد'&&r.supStatus==='معلق';
      return r.supStatus==='معلق';
    });
    const done=requests.filter(r=>!pending.includes(r)).sort((a,b)=>(b.date||'').localeCompare(a.date||''));
    // تحليل تفاصيل عذر الغياب من النص
    const parseExcuse=(r)=>{
      const d=r.details||'';
      const course=((d.match(/المادة:\s*([^|]+)/)||[])[1]||'').trim();
      const days=((d.match(/الأيام:\s*([^|]+)/)||[])[1]||'').trim();
      const hours=parseFloat((d.match(/ساعات:\s*([\d.]+)/)||[])[1])||parseFloat(r.exHours)||0;
      const reason=((d.match(/السبب:\s*([^|]+)/)||[])[1]||'').trim();
      const file=((d.match(/الملف:\s*(\S+)/)||[])[1]||'').trim();
      return {course,days,hours,reason,file};
    };
    // لوحة تفاصيل العذر مع معاينة الخصم
    const excusePanel=(r)=>{
      const ex=parseExcuse(r);
      const cc=allCourses.find(x=>x.sid===r.sid&&x.course===ex.course);
      const code=cc?cc.code:'';
      const excusedPct=code&&ex.hours?absHoursToPct(ex.hours,code):0;
      const curAbs=cc?Math.round(cc.abs*10)/10:0;
      const newAbs=Math.max(0,Math.round((curAbs-excusedPct)*10)/10);
      return `<div style="margin:8px 0;padding:12px;background:rgba(255,255,255,.03);border-radius:8px;border:1px solid var(--border)">
        <div style="display:flex;justify-content:space-between;font-size:12px;padding:4px 0"><span style="color:var(--muted)">المادة</span><span style="font-weight:700">${ex.course||'—'}</span></div>
        ${ex.days?`<div style="display:flex;justify-content:space-between;font-size:12px;padding:4px 0"><span style="color:var(--muted)">أيام الغياب</span><span style="font-weight:700;text-align:left;max-width:60%">${ex.days}</span></div>`:''}
        <div style="display:flex;justify-content:space-between;font-size:12px;padding:4px 0"><span style="color:var(--muted)">ساعات الغياب المطلوب عذرها</span><span style="font-weight:700">${ex.hours||0} ساعة</span></div>
        ${ex.reason&&ex.reason!=='—'?`<div style="display:flex;justify-content:space-between;font-size:12px;padding:4px 0"><span style="color:var(--muted)">السبب</span><span style="font-weight:600;text-align:left;max-width:60%">${ex.reason}</span></div>`:''}
        ${ex.file?`<div style="display:flex;justify-content:space-between;font-size:12px;padding:4px 0"><span style="color:var(--muted)">الملف الداعم</span><a href="${ex.file}" target="_blank" style="color:#6ab8f7;font-weight:700">📎 فتح الملف</a></div>`:'<div style="font-size:11px;color:var(--gold);padding:4px 0">⚠️ لا يوجد ملف داعم مرفق</div>'}
        ${cc?`<div style="margin-top:8px;padding-top:8px;border-top:1px dashed var(--border);display:flex;justify-content:space-between;align-items:center;font-size:12px">
          <span style="color:var(--muted)">تأثير الاعتماد على الغياب</span>
          <span><span style="color:var(--red);font-weight:700">${curAbs}%</span> <span style="color:var(--muted)">←</span> <span style="color:var(--green);font-weight:700">${newAbs}%</span></span>
        </div>`:'<div style="font-size:11px;color:var(--red);margin-top:6px">⚠️ لم يُعثر على سجل المادة لهذا الطالب</div>'}
      </div>`;
    };
    const card=(r,actionable)=>{
      const finalBadge=(r.finalStatus==='معتمد'||r.dirStatus==='معتمد')?'<span class="pill pg">معتمد نهائياً ✓</span>':(r.supStatus==='مرفوض'||r.dirStatus==='مرفوض')?'<span class="pill pr">مرفوض</span>':r.supStatus==='معتمد'?'<span class="pill pb">بانتظار المدير</span>':'<span class="pill py">بانتظار المشرف</span>';
      const isExcuse=r.type==='عذر غياب';
      return `<div class="ccard ${actionable?'cc-y':((r.dirStatus==='معتمد')?'cc-g':(r.supStatus==='مرفوض'||r.dirStatus==='مرفوض')?'cc-r':'cc-b')}" style="margin-bottom:12px">
        <div class="cc-top"><div><div class="cc-name">${r.type} — ${r.sname}</div><div class="cc-meta">الشعبة ${r.grp} · ${r.sid} · ${r.date||''}</div></div>${finalBadge}</div>
        ${isExcuse?excusePanel(r):(r.details?`<div style="font-size:13px;color:var(--muted);margin:8px 0;padding:10px;background:rgba(255,255,255,.03);border-radius:8px">${r.details}</div>`:'')}
        <div style="display:flex;gap:16px;font-size:11px;margin-top:6px;flex-wrap:wrap">
          ${isExcuse?`<span style="color:${r.trnStatus==='معتمد'?'var(--green)':r.trnStatus==='مرفوض'?'var(--red)':'var(--muted)'}">المدرب: ${r.trnStatus||'معلق'}</span>`:''}
          <span style="color:${r.supStatus==='معتمد'?'var(--green)':r.supStatus==='مرفوض'?'var(--red)':'var(--muted)'}">المشرف: ${r.supStatus}</span>
          <span style="color:${r.dirStatus==='معتمد'?'var(--green)':r.dirStatus==='مرفوض'?'var(--red)':'var(--muted)'}">المدير: ${r.dirStatus}</span>
        </div>
        ${actionable?`<div class="btn-row"><button class="btn btn-g btn-sm" onclick="actOnRequest('${r.rid}','معتمد')">✓ اعتماد${isExcuse?' وخصم الساعات':''}</button><button class="btn btn-out btn-sm" onclick="actOnRequest('${r.rid}','مرفوض')">✕ رفض</button></div>`:''}
      </div>`;
    };
    return `
    <div class="banner"><div><div class="btitle">📋 الطلبات والموافقات</div><div class="bsub">${isDir?'مدير الأكاديمية — الاعتماد النهائي':'المشرف الأكاديمي — المراجعة الأولى'}</div></div><div class="bpill ${isDir?'bp-y':'bp-b'}">${isDir?'مدير':'مشرف'}</div></div>
    <div class="stitle">🔔 بانتظار اعتمادك ${pending.length?`(${pending.length})`:''}</div>
    ${pending.length?pending.map(r=>card(r,true)).join(''):'<div class="alert as"><span class="aicon">✅</span>لا توجد طلبات بانتظار اعتمادك</div>'}
    <div class="stitle" style="margin-top:24px">📚 كل الطلبات (${requests.length})</div>
    ${done.length?done.map(r=>card(r,false)).join(''):'<div class="empty"><div class="empty-icon">📭</div>لا توجد طلبات</div>'}`;
  },
  alerts:()=>{
    // كل المواد (بدون فلتر الحالة — لأن حالة الشيت قد لا تكون "حالي" بالضبط)
    const active=allCourses;
    // دالة: هل الطالب راسب في المادة ولم يجتزها بعد؟
    const stillFailed=c=>isFailed(c)&&!allCourses.some(o=>o.sid===c.sid&&normCode(o.code)===normCode(c.code)&&!isFailed(o)&&(parseFloat(o.pct)||0)>=60);
    // تجميع الحالات حسب المادة
    const byCourse={};
    active.forEach(c=>{
      const failed=stillFailed(c);
      const deprived=isDeprived(c.abs);
      const weak=!failed&&(parseFloat(c.pct)||0)>0&&(parseFloat(c.pct)||0)<60; // ضعيف (درجة منخفضة غير راسب رسمي)
      const highAbs=!deprived&&isHighAbs(c);
      if(!failed&&!deprived&&!weak&&!highAbs)return; // لا مشكلة
      const k=c.course;
      if(!byCourse[k])byCourse[k]={course:k,trainer:c.trainer,failed:[],deprived:[],weak:[],highAbs:[]};
      if(failed)byCourse[k].failed.push(c);
      else if(deprived)byCourse[k].deprived.push(c);
      else if(weak)byCourse[k].weak.push(c);
      if(highAbs&&!deprived)byCourse[k].highAbs.push(c);
    });
    const courses=Object.values(byCourse).sort((a,b)=>
      (b.failed.length+b.deprived.length+b.weak.length+b.highAbs.length)-(a.failed.length+a.deprived.length+a.weak.length+a.highAbs.length));
    // إحصائيات علوية
    const totFail=courses.reduce((a,c)=>a+c.failed.length,0);
    const totDep=courses.reduce((a,c)=>a+c.deprived.length,0);
    const totWeak=courses.reduce((a,c)=>a+c.weak.length,0);
    const totAbs=courses.reduce((a,c)=>a+c.highAbs.length,0);
    // صف حالة
    const caseRow=(c,type)=>{
      const cfg={
        failed:{icon:'❌',color:'#e74c3c',bg:'rgba(231,76,60,.08)',lbl:`راسب${(parseFloat(c.pct)||0)>0?` (${Math.round(c.pct)}%)`:''}`,badge:'متطلب'},
        deprived:{icon:'🚫',color:'#e74c3c',bg:'rgba(231,76,60,.08)',lbl:`محروم — غياب ${Math.round(c.abs)}%`,badge:'حرمان'},
        weak:{icon:'📉',color:'#ff8a3c',bg:'rgba(255,138,60,.08)',lbl:`ضعيف — درجة ${Math.round(c.pct)}%`,badge:''},
        highAbs:{icon:'⚠️',color:'#f4c78a',bg:'rgba(244,199,138,.08)',lbl:`غياب ${Math.round(c.abs)}% · ${absLevel(c.abs).label}`,badge:''}
      }[type];
      return `<div onclick="showStudentDetail('${c.sid}')" style="display:flex;align-items:center;gap:10px;padding:8px 12px;background:${cfg.bg};border-radius:8px;cursor:pointer;margin-bottom:5px">
        <span style="font-size:16px">${cfg.icon}</span>
        <span style="flex:1;font-size:13px;font-weight:600">${c.sname.split(' ').slice(0,3).join(' ')}</span>
        <span style="font-size:12px;color:${cfg.color}">${cfg.lbl}</span>
        ${cfg.badge?`<span style="font-size:9px;background:${cfg.color};color:#fff;padding:2px 8px;border-radius:10px;font-weight:700">${cfg.badge}</span>`:''}
        <span style="font-size:11px;color:#6ab8f7">←</span>
      </div>`;
    };
    return `
    <div class="banner"><div><div class="btitle">🔔 الاشعارات الأكاديمية</div><div class="bsub">حالات المتدربين مجمّعة حسب المواد</div></div></div>
    <div class="metrics" style="margin-bottom:20px">
      <div class="mcard mc-r"><div class="micon">❌</div><div class="mnum cr">${totFail}</div><div class="mlbl">راسبون (متطلبات)</div></div>
      <div class="mcard mc-r"><div class="micon">🚫</div><div class="mnum cr">${totDep}</div><div class="mlbl">محرومون (غياب)</div></div>
      <div class="mcard mc-y"><div class="micon">📉</div><div class="mnum cy">${totWeak}</div><div class="mlbl">ضعفاء</div></div>
      <div class="mcard mc-y"><div class="micon">⚠️</div><div class="mnum cy">${totAbs}</div><div class="mlbl">إنذار غياب</div></div>
    </div>
    ${courses.length?courses.map(c=>{
      const total=c.failed.length+c.deprived.length+c.weak.length+c.highAbs.length;

// ===== شاشة البداية =====
const SPLASH_MIN=2900; // الحد الأدنى لعرض الشاشة (مدة الأنيميشن)
let splashStart=Date.now();
function hideSplash(){
  const sp=document.getElementById('splash');
  if(!sp)return;
  const elapsed=Date.now()-splashStart;
  const wait=Math.max(0,SPLASH_MIN-elapsed);
  setTimeout(()=>{sp.classList.add('hide');setTimeout(()=>sp.remove(),650);},wait);
}
function setSplashLogo(){
  try{
    const fav=document.querySelector('link[rel="icon"]');
    const img=document.getElementById('splashLogo');
    if(fav&&img)img.src=fav.href;
  }catch(e){}
}

// استرجاع الجلسة عند تحميل الصفحة
async function restoreSession(){
  try{
    const savedUser=localStorage.getItem('bla_user');
    const savedRole=localStorage.getItem('bla_role');
    if(!savedUser||!savedRole){hideSplash();return;}
    const u=JSON.parse(savedUser);
    role=savedRole;
    currentUser=u;
    user=u;
    const st=document.getElementById('splashStatus');if(st)st.textContent='جاري جلب بياناتك...';
    // حماية: لو التحميل علّق أكثر من 12 ثانية، نوقف ونعرض صفحة الدخول
    const loadPromise=(role==='s')?loadStudent():(role==='t')?loadTrainer():loadAdmin();
    const timeout=new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')),12000));
    await Promise.race([loadPromise,timeout]);
    showApp();
    hideSplash();
  }catch(e){
    // فشل أو علّق التحميل → امسح الجلسة وارجع لصفحة الدخول
    localStorage.removeItem('bla_user');
    localStorage.removeItem('bla_role');
    user=null;currentUser=null;
    const st=document.getElementById('splashStatus');if(st)st.textContent='تعذّر تحميل البيانات — جاري فتح صفحة الدخول...';
    hideSplash();
  }
}

document.addEventListener('DOMContentLoaded',()=>{
  setSplashLogo();
  restoreSession();
});


// Ripple effect on all buttons
document.addEventListener('click', function(e){
  const btn = e.target.closest('button, .btn, .mcard, .ccard');
  if(!btn) return;
  const ripple = document.createElement('span');
  ripple.className = 'ripple-effect';
  const rect = btn.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height);
  ripple.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px`;
  btn.style.position = 'relative';
  btn.style.overflow = 'hidden';
  btn.appendChild(ripple);
  setTimeout(()=>ripple.remove(), 600);
});

// Stagger animations للبطاقات
function staggerAnimate(selector, animClass, delay=80){
  document.querySelectorAll(selector).forEach((el,i)=>{
    el.style.opacity='0';
    el.style.transform='translateY(30px)';
    setTimeout(()=>{
      el.style.transition=`all 0.8s cubic-bezier(0.16,1,0.3,1)`;
      el.style.opacity='1';
      el.style.transform='translateY(0)';
    }, i*delay);
  });
}

function showDetail(title,icon,html){

    <span style="font-size:13px;color:var(--muted)">${label}</span>

// تفاصيل بطاقات تقرير الإداري
function showRepDetail(kind){
  const grps=[...new Set(students.map(s=>s.grp))].filter(Boolean).sort();
  if(kind==='avg'){
    let html='<div style="font-size:13px;color:var(--muted);margin-bottom:12px">متوسط الدرجات لكل شعبة:</div>';
    grps.forEach(g=>{
      const gc=allCourses.filter(c=>students.filter(s=>s.grp===g).map(s=>s.id).includes(c.sid));
      const a=gc.length?Math.round(gc.reduce((x,c)=>x+c.pct,0)/gc.length):0;
      html+=detailRow('الشعبة '+g,a+'%',a>=70?'var(--green)':a>=60?'var(--gold)':'var(--red)');
    });
    showDetail('متوسط الأداء العام','📊',html);
  }else if(kind==='completed'){
    const byGrp={};
    allCourses.filter(c=>c.pct>=80).forEach(c=>{byGrp[c.grp]=(byGrp[c.grp]||0)+1;});
    let html='<div style="font-size:13px;color:var(--muted);margin-bottom:12px">المقررات المكتملة (درجة 80%+) لكل شعبة:</div>';
    grps.forEach(g=>html+=detailRow('الشعبة '+g,(byGrp[g]||0)+' مقرر','var(--green)'));
    html+=detailRow('الإجمالي',allCourses.filter(c=>c.pct>=80).length+' مقرر','var(--green)');
    showDetail('المقررات المكتملة','✅',html);
  }else if(kind==='trainers'){
    const trainers=[...new Set(allCourses.map(c=>c.trainer).filter(Boolean))];
    let html='<div style="font-size:13px;color:var(--muted);margin-bottom:12px">المدربون النشطون:</div>';
    trainers.forEach(t=>{
      const tc=allCourses.filter(c=>c.trainer===t);
      const a=tc.length?Math.round(tc.reduce((x,c)=>x+c.pct,0)/tc.length):0;
      html+=`<div onclick="document.getElementById('detailModal').remove();showTrainerDetail('${t}')" style="cursor:pointer">${detailRow(t,a+'% · '+[...new Set(tc.map(c=>c.sid))].length+' متدرب',a>=70?'var(--green)':'var(--gold)')}</div>`;
    });
    showDetail('المدربون','👨‍🏫',html);
  }else if(kind==='deprived'){
    const dep=allCourses.filter(c=>c.abs>=25);
    let html=dep.length?'<div style="font-size:13px;color:var(--muted);margin-bottom:12px">المتدربون المحرومون (غياب 25%+):</div>':'<div class="alert as"><span class="aicon">✅</span>لا توجد حالات حرمان</div>';
    dep.forEach(c=>{const st=students.find(s=>s.id===c.sid);html+=detailRow((st?st.name.split(' ').slice(0,3).join(' '):c.sname)+' · '+c.course,Math.round(c.abs)+'%','var(--red)');});
    showDetail('حالات الحرمان','⛔',html);
  }
}

    courses.filter(c=>c.pct>0).forEach(c=>{const g=gradeToGPA(c.pct);html+=detailRow(c.course,g.toFixed(2),gpaColor(g));});
    showDetail('المعدّل التراكمي','🏆',html);
  }else if(kind==='avg'){
    let html='<div style="font-size:13px;color:var(--muted);margin-bottom:10px">درجاتك:</div>';
    courses.forEach(c=>{const p=Math.round(c.pct);html+=detailRow(c.course,p+'%',p>=80?'var(--green)':p>=60?'var(--gold)':'var(--red)');});
    showDetail('متوسط الدرجات','📈',html);
  }else if(kind==='current'){
    const cur=courses.filter(c=>isActive(c.status));
    let html=cur.length?'<div style="font-size:13px;color:var(--muted);margin-bottom:10px">موادك الحالية:</div>':'<div class="alert ab">لا توجد مواد حالية</div>';
    cur.forEach(c=>html+=detailRow(c.course,c.trainer||'—'));
    showDetail('المواد الحالية','🟢',html);
  }else if(kind==='done'){
    const past=courses.filter(c=>c.status==='سابق');
    let html='<div style="font-size:13px;color:var(--muted);margin-bottom:10px">المواد المكتملة:</div>';
    past.forEach(c=>{const p=Math.round(c.pct);html+=detailRow(c.course,p+'% · '+(c.letter||''),p>=80?'var(--green)':p>=60?'var(--gold)':'var(--red)');});
    showDetail('المواد المكتملة','✅',html);
  }else if(kind==='alerts'){
    const iss=courses.filter(hasIssue);
    let html=iss.length?'<div style="font-size:13px;color:var(--muted);margin-bottom:10px">مواد تحتاج متابعة:</div>':'<div class="alert as"><span class="aicon">✅</span>لا توجد اشعارات</div>';
    iss.forEach(c=>{const r=isHighAbs(c)?'غياب '+Math.round(c.abs)+'%':'درجة '+Math.round(c.pct)+'%';html+=detailRow(c.course,r,'var(--red)');});
    showDetail('الاشعارات','⚠️',html);
  }
}

function absBadge(pct){
  const p=Math.round(pct);
  if(p>=25)return `<span class="badge b-r">${p}% محروم</span>`;
  if(p>=20)return `<span class="badge b-y">${p}% إنذار ثانٍ</span>`;
  if(p>=10)return `<span class="badge b-y">${p}% إنذار أول</span>`;
  return `<span class="badge b-g">${p}%</span>`;
}

// ===== 1) تقرير الغياب الشامل =====
function printAbsenceReport(){
  const grps=[...new Set(students.map(s=>s.grp))].filter(Boolean).sort();
  const deprived=allCourses.filter(c=>c.abs>=25);
  const warn2=allCourses.filter(c=>c.abs>=20&&c.abs<25);
  const warn1=allCourses.filter(c=>c.abs>=10&&c.abs<20);
  let body=`<div class="kpis">
    <div class="kpi"><div class="n">${students.length}</div><div class="l">إجمالي المتدربين</div></div>
    <div class="kpi"><div class="n" style="color:#c0392b">${deprived.length}</div><div class="l">حالات حرمان (≥25%)</div></div>
    <div class="kpi"><div class="n" style="color:#d68910">${warn2.length}</div><div class="l">إنذار ثانٍ (≥20%)</div></div>
    <div class="kpi"><div class="n" style="color:#d68910">${warn1.length}</div><div class="l">إنذار أول (≥10%)</div></div>
  </div>`;
  grps.forEach(g=>{
    const gs=uniqStudents(students.filter(s=>s.grp===g&&isActive(s.status)));
    if(!gs.length)return;
    const rows=gs.map(s=>{
      const sc=allCourses.filter(c=>c.sid===s.id&&isActive(c.status));
      const maxAbs=sc.length?Math.max(...sc.map(c=>c.abs)):0;
      const worst=sc.find(c=>c.abs===maxAbs);
      return `<tr><td>${s.sid}</td><td style="text-align:right">${s.name}</td><td>${absBadge(maxAbs)}</td><td>${worst?worst.course:'—'}</td><td>${sc.length}</td></tr>`;
    }).join('');
    body+=`<div class="grp-block"><div class="sec-title">📋 الشعبة ${g} (${gs.length} متدرب)</div>
    <table><thead><tr><th>الرقم</th><th>الاسم</th><th>أعلى نسبة غياب</th><th>في مادة</th><th>عدد المواد</th></tr></thead><tbody>${rows}</tbody></table></div>`;
  });
  openReport(reportShell('تقرير الغياب الشامل','تقرير الغياب الشامل لجميع المتدربين',body));
}

// ===== 2) تقرير الدرجات المفصّل (لكل شعبة/مادة) =====
function printGradesReport(){
  const grps=[...new Set(students.map(s=>s.grp))].filter(Boolean).sort();
  let body=`<div class="kpis">
    <div class="kpi"><div class="n">${students.length}</div><div class="l">متدرب</div></div>

    <div class="kpi"><div class="n">${[...new Set(allCourses.map(c=>c.course))].filter(Boolean).length}</div><div class="l">مادة</div></div>
  </div>`;
  grps.forEach(g=>{
    const gs=students.filter(s=>s.grp===g);
    const sids=gs.map(s=>s.id);
    const courses=[...new Set(allCourses.filter(c=>sids.includes(c.sid)&&isActive(c.status)).map(c=>c.course))].filter(Boolean);
    if(!courses.length)return;
    body+=`<div class="sec-title">📋 الشعبة ${g}</div>`;
    courses.forEach(course=>{
      const cc=allCourses.filter(c=>sids.includes(c.sid)&&c.course===course&&isActive(c.status));
      const uniq=uniqStudents(cc.map(c=>{const st=students.find(s=>s.id===c.sid);return{...c,sid:c.sid,name:st?st.name:c.sname,grp:g};}));
      const rows=uniq.map(c=>{
        const st=students.find(s=>s.id===c.sid);
        const grade=Math.round(c.pct);
        const cls=grade>=60?'ok':(grade>0?'danger':'');
        return `<tr><td>${c.sid}</td><td style="text-align:right">${st?st.name:c.sname||''}</td><td class="${cls}">${grade}%</td><td>${c.letter||'—'}</td><td>${grade>=60?'ناجح':(grade>0?'راسب':'—')}</td></tr>`;
      }).join('');
      const avg=uniq.length?Math.round(uniq.reduce((a,c)=>a+c.pct,0)/uniq.length):0;
      body+=`<div class="grp-block" style="margin-bottom:14px"><div style="font-weight:700;color:#0a2348;padding:6px 0">📚 ${course} <span style="font-size:11px;color:#5a6b85">(متوسط: ${avg}%)</span></div>
      <table><thead><tr><th>الرقم</th><th>الاسم</th><th>الدرجة</th><th>التقدير</th><th>الحالة</th></tr></thead><tbody>${rows}</tbody></table></div>`;
    });
  });
  openReport(reportShell('تقرير الدرجات المفصّل','كشف الدرجات المفصّل لكل شعبة ومادة',body));
}

// ===== 4) تقرير الأعذار والطلبات =====
function printRequestsReport(){
  const reqs=requests||[];
  const excuses=reqs.filter(r=>r.type==='عذر غياب');
  const approved=reqs.filter(r=>r.finalStatus==='معتمد'||r.dirStatus==='معتمد');
  const pending=reqs.filter(r=>r.finalStatus==='قيد المراجعة'||(!r.dirStatus||r.dirStatus==='معلق'));
  const rejected=reqs.filter(r=>r.supStatus==='مرفوض'||r.dirStatus==='مرفوض'||r.finalStatus==='مرفوض');
  const statusOf=r=>{
    if(r.finalStatus==='معتمد'||r.dirStatus==='معتمد')return '<span class="badge b-g">معتمد</span>';
    if(r.supStatus==='مرفوض'||r.dirStatus==='مرفوض')return '<span class="badge b-r">مرفوض</span>';
    return '<span class="badge b-y">قيد المراجعة</span>';
  };
  const rows=reqs.sort((a,b)=>(b.date||'').localeCompare(a.date||'')).map(r=>{
    const days=((String(r.details||'').match(/الأيام:\s*([^|]+)/)||[])[1]||'').trim();
    const hours=((String(r.details||'').match(/ساعات:\s*([\d.]+)/)||[])[1]||'');
    return `<tr><td>${r.date||'—'}</td><td style="text-align:right">${r.sname||''}</td><td>${r.grp||''}</td><td>${r.type||''}</td><td style="font-size:10px">${days||'—'}</td><td>${hours||'—'}</td><td>${statusOf(r)}</td></tr>`;
  }).join('');
  const body=`<div class="kpis">
    <div class="kpi"><div class="n">${reqs.length}</div><div class="l">إجمالي الطلبات</div></div>
    <div class="kpi"><div class="n" style="color:#1e8449">${approved.length}</div><div class="l">معتمدة</div></div>
    <div class="kpi"><div class="n" style="color:#d68910">${pending.length}</div><div class="l">قيد المراجعة</div></div>
    <div class="kpi"><div class="n" style="color:#c0392b">${rejected.length}</div><div class="l">مرفوضة</div></div>
  </div>
