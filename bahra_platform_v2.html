<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bahra Learning Academy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07111f;
  --bg2:#0d1d30;
  --bg3:#112240;
  --accent:#e63946;
  --accent2:#c1121f;
  --blue:#1a7abf;
  --blue2:#155fa0;
  --gold:#f4a261;
  --green:#2ecc71;
  --text:#e8f0f8;
  --muted:#6b8cae;
  --border:rgba(100,160,220,0.12);
  --glow:rgba(230,57,70,0.15);
  --glow-blue:rgba(26,122,191,0.15);
}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* 3D BACKGROUND */
.bg-scene{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.bg-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(26,122,191,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(26,122,191,0.04) 1px,transparent 1px);background-size:40px 40px;transform:perspective(600px) rotateX(30deg) scale(2);transform-origin:center bottom;opacity:0.6}
.bg-orb1{position:absolute;width:500px;height:500px;background:radial-gradient(circle,rgba(230,57,70,0.08) 0%,transparent 70%);top:-100px;right:-100px;border-radius:50%;animation:orbFloat 8s ease-in-out infinite}
.bg-orb2{position:absolute;width:400px;height:400px;background:radial-gradient(circle,rgba(26,122,191,0.08) 0%,transparent 70%);bottom:-100px;left:-50px;border-radius:50%;animation:orbFloat 10s ease-in-out infinite reverse}
@keyframes orbFloat{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-30px) scale(1.05)}}

/* LOGIN */
#loginPage{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px}
.login-container{width:100%;max-width:460px}
.login-logo-wrap{text-align:center;margin-bottom:32px}
.login-logo-wrap img{width:90px;height:90px;object-fit:contain;filter:drop-shadow(0 0 20px rgba(230,57,70,0.4));animation:logoPulse 3s ease-in-out infinite}
@keyframes logoPulse{0%,100%{filter:drop-shadow(0 0 20px rgba(230,57,70,0.4))}50%{filter:drop-shadow(0 0 35px rgba(230,57,70,0.7))}}
.login-logo-wrap h1{font-size:26px;font-weight:900;margin-top:12px;letter-spacing:-0.5px}
.login-logo-wrap h1 span{color:var(--accent)}
.login-logo-wrap p{font-size:13px;color:var(--muted);margin-top:4px}

.glass-card{background:rgba(13,29,48,0.8);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:24px;padding:36px 32px;position:relative;overflow:hidden}
.glass-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(100,160,220,0.4),transparent)}
.glass-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(230,57,70,0.2),transparent)}

.role-tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:24px}
.role-tab{padding:10px 6px;border-radius:12px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Tajawal',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .25s;text-align:center}
.role-tab:hover{border-color:rgba(100,160,220,0.3);color:var(--text);background:rgba(100,160,220,0.05)}
.role-tab.active-student{background:rgba(230,57,70,0.12);border-color:rgba(230,57,70,0.4);color:#ff8a92}
.role-tab.active-trainer{background:rgba(26,122,191,0.12);border-color:rgba(26,122,191,0.4);color:#6ab8f7}
.role-tab.active-admin{background:rgba(244,162,97,0.12);border-color:rgba(244,162,97,0.4);color:#f4c78a}
.role-icon{font-size:18px;display:block;margin-bottom:4px}

.form-group{margin-bottom:18px}
.form-group label{display:block;font-size:12px;font-weight:500;color:var(--muted);margin-bottom:7px;text-transform:uppercase;letter-spacing:.5px}
.form-group input{width:100%;padding:13px 16px;background:rgba(7,17,31,0.6);border:1px solid var(--border);border-radius:12px;font-family:'Tajawal',sans-serif;font-size:15px;color:var(--text);outline:none;transition:all .2s;direction:ltr;text-align:right}
.form-group input:focus{border-color:rgba(100,160,220,0.5);box-shadow:0 0 0 3px rgba(26,122,191,0.1);background:rgba(7,17,31,0.8)}
.form-group input::placeholder{color:#2a4a6a;direction:rtl}

.login-btn{width:100%;padding:14px;border:none;border-radius:12px;font-family:'Tajawal',sans-serif;font-size:16px;font-weight:700;cursor:pointer;transition:all .25s;margin-top:4px;position:relative;overflow:hidden}
.login-btn.btn-student{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.login-btn.btn-trainer{background:linear-gradient(135deg,var(--blue),var(--blue2));color:#fff}
.login-btn.btn-admin{background:linear-gradient(135deg,#e67e22,#ca6f1e);color:#fff}
.login-btn:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(0,0,0,0.3)}
.login-btn:active{transform:translateY(0)}
.login-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.login-btn::after{content:'';position:absolute;inset:0;background:linear-gradient(rgba(255,255,255,0.1),transparent);pointer-events:none}

.error-box{background:rgba(230,57,70,0.1);border:1px solid rgba(230,57,70,0.3);color:#ff8a92;border-radius:10px;padding:11px 16px;font-size:13px;margin-top:12px;display:none;text-align:center}
.loader{text-align:center;padding:14px;display:none}
.spinner{display:inline-block;width:26px;height:26px;border:2px solid rgba(100,160,220,0.2);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* TOPBAR */
.topbar{background:rgba(13,29,48,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-brand{display:flex;align-items:center;gap:10px}
.topbar-brand img{width:38px;height:38px;object-fit:contain}
.brand-name{font-size:15px;font-weight:700}
.brand-sub{font-size:10px;color:var(--muted)}
.topbar-right{display:flex;align-items:center;gap:10px}
.role-badge{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.3px}
.badge-student{background:rgba(230,57,70,0.15);color:#ff8a92;border:1px solid rgba(230,57,70,0.3)}
.badge-trainer{background:rgba(26,122,191,0.15);color:#6ab8f7;border:1px solid rgba(26,122,191,0.3)}
.badge-admin{background:rgba(244,162,97,0.15);color:#f4c78a;border:1px solid rgba(244,162,97,0.3)}
.user-av{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.av-student{background:rgba(230,57,70,0.2);color:#ff8a92}
.av-trainer{background:rgba(26,122,191,0.2);color:#6ab8f7}
.av-admin{background:rgba(244,162,97,0.2);color:#f4c78a}
.user-name{font-size:13px;font-weight:500;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.logout-btn{background:transparent;border:1px solid var(--border);color:var(--muted);padding:6px 14px;border-radius:8px;font-family:'Tajawal',sans-serif;font-size:12px;cursor:pointer;transition:all .2s}
.logout-btn:hover{border-color:var(--accent);color:var(--accent)}

/* LAYOUT */
.app-layout{display:flex;min-height:calc(100vh - 62px)}
.sidebar{width:220px;background:rgba(11,22,38,0.6);border-left:1px solid var(--border);padding:16px 0;flex-shrink:0;backdrop-filter:blur(10px)}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:11px 18px;font-size:13px;color:var(--muted);cursor:pointer;transition:all .2s;border-right:3px solid transparent;margin-bottom:2px}
.sidebar-item:hover{color:var(--text);background:rgba(100,160,220,0.05)}
.sidebar-item.active{color:var(--text);background:rgba(100,160,220,0.08);border-right-color:var(--accent)}
.sidebar-item.active-blue{border-right-color:var(--blue)}
.sidebar-item.active-gold{border-right-color:var(--gold)}
.sidebar-icon{font-size:16px;width:20px;text-align:center}
.sidebar-sep{height:1px;background:var(--border);margin:8px 16px}

.main-content{flex:1;padding:28px 24px;overflow-y:auto;position:relative;z-index:1}
.page{display:none}
.page.active{display:block}

/* CARDS */
.metrics-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:28px}
.metric-card{background:rgba(13,29,48,0.7);border:1px solid var(--border);border-radius:16px;padding:20px;position:relative;overflow:hidden;transition:transform .2s,border-color .2s;backdrop-filter:blur(10px)}
.metric-card:hover{transform:translateY(-2px);border-color:rgba(100,160,220,0.25)}
.metric-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:16px 16px 0 0}
.mc-red::before{background:linear-gradient(90deg,var(--accent),transparent)}
.mc-blue::before{background:linear-gradient(90deg,var(--blue),transparent)}
.mc-gold::before{background:linear-gradient(90deg,var(--gold),transparent)}
.mc-green::before{background:linear-gradient(90deg,var(--green),transparent)}
.mc-icon{font-size:24px;margin-bottom:12px;opacity:0.7}
.mc-num{font-size:32px;font-weight:900;line-height:1}
.mc-num.red{color:var(--accent)}
.mc-num.blue{color:#6ab8f7}
.mc-num.gold{color:var(--gold)}
.mc-num.green{color:var(--green)}
.mc-label{font-size:12px;color:var(--muted);margin-top:6px}

.section-title{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}

.glass-table{background:rgba(13,29,48,0.6);border:1px solid var(--border);border-radius:16px;overflow:hidden;backdrop-filter:blur(10px)}
.glass-table table{width:100%;border-collapse:collapse;font-size:13px}
.glass-table th{padding:12px 16px;color:var(--muted);font-weight:500;text-align:right;border-bottom:1px solid var(--border);background:rgba(7,17,31,0.4);font-size:12px;text-transform:uppercase;letter-spacing:.3px}
.glass-table td{padding:12px 16px;text-align:right;border-bottom:1px solid rgba(100,160,220,0.06);transition:background .15s}
.glass-table tr:last-child td{border-bottom:none}
.glass-table tr:hover td{background:rgba(100,160,220,0.04)}

.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px}
.info-item{background:rgba(13,29,48,0.6);border:1px solid var(--border);border-radius:12px;padding:14px 18px;backdrop-filter:blur(10px)}
.info-label{font-size:11px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.info-val{font-size:14px;font-weight:500}

.course-card{background:rgba(13,29,48,0.6);border:1px solid var(--border);border-radius:16px;padding:20px 22px;margin-bottom:12px;transition:all .2s;backdrop-filter:blur(10px);position:relative;overflow:hidden}
.course-card:hover{border-color:rgba(100,160,220,0.25);transform:translateX(-2px)}
.course-card::before{content:'';position:absolute;right:0;top:0;bottom:0;width:3px;border-radius:0 16px 16px 0}
.cc-red::before{background:var(--accent)}
.cc-blue::before{background:var(--blue)}
.cc-gold::before{background:var(--gold)}
.cc-green::before{background:var(--green)}
.cc-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px}
.cc-name{font-size:15px;font-weight:700}
.cc-meta-row{font-size:12px;color:var(--muted);margin-top:3px}
.pct-pill{font-size:13px;font-weight:700;padding:5px 14px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.pill-green{background:rgba(46,204,113,0.12);color:#2ecc71;border:1px solid rgba(46,204,113,0.25)}
.pill-yellow{background:rgba(244,162,97,0.12);color:#f4a261;border:1px solid rgba(244,162,97,0.25)}
.pill-red{background:rgba(230,57,70,0.12);color:#ff8a92;border:1px solid rgba(230,57,70,0.25)}
.prog{background:rgba(255,255,255,0.06);border-radius:6px;height:5px;overflow:hidden;margin-bottom:10px}
.prog-fill{height:5px;border-radius:6px;transition:width 1s ease}
.prog-green{background:linear-gradient(90deg,#27ae60,#2ecc71)}
.prog-yellow{background:linear-gradient(90deg,#e67e22,#f4a261)}
.prog-red{background:linear-gradient(90deg,var(--accent2),var(--accent))}
.cc-footer{display:flex;gap:16px;font-size:12px;color:var(--muted)}

/* WELCOME BANNER */
.welcome-banner{background:rgba(13,29,48,0.7);border:1px solid var(--border);border-radius:20px;padding:24px 28px;margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;gap:16px;backdrop-filter:blur(10px);position:relative;overflow:hidden}
.welcome-banner::before{content:'';position:absolute;left:-60px;top:-60px;width:200px;height:200px;background:radial-gradient(circle,rgba(230,57,70,0.06) 0%,transparent 70%);border-radius:50%}
.wb-title{font-size:22px;font-weight:900}
.wb-sub{font-size:13px;color:var(--muted);margin-top:5px}
.wb-badge{padding:10px 22px;border-radius:20px;font-size:13px;font-weight:700;flex-shrink:0}
.wbb-red{background:rgba(230,57,70,0.15);color:#ff8a92;border:1px solid rgba(230,57,70,0.3)}
.wbb-blue{background:rgba(26,122,191,0.15);color:#6ab8f7;border:1px solid rgba(26,122,191,0.3)}
.wbb-gold{background:rgba(244,162,97,0.15);color:#f4c78a;border:1px solid rgba(244,162,97,0.3)}

/* ALERT CARDS */
.alert-card{border-radius:12px;padding:14px 18px;margin-bottom:10px;display:flex;align-items:center;gap:12px;font-size:13px}
.alert-warn{background:rgba(244,162,97,0.1);border:1px solid rgba(244,162,97,0.25);color:#f4c78a}
.alert-danger{background:rgba(230,57,70,0.1);border:1px solid rgba(230,57,70,0.25);color:#ff8a92}
.alert-success{background:rgba(46,204,113,0.1);border:1px solid rgba(46,204,113,0.25);color:#2ecc71}
.alert-icon{font-size:18px}

/* BUTTONS */
.btn{padding:9px 20px;border-radius:10px;font-family:'Tajawal',sans-serif;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .2s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2)}
.btn-blue{background:var(--blue);color:#fff}
.btn-blue:hover{background:var(--blue2)}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted)}
.btn-outline:hover{border-color:var(--accent);color:var(--accent)}
.btn-sm{padding:6px 14px;font-size:12px}
.btn-row{display:flex;gap:8px;flex-wrap:wrap}

/* SEARCH & FILTER */
.search-bar{display:flex;gap:10px;margin-bottom:16px;align-items:center}
.search-bar input{flex:1;padding:10px 14px;background:rgba(7,17,31,0.6);border:1px solid var(--border);border-radius:10px;font-family:'Tajawal',sans-serif;font-size:13px;color:var(--text);outline:none}
.search-bar input:focus{border-color:rgba(100,160,220,0.4)}
.search-bar select{padding:10px 14px;background:rgba(7,17,31,0.6);border:1px solid var(--border);border-radius:10px;font-family:'Tajawal',sans-serif;font-size:13px;color:var(--text);outline:none}

/* SCHEDULE */
.schedule-item{background:rgba(13,29,48,0.6);border:1px solid var(--border);border-radius:12px;padding:14px 18px;margin-bottom:10px;display:flex;align-items:center;gap:16px;backdrop-filter:blur(10px)}
.schedule-time{background:rgba(26,122,191,0.12);border:1px solid rgba(26,122,191,0.25);color:#6ab8f7;padding:6px 12px;border-radius:8px;font-size:12px;font-weight:700;white-space:nowrap;text-align:center;min-width:70px}
.schedule-day{font-size:10px;color:var(--muted);margin-top:2px}

/* STAT BAR */
.stat-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.stat-row:last-child{border-bottom:none}
.stat-name{flex:1;font-size:13px}
.stat-bar-wrap{width:120px;background:rgba(255,255,255,0.06);border-radius:4px;height:6px;overflow:hidden}
.stat-bar-fill{height:6px;border-radius:4px;background:linear-gradient(90deg,var(--blue),#6ab8f7)}
.stat-val{font-size:12px;color:var(--muted);min-width:36px;text-align:left}

.empty{text-align:center;padding:40px;color:var(--muted);font-size:14px}

/* ATTENDANCE GRID */
.att-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.att-card{background:rgba(13,29,48,0.6);border:1px solid var(--border);border-radius:12px;padding:14px;backdrop-filter:blur(10px)}
.att-name{font-size:13px;font-weight:600;margin-bottom:8px}
.att-btns{display:flex;gap:6px}
.att-btn{flex:1;padding:7px;border-radius:8px;font-family:'Tajawal',sans-serif;font-size:12px;cursor:pointer;border:1px solid;font-weight:600;transition:all .15s}
.att-present{background:rgba(46,204,113,0.1);border-color:rgba(46,204,113,0.3);color:#2ecc71}
.att-present.selected,.att-present:hover{background:rgba(46,204,113,0.25)}
.att-absent{background:rgba(230,57,70,0.1);border-color:rgba(230,57,70,0.3);color:#ff8a92}
.att-absent.selected,.att-absent:hover{background:rgba(230,57,70,0.25)}

@media(max-width:768px){
  .sidebar{display:none}
  .metrics-grid{grid-template-columns:1fr 1fr}
  .info-grid{grid-template-columns:1fr}
  .topbar{padding:10px 16px}
  .main-content{padding:16px 14px}
  .welcome-banner{flex-direction:column;text-align:center}
}
</style>
</head>
<body>

<div class="bg-scene">
  <div class="bg-grid"></div>
  <div class="bg-orb1"></div>
  <div class="bg-orb2"></div>
</div>

<!-- =================== LOGIN =================== -->
<div id="loginPage">

<script>

let currentRole = 'student';
let currentUser = null;
let allCourses = [];
let allStudents = [];

// ---- DEMO DATA ----
const ADMIN_CREDS = [{id:'admin',phone:'568696450',name:'م. براء الفران',title:'مشرف الأكاديمية'}];
const TRAINER_SHEET_NAME = 'روابط المدربين';

function norm(p){return String(p).replace(/^0/,'').trim()}

function selectRole(role, btn){
  currentRole = role;
  document.querySelectorAll('.role-tab').forEach(t=>t.className='role-tab');
  btn.classList.add('active-'+role);
  const lb = document.getElementById('idLabel');
  const loginBtn = document.getElementById('loginBtn');
  if(role==='student'){lb.textContent='الرقم الأكاديمي';loginBtn.className='login-btn btn-student'}
  else if(role==='trainer'){lb.textContent='رقم المدرب';loginBtn.className='login-btn btn-trainer'}
  else{lb.textContent='رقم المستخدم';loginBtn.className='login-btn btn-admin'}
}

async function fetchSheet(range){
  const url=`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(range)}?key=${API_KEY}`;
  const r=await fetch(url);
  if(!r.ok)throw new Error('api');
  const d=await r.json();
  return d.values||[];
}

async function doLogin(){
  const sid=document.getElementById('inp-id').value.trim();
  const sph=norm(document.getElementById('inp-phone').value.trim());
  if(!sid||!sph){showErr('يرجى إدخال البيانات');return}
  document.getElementById('errMsg').style.display='none';
  document.getElementById('loginBtn').disabled=true;
  document.getElementById('loadMsg').style.display='block';

  try{
    if(currentRole==='admin'){
      const found=ADMIN_CREDS.find(a=>a.id===sid&&norm(a.phone)===sph);
      if(!found)throw new Error('not found');
      currentUser={...found,role:'admin'};
      await loadAdminData();
    } else if(currentRole==='trainer'){
      const rows=await fetchSheet('روابط المدربين!A:F');
      let found=null;
      for(let i=1;i<rows.length;i++){
        const r=rows[i];
        if(String(r[0]||'').trim()===sid&&norm(r[3]||'')===sph){
          found={id:String(r[0]).trim(),name:r[1]||'',specialty:r[2]||'',phone:r[3]||'',email:r[4]||'',role:'trainer'};
          break;
        }
      }
      if(!found)throw new Error('not found');
      currentUser=found;
      await loadTrainerData();
    } else {
      const rows=await fetchSheet('قاعدة بيانات مركزي!A:G');
      let found=null;
      for(let i=1;i<rows.length;i++){
        const r=rows[i];
        if(!r[0])continue;
        if(String(r[0]).trim()===sid&&norm(r[4]||'')===sph){
          found={id:String(r[0]).trim(),name:r[1]||'',group:r[2]||'',spec:r[3]||'',phone:r[4]||'',email:r[5]||'',role:'student'};
          break;
        }
      }
      if(!found)throw new Error('not found');
      currentUser=found;
      await loadStudentData();
    }
    showApp();
  }catch(e){
    showErr('بيانات الدخول غير صحيحة');
  }
  document.getElementById('loginBtn').disabled=false;
  document.getElementById('loadMsg').style.display='none';
}

async function loadStudentData(){
  const cr=await fetchSheet('سجل المقررات!A:I');
  allCourses=[];
  for(let i=1;i<cr.length;i++){
    const r=cr[i];
    if(String(r[1]||'').trim()===currentUser.id){
      allCourses.push({name:r[5]||'مقرر',code:r[4]||'',trainer:r[6]||'',pct:parseFloat(r[7])||0,absence:parseFloat(r[8])||0});
    }
  }
}

async function loadTrainerData(){
  const cr=await fetchSheet('سجل المقررات!A:I');
  allStudents=[];
  for(let i=1;i<cr.length;i++){
    const r=cr[i];
    if((r[6]||'').trim()===currentUser.name){
      allStudents.push({key:r[0]||'',sid:r[1]||'',name:r[2]||'',group:r[3]||'',course:r[5]||'',code:r[4]||'',pct:parseFloat(r[7])||0,absence:parseFloat(r[8])||0});

}

async function loadAdminData(){
  const rows=await fetchSheet('قاعدة بيانات مركزي!A:G');
  allStudents=[];
  for(let i=1;i<rows.length;i++){
    const r=rows[i];
    if(!r[0])continue;
    allStudents.push({id:String(r[0]).trim(),name:r[1]||'',group:r[2]||'',spec:r[3]||'',phone:r[4]||'',email:r[5]||''});

    </div>
    <div class="metrics-grid">
      <div class="metric-card mc-blue"><div class="mc-icon">🎓</div><div class="mc-num blue">${totalSt}</div><div class="mc-label">إجمالي المتدربين</div></div>
      <div class="metric-card mc-green"><div class="mc-icon">📚</div><div class="mc-num green">${totalCourses}</div><div class="mc-label">المقررات النشطة</div></div>
      <div class="metric-card mc-gold"><div class="mc-icon">👨‍🏫</div><div class="mc-num gold">${trainers}</div><div class="mc-label">المدربون</div></div>
      <div class="metric-card mc-red"><div class="mc-icon">📊</div><div class="mc-num ${avgAll>=70?'green':avgAll>=50?'gold':'red'}">${avgAll}%</div><div class="mc-label">متوسط الإنجاز</div></div>
    </div>
    ${alerts>0?`<div class="alert-card alert-danger" style="margin-bottom:16px"><span class="alert-icon">🔴</span> ${alerts} حالة تحتاج متابعة فورية</div>`:''}
    <div class="section-title">توزيع المتدربين بالشعب</div>
    <div class="glass-table"><table>
      <thead><tr><th>الشعبة</th><th>عدد المتدربين</th><th>نسبة الإنجاز</th></tr></thead>
      <tbody>${groups.map(g=>{
        const gSts=allStudents.filter(s=>s.group===g);
        const gCourses=allCourses.filter(c=>gSts.some(s=>s.id===c.sid));
        const gAvg=gCourses.length?Math.round(gCourses.reduce((a,c)=>a+c.pct,0)/gCourses.length):0;
        return `<tr><td>الشعبة ${g}</td><td>${gSts.length}</td><td><span class="pct-pill ${gAvg>=70?'pill-green':gAvg>=50?'pill-yellow':'pill-red'}">${gAvg}%</span></td></tr>`;
      }).join('')}</tbody>
    </table></div>
  `;
}

function adminStudents(){
  return `
    <div class="section-title">جميع المتدربين (${allStudents.length})</div>
    <div class="search-bar">
      <input type="text" id="searchSt" placeholder="ابحث بالاسم أو الرقم..." oninput="filterStudents()">
      <select id="filterGroup" onchange="filterStudents()">
        <option value="">كل الشعب</option>
        ${[...new Set(allStudents.map(s=>s.group))].map(g=>`<option value="${g}">الشعبة ${g}</option>`).join('')}
      </select>
    </div>
    <div class="glass-table" id="studentsTable">
      <table>
        <thead><tr><th>الرقم الأكاديمي</th><th>الاسم</th><th>الشعبة</th><th>التخصص</th><th>الجوال</th></tr></thead>
        <tbody id="studentsTbody">${allStudents.map(s=>`
          <tr data-name="${s.name}" data-id="${s.id}" data-group="${s.group}">
            <td style="color:var(--muted)">${s.id}</td>
            <td>${s.name}</td>
            <td>${s.group}</td>
            <td style="color:var(--muted);font-size:12px">${s.spec||'—'}</td>
            <td style="color:var(--muted)">${s.phone||'—'}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
  `;
}

function filterStudents(){
  const q=document.getElementById('searchSt').value.toLowerCase();
  const g=document.getElementById('filterGroup').value;
  document.querySelectorAll('#studentsTbody tr').forEach(r=>{
    const name=r.dataset.name.toLowerCase();
    const id=r.dataset.id;
    const group=r.dataset.group;
    const show=(!q||name.includes(q)||id.includes(q))&&(!g||group===g);
    r.style.display=show?'':'none';
  });
}

function adminCourses(){
  const courses=[...new Set(allCourses.map(c=>c.name))];
  return `
    <div class="section-title">المقررات النشطة</div>
    ${courses.map(name=>{
      const cs=allCourses.filter(c=>c.name===name);
      const avg=Math.round(cs.reduce((a,c)=>a+c.pct,0)/cs.length);
      const trainer=cs[0]?.trainer||'—';
      return `<div class="course-card cc-gold">
        <div class="cc-top">
          <div><div class="cc-name">${name}</div><div class="cc-meta-row">المدرب: ${trainer} · ${cs.length} متدرب</div></div>
          <span class="pct-pill ${avg>=70?'pill-green':avg>=50?'pill-yellow':'pill-red'}">${avg}%</span>
        </div>
        <div class="prog"><div class="prog-fill prog-${avg>=70?'green':avg>=50?'yellow':'red'}" style="width:${avg}%"></div></div>
      </div>`;
    }).join('')}
  `;
}

function adminAlerts(){
  const highAbs=allCourses.filter(c=>c.absence>20);
  const lowPerf=allCourses.filter(c=>c.pct<40);
  return `
    <div class="section-title">نظام التنبيهات</div>
    ${highAbs.length?`<div style="margin-bottom:20px">
      <div style="font-size:13px;font-weight:700;color:#f4c78a;margin-bottom:10px">⚠️ غياب عالي (${highAbs.length} حالة)</div>
      ${highAbs.slice(0,10).map(c=>{
        const st=allStudents.find(s=>s.id===c.sid);
        return `<div class="alert-card alert-warn"><span class="alert-icon">👤</span>${st?st.name.split(' ').slice(0,3).join(' '):c.sid} — غياب ${Math.round(c.absence)}% في ${c.name}</div>`;
      }).join('')}
    </div>`:''}
    ${lowPerf.length?`<div>
      <div style="font-size:13px;font-weight:700;color:#ff8a92;margin-bottom:10px">🔴 أداء منخفض (${lowPerf.length} حالة)</div>
      ${lowPerf.slice(0,10).map(c=>{
        const st=allStudents.find(s=>s.id===c.sid);
        return `<div class="alert-card alert-danger"><span class="alert-icon">📉</span>${st?st.name.split(' ').slice(0,3).join(' '):c.sid} — إنجاز ${Math.round(c.pct)}% في ${c.name}</div>`;
      }).join('')}
    </div>`:''}
    ${!highAbs.length&&!lowPerf.length?'<div class="alert-card alert-success"><span class="alert-icon">✅</span> لا توجد تنبيهات حرجة</div>':''}
  `;
}

function adminReports(){
  const totalSt=allStudents.length;
  const avgAll=allCourses.length?Math.round(allCourses.reduce((a,c)=>a+c.pct,0)/allCourses.length):0;
  const completed=allCourses.filter(c=>c.pct>=80).length;
  const trainers=[...new Set(allCourses.map(c=>c.trainer).filter(Boolean))];
  return `
    <div class="section-title">تقارير الأداء</div>
    <div class="metrics-grid" style="margin-bottom:24px">
      <div class="metric-card mc-blue"><div class="mc-icon">🎓</div><div class="mc-num blue">${totalSt}</div><div class="mc-label">متدرب</div></div>
      <div class="metric-card mc-green"><div class="mc-icon">✅</div><div class="mc-num green">${completed}</div><div class="mc-label">مقررات مكتملة</div></div>
      <div class="metric-card mc-gold"><div class="mc-icon">📊</div><div class="mc-num gold">${avgAll}%</div><div class="mc-label">متوسط عام</div></div>
    </div>
    <div class="section-title">أداء المدربين</div>
    <div class="glass-table"><table>
      <thead><tr><th>المدرب</th><th>عدد المتدربين</th><th>متوسط الإنجاز</th></tr></thead>
      <tbody>${trainers.map(t=>{
        const tCourses=allCourses.filter(c=>c.trainer===t);
        const avg=tCourses.length?Math.round(tCourses.reduce((a,c)=>a+c.pct,0)/tCourses.length):0;
        return `<tr><td>${t}</td><td>${tCourses.length}</td><td><span class="pct-pill ${avg>=70?'pill-green':avg>=50?'pill-yellow':'pill-red'}">${avg}%</span></td></tr>`;
      }).join('')}</tbody>
    </table></div>
    <div style="margin-top:20px" class="btn-row">
      <button class="btn btn-blue" onclick="printReport()">🖨️ طباعة التقرير</button>
    </div>
  `;
}

function printReport(){window.print()}

function showErr(m){const e=document.getElementById('errMsg');e.textContent=m;e.style.display='block'}

function doLogout(){
  currentUser=null;allCourses=[];allStudents=[];
  document.getElementById('appShell').style.display='none';
  document.getElementById('loginPage').style.display='flex';
  document.getElementById('inp-id').value='';
  document.getElementById('inp-phone').value='';
  document.getElementById('errMsg').style.display='none';
}

document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&document.getElementById('loginPage').style.display!=='none')doLogin();
});
</script>
</body>
</html>
